<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя | METAIMPERIYA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/dark-theme.css">
    
    <style>
        .profile-page {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .profile-page .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .profile-page .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 3px solid var(--link-color);
        }
        .profile-page .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-page .profile-avatar .letter {
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .profile-page .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }
        .profile-page .profile-bio {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 4px 0 0 0;
        }
        .profile-page .profile-stats {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        @media (max-width: 600px) {
            .profile-page .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .profile-page .profile-stats {
                justify-content: center;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="topbarContainer"></div>
        <div id="sidebarContainer"></div>
        <div id="settingsContainer"></div>
        <div id="playerContainer"></div>

        <main class="main-content">
            <div class="profile-page" id="userProfile">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar"><span class="letter">?</span></div>
                    <div>
                        <h1 class="profile-name" id="profileName">Загрузка...</h1>
                        <p class="profile-bio" id="profileBio"></p>
                    </div>
                </div>
                <div class="profile-stats">
                    <span id="friendsCount">👥 0</span>
                    <span id="subscribersCount">👀 0</span>
                    <span id="subscriptionsCount">📌 0</span>
                </div>
            </div>
            <div style="max-width:800px;margin:20px auto;">
                <div id="feed"></div>
            </div>
        </main>

        <div id="modalsContainer"></div>
    </div>

    <script src="/firebase.js"></script>
    <script src="/auth.js"></script>
    <script src="/app.js"></script>
    <script src="/profile.js"></script>
    <script src="/notifications.js"></script>
    <script src="/lang.js"></script>
    <script src="/load-components.js"></script>

    <script>
        // ================================================================
        // ЗАГРУЗКА ПОЛЬЗОВАТЕЛЯ ПО UID ИЗ URL
        // ================================================================
        
        function getUserFromUrl() {
            var path = window.location.pathname;
            var uid = path.replace('/user/', '').replace('/', '');
            return uid;
        }
        
        function loadUserProfile(uid) {
            if (!uid) return;
            
            db.ref('sites/' + SITE + '/users/' + uid).once('value', function(snap) {
                var userData = snap.val() || {};
                document.getElementById('profileName').textContent = userData.name || 'Пользователь';
                document.getElementById('profileBio').textContent = userData.bio || 'Привет!';
                
                var avatar = document.getElementById('profileAvatar');
                renderAvatar(uid, avatar, (userData.name || '?').charAt(0).toUpperCase());
                
                loadStats(uid);
                loadUserFeed(uid);
            });
        }
        
        function loadStats(uid) {
            db.ref('sites/' + SITE + '/friends/' + uid).once('value', function(snap) {
                var data = snap.val() || {};
                var count = Object.keys(data).filter(function(k) { return data[k] === true; }).length;
                document.getElementById('friendsCount').textContent = '👥 ' + count;
            });
            db.ref('sites/' + SITE + '/subscribers/' + uid).once('value', function(snap) {
                var data = snap.val() || {};
                document.getElementById('subscribersCount').textContent = '👀 ' + Object.keys(data).length;
            });
            db.ref('sites/' + SITE + '/subscriptions/' + uid).once('value', function(snap) {
                var data = snap.val() || {};
                document.getElementById('subscriptionsCount').textContent = '📌 ' + Object.keys(data).length;
            });
        }
        
        function loadUserFeed(uid) {
            var container = document.getElementById('feed');
            if (!container) return;
            
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка...</div>';
            
            db.ref('sites/' + SITE + '/user_posts/' + uid).orderByChild('timestamp').on('value', function(snap) {
                container.innerHTML = '';
                var data = snap.val() || {};
                var keys = Object.keys(data).sort(function(a, b) {
                    return (data[b].timestamp || 0) - (data[a].timestamp || 0);
                });
                
                if (!keys.length) {
                    container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">📝 Нет постов</div>';
                    return;
                }
                
                keys.forEach(function(k) {
                    var post = data[k];
                    post.id = k;
                    var postEl = renderPost(post, 'feed');
                    if (postEl) container.appendChild(postEl);
                });
            });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            var uid = getUserFromUrl();
            console.log('🔵 Загружаем профиль пользователя:', uid);
            if (uid) {
                loadUserProfile(uid);
            }
        });
        
        // ПЕРЕОПРЕДЕЛЯЕМ goToUserPage ДЛЯ ЭТОЙ СТРАНИЦЫ
        window.goToUserPage = function() {
            if (!USER_UID) {
                var loginModal = document.getElementById('loginModal');
                if (loginModal) loginModal.classList.add('open');
                return;
            }
            window.location.href = '/user/' + USER_UID + '/';
        };
    </script>
</body>
</html>
