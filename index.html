// ===== FIREBASE =====
const FB_CONFIG = {
    apiKey: "AIzaSyDCx2wLK2EZJOrUNoXEdWDlYY0e8cOHhtY",
    authDomain: "myecosystem-e6414.firebaseapp.com",
    databaseURL: "https://myecosystem-e6414-default-rtdb.firebaseio.com",
    projectId: "myecosystem-e6414",
    storageBucket: "myecosystem-e6414.firebasestorage.app",
    messagingSenderId: "426302111033",
    appId: "1:426302111033:web:7b39e7026e94f528a13ce8"
};
firebase.initializeApp(FB_CONFIG);
const db = firebase.database();
const auth = firebase.auth();
const storage = firebase.storage();
const provider = new firebase.auth.GoogleAuthProvider();

const SITE = (window.location.hostname || 'local').replace(/\./g, '_');

// ===== АДМИНЫ =====
const ADMIN_UIDS = [
    "ayXehcol9FgAQU6tZuup7aSaRoV2",
    "pWB0nGVvVXc4je6466ss7IwBm9G2",
    "ANR62p3qcjOe2ALsdVvJHUNCCV42"
];

// ===== СОСТОЯНИЕ =====
let USER = null;
let USER_UID = null;
let IS_ADMIN = false;
let avatarCache = {};
let CURRENT_ROOM = null;
let chatUnsub = null;
let notifUnsub = null;
let VIEWING_USER = null;
let friendListeners = {};
let activeRequests = new Map();

// ===== УТИЛИТЫ =====
function esc(s) {
    return s ? String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) : '';
}

function cancelRequest(key) {
    if (activeRequests.has(key)) {
        const fn = activeRequests.get(key);
        if (typeof fn === 'function') fn();
        activeRequests.delete(key);
    }
}

function safeFirebaseQuery(key, ref, callback) {
    cancelRequest(key);
    let cancelled = false;
    const cancelFn = () => { cancelled = true; activeRequests.delete(key); };
    activeRequests.set(key, cancelFn);
    ref.once('value', snap => {
        if (cancelled) return;
        activeRequests.delete(key);
        callback(snap);
    }).catch(err => {
        if (!cancelled) {
            activeRequests.delete(key);
            console.warn('Query error:', err);
        }
    });
    return cancelFn;
}

// ===== АВАТАРКИ =====
function getUserAvatar(uid, callback) {
    if (avatarCache[uid]) { callback(avatarCache[uid]); return; }
    db.ref('sites/' + SITE + '/users/' + uid + '/avatarUrl').once('value', snap => {
        const url = snap.val() || null;
        avatarCache[uid] = url;
        callback(url);
    });
}

function renderAvatar(uid, container, letter) {
    if (!container) return;
    getUserAvatar(uid, function(url) {
        if (url) {
            container.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;
        } else {
            container.innerHTML = `<span class="letter">${letter || '?'}</span>`;
        }
    });
}

// ===== AUTH =====
auth.onAuthStateChanged(user => {
    if (user) {
        USER_UID = user.uid;
        USER = user.displayName || user.email || user.uid.slice(0,8);
        localStorage.setItem('dc_u_' + SITE, USER);
        IS_ADMIN = ADMIN_UIDS.includes(USER_UID);
        
        const data = {
            name: USER,
            email: user.email || 'anon',
            uid: USER_UID,
            lastLogin: Date.now(),
            avatarUrl: user.photoURL || null
        };
        db.ref('sites/' + SITE + '/users/' + USER_UID).update(data);
        db.ref('sites/' + SITE + '/all_users/' + USER_UID).set(data);
        
        document.getElementById('loginModal').classList.remove('open');
        updateUI();
        loadFeed();
        loadGroups();
        loadPeople();
        loadProfile();
        loadNotifications();
    } else {
        USER = null;
        USER_UID = null;
        IS_ADMIN = false;
        if (notifUnsub) { notifUnsub(); notifUnsub = null; }
        Object.values(friendListeners).forEach(fn => { if (typeof fn === 'function') fn(); });
        friendListeners = {};
        document.getElementById('loginModal').classList.add('open');
        updateUI();
    }
});

document.getElementById('googleBtn').addEventListener('click', () => {
    auth.signInWithPopup(provider).catch(e => {
        if (e.code === 'auth/popup-blocked') auth.signInWithRedirect(provider);
        else alert('Ошибка: ' + e.message);
    });
});

function loginName() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) { alert('Введите имя'); return; }
    auth.signInAnonymously().then(() => {
        USER = name;
        USER_UID = 'anon_' + Date.now();
        localStorage.setItem('dc_u_' + SITE, USER);
        const data = { name: USER, email: 'anon@anon.com', uid: USER_UID, lastLogin: Date.now() };
        db.ref('sites/' + SITE + '/users/' + USER_UID).update(data);
        db.ref('sites/' + SITE + '/all_users/' + USER_UID).set(data);
        document.getElementById('loginModal').classList.remove('open');
        updateUI();
        loadFeed();
        loadGroups();
        loadPeople();
        loadProfile();
        loadNotifications();
    }).catch(e => alert('Ошибка: ' + e.message));
}

function logout() {
    if (!confirm('Выйти?')) return;
    if (notifUnsub) { notifUnsub(); notifUnsub = null; }
    Object.values(friendListeners).forEach(fn => { if (typeof fn === 'function') fn(); });
    friendListeners = {};
    auth.signOut().then(() => {
        localStorage.removeItem('dc_u_' + SITE);
        USER = null; USER_UID = null; IS_ADMIN = false;
        document.getElementById('loginModal').classList.add('open');
        updateUI();
    });
}

// ===== UI =====
function updateUI() {
    const topAvatar = document.getElementById('topAvatar');
    const sAvatar = document.getElementById('sAvatar');
    const name = document.getElementById('topName');
    const sName = document.getElementById('sName');
    const dot = document.getElementById('adminDot');

    if (USER) {
        name.textContent = USER;
        sName.textContent = USER;
        renderAvatar(USER_UID, topAvatar, USER.charAt(0).toUpperCase());
        renderAvatar(USER_UID, sAvatar, USER.charAt(0).toUpperCase());
        if (IS_ADMIN) dot.classList.add('active');
        else dot.classList.remove('active');
    } else {
        topAvatar.innerHTML = `<span class="letter">?</span>`;
        sAvatar.innerHTML = `<span class="letter">?</span>`;
        name.textContent = 'Гость';
        sName.textContent = 'Гость';
        dot.classList.remove('active');
    }
}

// ===== НАВИГАЦИЯ =====
function setActivePage(pageId) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    if (pageId) document.getElementById(pageId).classList.add('active');
    document.querySelectorAll('.hor-menu button').forEach(el => el.classList.remove('active'));
    const map = { feedPage: 'hFeed', groupsPage: 'hGroups', peoplePage: 'hPeople', profilePage: 'hProfile' };
    if (map[pageId]) document.getElementById(map[pageId]).classList.add('active');
}

function goToFeed() {
    if (!USER) { alert('Войдите!'); return; }
    setActivePage('feedPage');
    document.getElementById('chatView').classList.remove('active');
    if (chatUnsub) { if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value'); chatUnsub = null; }
    CURRENT_ROOM = null;
    loadFeed();
}

function goToGroups() {
    if (!USER) { alert('Войдите!'); return; }
    setActivePage('groupsPage');
    document.getElementById('chatView').classList.remove('active');
    if (chatUnsub) { if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value'); chatUnsub = null; }
    CURRENT_ROOM = null;
    loadGroups();
}

function goToPeople() {
    if (!USER) { alert('Войдите!'); return; }
    setActivePage('peoplePage');
    document.getElementById('chatView').classList.remove('active');
    if (chatUnsub) { if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value'); chatUnsub = null; }
    CURRENT_ROOM = null;
    loadPeople();
}

function goToProfile() {
    if (!USER) { alert('Войдите!'); return; }
    VIEWING_USER = null;
    setActivePage('profilePage');
    document.getElementById('chatView').classList.remove('active');
    if (chatUnsub) { if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value'); chatUnsub = null; }
    CURRENT_ROOM = null;
    loadProfile();
}

// ===== ЛЮДИ =====
function loadPeople() {
    if (!USER_UID) return;
    const el = document.getElementById('peopleList');
    if (!el) return;
    
    safeFirebaseQuery('people', db.ref('sites/' + SITE + '/all_users'), (snap) => {
        const users = snap.val() || {};
        const keys = Object.keys(users).filter(k => {
            if (k === USER_UID) return false;
            if (!users[k] || !users[k].name) return false;
            return true;
        });
        
        if (!keys.length) {
            el.innerHTML = '<div style="text-align:center;padding:20px;color:#65676b;">😕 Нет других пользователей</div>';
            return;
        }
        
        el.innerHTML = '';
        keys.forEach(k => {
            const u = users[k];
            const name = u.name || 'Аноним';
            const letter = name.charAt(0).toUpperCase();
            const div = document.createElement('div');
            div.className = 'people-item';
            div.innerHTML = `
                <span class="avatar-wrap" id="pava-${k}"><span class="letter">${letter}</span></span>
                <div class="info">
                    <div class="name">${esc(name)}</div>
                    <div class="status">Нажмите для просмотра</div>
                </div>
            `;
            div.onclick = () => viewUser(k);
            el.appendChild(div);
            renderAvatar(k, document.getElementById('pava-' + k), letter);
        });
    });
}

// ===== ГРУППЫ =====
const GROUPS = [
    { id: 'general', name: 'Общий', icon: '🌍' },
    { id: 'sport', name: 'Спорт', icon: '⚽' },
    { id: 'games', name: 'Игры', icon: '🎮' },
    { id: 'movies', name: 'Кино', icon: '🎬' },
    { id: 'music', name: 'Музыка', icon: '🎵' },
    { id: 'tech', name: 'Технологии', icon: '💻' },
    { id: 'food', name: 'Еда', icon: '🍕' },
    { id: 'travel', name: 'Путешествия', icon: '✈️' },
    { id: 'fashion', name: 'Мода', icon: '👗' },
    { id: 'science', name: 'Наука', icon: '🔬' }
];

function loadGroups() {
    if (!USER_UID) return;
    const el = document.getElementById('groupList');
    if (!el) return;
    
    let html = '';
    GROUPS.forEach(room => {
        db.ref('sites/' + SITE + '/rooms/' + room.id + '/count').on('value', snap => {
            const count = snap.val() || 0;
            const countEl = document.querySelector(`#groupList .group-card[data-id="${room.id}"] .count`);
            if (countEl) countEl.textContent = count;
        });
        html += `
            <div class="group-card" data-id="${room.id}" onclick="openGroup('${room.id}')">
                <div class="icon">${room.icon}</div>
                <div class="name">${room.name}</div>
                <div class="count">👥 <span class="count">0</span></div>
            </div>
        `;
    });
    el.innerHTML = html;
}

function openGroup(id) {
    if (!USER) { alert('Войдите!'); return; }
    CURRENT_ROOM = id;
    document.getElementById('chatView').classList.add('active');
    setActivePage(null);
    loadChat('rooms/' + SITE + '_' + id + '/messages');
    closeSidebar();
}

// ===== ЧАТ =====
function loadChat(path) {
    if (chatUnsub) { if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value'); chatUnsub = null; }
    const box = document.getElementById('chatMessages');
    box.innerHTML = '<div style="color:#65676b;text-align:center;padding:20px;">⏳ Загрузка...</div>';
    chatUnsub = path;
    db.ref(path).orderByChild('timestamp').on('value', snap => {
        box.innerHTML = '';
        if (!snap.exists()) {
            box.innerHTML = '<div style="color:#65676b;text-align:center;padding:20px;">Сообщений нет</div>';
            return;
        }
        snap.forEach(s => {
            const m = s.val();
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `
                <span class="author">${esc(m.nick || '?')}</span>
                <span class="time">${m.time || ''}</span>
                <div>${esc(m.text || '')}</div>
            `;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

function sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !CURRENT_ROOM) return;
    db.ref('rooms/' + SITE + '_' + CURRENT_ROOM + '/messages').push({
        nick: USER,
        text: text,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        timestamp: Date.now()
    });
    input.value = '';
}

document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChat(); });

function closeChat() {
    document.getElementById('chatView').classList.remove('active');
    if (chatUnsub) { if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value'); chatUnsub = null; }
    CURRENT_ROOM = null;
    goToFeed();
}

// ===== ПРОФИЛЬ =====
function viewUser(uid) {
    if (uid === USER_UID) { goToProfile(); return; }
    VIEWING_USER = uid;
    setActivePage('profilePage');
    loadProfile();
}

function loadProfile() {
    const uid = VIEWING_USER || USER_UID;
    if (!uid) return;
    
    db.ref('sites/' + SITE + '/users/' + uid).once('value', snap => {
        const u = snap.val() || {};
        document.getElementById('profileName').textContent = u.name || USER || 'Гость';
        document.getElementById('profileBio').textContent = u.bio || 'Привет!';
        const avatar = document.getElementById('profileAvatar');
        renderAvatar(uid, avatar, (u.name || '?').charAt(0).toUpperCase());
    });
    
    // Загружаем друзей
    db.ref('sites/' + SITE + '/friends/' + uid).on('value', snap => {
        const data = snap.val() || {};
        const keys = Object.keys(data);
        document.getElementById('friendsCount').textContent = keys.length;
        const el = document.getElementById('friendList');
        if (!keys.length) {
            el.innerHTML = '<span style="color:#bbb;font-size:0.6rem;">Нет друзей</span>';
            return;
        }
        let html = '';
        keys.forEach(k => {
            db.ref('sites/' + SITE + '/users/' + k).once('value', usnap => {
                const u = usnap.val() || {};
                const name = u.name || 'Аноним';
                const letter = name.charAt(0).toUpperCase();
                html += `<span class="friend-item" onclick="viewUser('${k}')">
                    <span class="avatar-wrap" id="fava-${k}"><span class="letter">${letter}</span></span> ${esc(name)}
                </span>`;
                el.innerHTML = html;
                keys.forEach(k2 => {
                    const el2 = document.getElementById('fava-' + k2);
                    if (el2) renderAvatar(k2, el2, '?');
                });
            });
        });
    });
}

// ===== ЛЕНТА =====
function loadFeed() {
    if (!USER_UID) {
        document.getElementById('feed').innerHTML = '<div style="text-align:center;padding:30px;color:#bbb;">Войдите</div>';
        return;
    }
    
    db.ref('sites/' + SITE + '/feed_posts').orderByChild('timestamp').on('value', snap => {
        const el = document.getElementById('feed');
        el.innerHTML = '';
        const data = snap.val() || {};
        const keys = Object.keys(data).sort((a, b) => (data[b].timestamp || 0) - (data[a].timestamp || 0));
        
        if (!keys.length) {
            el.innerHTML = '<div style="text-align:center;padding:30px;color:#bbb;">Пока пусто</div>';
            return;
        }
        
        keys.forEach(k => {
            const p = data[k];
            p.id = k;
            el.appendChild(renderPost(p));
        });
    });
}

function renderPost(p) {
    const div = document.createElement('div');
    div.className = 'post';
    div.dataset.id = p.id;
    
    const letter = (p.author || '?').charAt(0).toUpperCase();
    
    let marqueeHtml = p.marquee ? `<div class="marquee"><span>${esc(p.marquee)}</span></div>` : '';
    let textHtml = esc(p.text || '');
    let imgHtml = p.img ? `<img src="${p.img}" class="post-img" onclick="window.open(this.src)">` : '';
    
    let buttonsHtml = '';
    if (p.buttons && p.buttons.length > 0) {
        buttonsHtml = '<div class="buttons-wrap">';
        p.buttons.forEach(btn => {
            if (btn.url) {
                buttonsHtml += `<a href="${esc(btn.url)}" target="_blank" class="btn-item">${esc(btn.label || '🔗 Перейти')}</a>`;
            }
        });
        buttonsHtml += '</div>';
    }
    
    let previewHtml = '';
    if (p.link) {
        previewHtml = `<div class="link-preview"><iframe src="${p.link}" sandbox="allow-scripts allow-same-origin allow-popups"></iframe></div>`;
    }
    
    let hashtagsHtml = '';
    if (p.hashtags && p.hashtags.length > 0) {
        hashtagsHtml = '<div class="hashtags">';
        p.hashtags.forEach(tag => {
            hashtagsHtml += `<span class="tag">${esc(tag)}</span>`;
        });
        hashtagsHtml += '</div>';
    }
    
    div.innerHTML = `
        ${marqueeHtml}
        <div class="author">
            <span class="avatar-wrap" id="post-avatar-${p.id}"><span class="letter">${letter}</span></span>
            <span class="name" onclick="viewUser('${p.authorUid || ''}')">${esc(p.author || 'Аноним')}</span>
            <span class="time">${p.time || ''}${p.edited ? ' (ред.)' : ''}</span>
        </div>
        <div class="text">${textHtml}</div>
        ${imgHtml}
        ${buttonsHtml}
        ${previewHtml}
        ${hashtagsHtml}
    `;
    
    if (p.authorUid) {
        const avatarEl = document.getElementById('post-avatar-' + p.id);
        if (avatarEl) renderAvatar(p.authorUid, avatarEl, letter);
    }
    
    return div;
}

// ===== УВЕДОМЛЕНИЯ =====
function loadNotifications() {
    if (!USER_UID) return;
    if (notifUnsub) { notifUnsub(); notifUnsub = null; }
    
    const ref = db.ref('sites/' + SITE + '/notifications/' + USER_UID).orderByChild('timestamp').limitToLast(20);
    notifUnsub = ref.on('value', snap => {
        const notifications = snap.val() || {};
        const keys = Object.keys(notifications).sort((a, b) => 
            (notifications[b].timestamp || 0) - (notifications[a].timestamp || 0)
        );
        const unread = keys.filter(k => !notifications[k].read);
        const badge = document.getElementById('notifBadge');
        if (badge) {
            if (unread.length > 0) {
                badge.style.display = 'inline';
                badge.textContent = unread.length;
            } else {
                badge.style.display = 'none';
            }
        }
    });
}

function openNotifications() {
    alert('🔔 Уведомления: ' + (document.getElementById('notifBadge').textContent || '0'));
}

// ===== САЙДБАР =====
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
}

// ===== ПЛЕЕР (РАБОЧИЙ) =====
const PLAYLIST = [{ name: 'ONE IN BILLION', url: 'https://raw.githubusercontent.com/Metaimperia/MyWebSite-MyEcosystem/main/ONE-IN-BILLION.mp3' }];
let currentTrack = 0, isPlaying = false, eqInterval = null, audio = null;

function initAudio() {
    if (!audio) {
        audio = new Audio(PLAYLIST[currentTrack].url);
        audio.crossOrigin = 'anonymous';
        audio.addEventListener('ended', () => {
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶';
            stopEq();
        });
    }
    document.getElementById('trackName').textContent = PLAYLIST[currentTrack].name;
}

function playMusic() {
    initAudio();
    if (!audio) return;
    if (isPlaying) {
        audio.pause();
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶';
        stopEq();
    } else {
        audio.play().catch(e => console.log('Ошибка:', e));
        isPlaying = true;
        document.getElementById('playBtn').textContent = '⏸';
        startEq();
    }
}

function prevTrack() {
    currentTrack = (currentTrack - 1 + PLAYLIST.length) % PLAYLIST.length;
    if (audio) { audio.src = PLAYLIST[currentTrack].url; if (isPlaying) audio.play().catch(() => {}); }
    document.getElementById('trackName').textContent = PLAYLIST[currentTrack].name;
}

function nextTrack() {
    currentTrack = (currentTrack + 1) % PLAYLIST.length;
    if (audio) { audio.src = PLAYLIST[currentTrack].url; if (isPlaying) audio.play().catch(() => {}); }
    document.getElementById('trackName').textContent = PLAYLIST[currentTrack].name;
}

function startEq() {
    if (eqInterval) return;
    eqInterval = setInterval(() => {
        document.querySelectorAll('.eq-bars .bar').forEach(bar => {
            bar.style.height = 2 + Math.random() * 14 + 'px';
        });
    }, 100);
}

function stopEq() {
    if (eqInterval) { clearInterval(eqInterval); eqInterval = null; }
    document.querySelectorAll('.eq-bars .bar').forEach(bar => bar.style.height = '4px');
}

// ===== ЗАПУСК =====
document.addEventListener('DOMContentLoaded', function() {
    initAudio();
    updateUI();
    goToFeed();
});

window.goToFeed = goToFeed;
window.goToGroups = goToGroups;
window.goToPeople = goToPeople;
window.goToProfile = goToProfile;

window.loginName = loginName;
