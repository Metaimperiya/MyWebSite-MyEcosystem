<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAIMPERIYA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

    <!-- ===== ШАПКА ===== -->
    <header class="topbar" id="topbar">
        <div class="left">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <span class="logo" onclick="goToFeed()">METAIMPERIYA 🏴‍☠️</span>
        </div>
        <div class="right">
            <div class="avatar-wrap" id="topAvatar"><span class="letter" id="topAvatarLetter">?</span></div>
            <span class="username" id="topName">Гость</span>
            <button class="menu-dots" onclick="toggleSettingsMenu()">⋮</button>
            <div id="settingsMenu" class="settings-dropdown">
                <div class="settings-item" onclick="logout()">🚪 Выйти</div>
            </div>
        </div>
    </header>

    <!-- ===== ПЛЕЕР ===== -->
    <div class="player-handle" onclick="togglePlayer()">
        <div class="handle-bar"></div>
        <div class="handle-label">🎵 ПЛЕЕР</div>
    </div>

    <div class="player-drawer" id="playerDrawer">
        <div class="player-content">
            <div class="player-track-info">
                <div class="player-track-name" id="trackName">Нет трека</div>
                <div class="player-artist" id="trackArtist">PLAYER Likee</div>
            </div>
            <div class="player-controls">
                <button class="player-btn" onclick="prevTrack()">⏮</button>
                <button class="player-btn play-large" onclick="togglePlay()" id="playBtn">▶</button>
                <button class="player-btn" onclick="nextTrack()">⏭</button>
            </div>
            <div class="player-progress">
                <div class="player-progress-bar" onclick="seekTrack(event)">
                    <div class="player-progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <div class="player-time">
                    <span id="currentTime">00:00</span>
                    <span id="totalTime">00:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <div class="container">
        <div class="page active" id="page-feed">
            <div id="feed"></div>
        </div>
    </div>

    <!-- ===== МОДАЛКА ВХОДА ===== -->
    <div class="modal" id="loginModal">
        <div class="modal-box">
            <h3>Вход</h3>
            <input type="text" id="nameInput" placeholder="Ваше имя">
            <div class="modal-actions">
                <button class="btn-save" onclick="loginWithName()">Войти</button>
            </div>
        </div>
    </div>

</div>

<!-- ===== СКРИПТЫ ===== -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
// ================================================================
// FIREBASE
// ================================================================
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const SITE = 'default';

// ================================================================
// ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
// ================================================================
let USER = null;
let USER_UID = null;
let currentTrack = 0;
let isPlaying = false;
let audio = new Audio();

// ================================================================
// ШАПКА - ОБНОВЛЕНИЕ ИМЕНИ
// ================================================================
function updateTopbar() {
    let name = localStorage.getItem('dc_u_') || localStorage.getItem('dc_u_default') || USER || 'Гость';
    document.getElementById('topName').textContent = name;
    document.getElementById('topAvatarLetter').textContent = name === 'Гость' ? '?' : name.charAt(0).toUpperCase();
}

// ================================================================
// ВХОД
// ================================================================
window.loginWithName = function() {
    let input = document.getElementById('nameInput');
    if (!input) return;
    let name = input.value.trim();
    if (!name) { alert('Введите имя'); return; }
    
    USER = name;
    USER_UID = 'user_' + Date.now();
    localStorage.setItem('dc_u_', name);
    localStorage.setItem('dc_u_default', name);
    localStorage.setItem('dc_uid_', USER_UID);
    
    document.getElementById('loginModal').classList.remove('open');
    updateTopbar();
    if (typeof loadFeed === 'function') loadFeed();
};

// ================================================================
// ВЫХОД
// ================================================================
window.logout = function() {
    if (!confirm('Выйти?')) return;
    localStorage.removeItem('dc_u_');
    localStorage.removeItem('dc_u_default');
    localStorage.removeItem('dc_uid_');
    USER = null;
    USER_UID = null;
    document.getElementById('topName').textContent = 'Гость';
    document.getElementById('topAvatarLetter').textContent = '?';
    document.getElementById('loginModal').classList.add('open');
};

// ================================================================
// ПЛЕЕР
// ================================================================
const tracks = [
    { name: 'Track 1', artist: 'PLAYER Likee', url: '/music/track1.mp3' },
    { name: 'Track 2', artist: 'PLAYER Likee', url: '/music/track2.mp3' },
    { name: 'Track 3', artist: 'PLAYER Likee', url: '/music/track3.mp3' }
];

window.togglePlayer = function() {
    document.getElementById('playerDrawer').classList.toggle('open');
};

window.togglePlay = function() {
    if (isPlaying) {
        audio.pause();
        document.getElementById('playBtn').textContent = '▶';
    } else {
        if (!audio.src) {
            loadTrack(currentTrack);
        }
        audio.play();
        document.getElementById('playBtn').textContent = '⏸';
    }
    isPlaying = !isPlaying;
};

function loadTrack(index) {
    let track = tracks[index];
    if (!track) return;
    audio.src = track.url;
    document.getElementById('trackName').textContent = track.name;
    document.getElementById('trackArtist').textContent = track.artist;
    audio.load();
    audio.play();
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
}

window.nextTrack = function() {
    currentTrack = (currentTrack + 1) % tracks.length;
    loadTrack(currentTrack);
};

window.prevTrack = function() {
    currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
    loadTrack(currentTrack);
};

window.seekTrack = function(e) {
    let bar = e.currentTarget;
    let rect = bar.getBoundingClientRect();
    let x = (e.clientX - rect.left) / rect.width;
    audio.currentTime = x * audio.duration;
};

audio.addEventListener('timeupdate', function() {
    let progress = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = progress + '%';
    document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
    document.getElementById('totalTime').textContent = formatTime(audio.duration);
});

function formatTime(seconds) {
    if (!seconds) return '00:00';
    let m = Math.floor(seconds / 60);
    let s = Math.floor(seconds % 60);
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

// ================================================================
// ЗАГРУЗКА
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
    let saved = localStorage.getItem('dc_u_') || localStorage.getItem('dc_u_default');
    if (saved) {
        USER = saved;
        USER_UID = localStorage.getItem('dc_uid_') || null;
        updateTopbar();
    } else {
        document.getElementById('loginModal').classList.add('open');
    }
    
    // Обновляем шапку каждые 2 секунды
    setInterval(updateTopbar, 2000);
});
</script>

</body>
</html>
