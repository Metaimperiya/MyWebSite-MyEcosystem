<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>METAIMPERIYA</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/mobile.css" />

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>

<!-- ШАПКА -->
<header class="header">
    <div class="left"><h2 onclick="navigateToFeed()">🏠 METAIMPERIYA</h2></div>
    <div class="right">
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="notif-btn" onclick="openNotifications()" id="notifBtn">
            🔔<span class="badge" id="notifBadge" style="display:none;">0</span>
        </button>
        <div class="avatar-small" id="headerAvatar" onclick="navigateToProfile(USER_UID)"><span>?</span></div>
    </div>
</header>

<!-- АДМИН-ПАНЕЛЬ -->
<div class="admin-panel" id="adminPanel">
    <span style="font-weight:600;color:#1877f2;">👑 Админ-панель</span>
    <button class="btn-action admin-only" onclick="adminDeleteAllUsers()" style="background:#e74c3c;color:white;">🗑 Удалить всех</button>
    <button class="btn-action admin-only" onclick="adminClearRooms()" style="background:#e74c3c;color:white;">🧹 Очистить комнаты</button>
    <button class="btn-action admin-only" onclick="adminClearNotifications()" style="background:#e74c3c;color:white;">🔔 Очистить уведомления</button>
    <button class="btn-action admin-only" onclick="adminExportData()" style="background:#27ae60;color:white;">📤 Экспорт</button>
</div>

<!-- МЕНЮ -->
<nav class="tab-bar">
    <button class="tab active" onclick="showTab('feed')">📰 Лента</button>
    <button class="tab" onclick="showTab('groups')">👥 Группы</button>
    <button class="tab" onclick="showTab('people')">👤 Люди</button>
</nav>

<!-- СТРАНИЦЫ -->
<section id="feedPage" class="page active"><div class="card"><h3>📰 Лента</h3><div id="feedPosts"></div></div></section>
<section id="groupsPage" class="page hidden"><div class="card"><h3>👥 Группы</h3><div id="roomsList" class="room-grid"></div></div></section>
<section id="peoplePage" class="page hidden"><div class="card"><h3>👤 Все пользователи</h3><div id="peopleList"></div></div></section>
<section id="profilePage" class="page hidden"><div id="profileContent"></div></section>

<!-- ЧАТ -->
<div class="chat-window" id="chatWindow">
    <div class="chat-header"><span class="title" id="chatTitle">💬 Чат</span><button class="close-btn" onclick="closeChat()">✕</button></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
        <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()">→</button>
    </div>
</div>

<!-- КОНТЕКСТНОЕ МЕНЮ -->
<div class="context-menu" id="contextMenu">
    <button class="menu-item" onclick="editProfile();closeContextMenu();"><span class="icon">✏️</span> Редактировать</button>
    <button class="menu-item" onclick="uploadAvatar();closeContextMenu();"><span class="icon">📷</span> Сменить аватар</button>
    <div class="menu-divider"></div>
    <button class="menu-item danger" onclick="logout();closeContextMenu();"><span class="icon">🚪</span> Выйти</button>
</div>
<div class="context-overlay" id="contextOverlay" onclick="closeContextMenu()"></div>

<!-- УВЕДОМЛЕНИЯ -->
<div class="modal" id="notificationsModal">
    <div class="modal-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <h3>🔔 Уведомления</h3>
            <button onclick="closeNotifications()" style="background:none;border:none;font-size:22px;cursor:pointer;">✕</button>
        </div>
        <div id="notificationsList"></div>
    </div>
</div>

<!-- ВХОД -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h3>👤 Вход</h3>
        <button class="google-btn" id="googleBtn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"> Войти через Google</button>
        <div style="text-align:center;margin:8px 0;color:#65676b;">или</div>
        <div style="display:flex;gap:8px;">
            <input type="text" id="nameInput" placeholder="Введите имя" style="flex:1;">
            <button class="btn-action" onclick="loginName()" style="background:#1877f2;color:white;padding:8px 14px;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Войти</button>
        </div>
        <div id="savedProfiles" style="margin-top:12px;border-top:1px solid #e4e6eb;padding-top:12px;">
            <p style="color:#65676b;font-size:13px;">📱 Сохраненные профили:</p>
            <div id="profileSelector" class="profile-selector"></div>
        </div>
    </div>
</div>

<!-- РЕДАКТИРОВАНИЕ ПРОФИЛЯ -->
<div class="modal" id="editProfileModal">
    <div class="modal-content">
        <h3>✏️ Редактировать</h3>
        <input type="text" id="editName" placeholder="Имя">
        <input type="text" id="editBio" placeholder="О себе">
        <div class="btns">
            <button class="cancel" onclick="closeEditProfile()">Отмена</button>
            <button class="save" onclick="saveProfile()">Сохранить</button>
        </div>
    </div>
</div>

<!-- СКРИПТЫ -->
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
<script src="js/friends.js"></script>
<script src="js/chat.js"></script>
<script src="js/groups.js"></script>
<script src="js/notifications.js"></script>
<script src="js/feed.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
