<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METAIMPERIYA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
            min-height: 100vh;
        }
        
        .header {
            background: #1877f2;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(24, 119, 242, 0.3);
        }
        
        .header .left h2 { font-size: 20px; font-weight: 700; }
        
        .header .right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header .notif-btn {
            position: relative;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .header .notif-btn:hover { background: rgba(255,255,255,0.25); }
        
        .header .notif-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #e74c3c;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }
        
        .header .avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
        }
        
        .header .avatar-small:hover { border-color: white; transform: scale(1.05); }
        .header .avatar-small img { width: 100%; height: 100%; object-fit: cover; }
        
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: white;
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            color: #65676b;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .tab:hover { background: #f0f2f5; }
        .tab.active { background: #1877f2; color: white; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        
        .card h3 {
            font-size: 17px;
            color: #050505;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            height: 60px;
            border-bottom: 1px solid #e4e6eb;
            transition: background 0.15s;
            gap: 12px;
            cursor: default;
        }
        
        .user-item:hover { background: #f0f2f5; border-radius: 8px; }
        .user-item:last-child { border-bottom: none; }
        
        .user-item .avatar {
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 50%;
            background: #e4e6eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #65676b;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
        }
        
        .user-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .user-item .info {
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }
        
        .user-item .info .name {
            font-size: 15px;
            font-weight: 600;
            color: #050505;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-item .info .email { display: none; }
        
        .user-item .actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 14px;
            height: 32px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            white-space: nowrap;
            background: #e4e6eb;
            color: #050505;
        }
        
        .btn-action:hover { background: #d8dadf; }
        .btn-action:active { transform: scale(0.95); }
        
        .btn-message {
            background: #e4e6eb;
            color: #050505;
            min-width: 32px;
            padding: 6px 12px;
        }
        
        .btn-message:hover { background: #d8dadf; }
        .btn-message .icon { font-size: 15px; line-height: 1; }
        
        .btn-friend {
            min-width: 80px;
            padding: 6px 14px;
            background: #e4e6eb;
            color: #050505;
        }
        
        .btn-friend:hover { background: #d8dadf; }
        .btn-friend.add { background: #e4e6eb; color: #050505; }
        .btn-friend.add:hover { background: #d8dadf; }
        
        .btn-friend.pending {
            background: #e4e6eb;
            color: #050505;
            opacity: 0.7;
            cursor: pointer;
        }
        
        .btn-friend.pending:hover { background: #d8dadf; opacity: 0.9; }
        
        .btn-friend.friend {
            background: #e4e6eb;
            color: #050505;
        }
        
        .btn-friend.friend:hover { background: #d8dadf; }
        .btn-friend .icon { font-size: 14px; line-height: 1; margin-right: 4px; }
        .btn-message .icon { font-size: 14px; line-height: 1; }
        
        .profile-card {
            background: white;
            border-radius: 12px;
            padding: 30px 20px 24px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 12px;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e4e6eb;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: #65676b;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid #e4e6eb;
        }
        
        .profile-avatar:hover { border-color: #1877f2; transform: scale(1.02); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-name {
            font-size: 22px;
            font-weight: 700;
            color: #050505;
        }
        
        .profile-email {
            font-size: 14px;
            color: #65676b;
            margin-top: 4px;
        }
        
        .profile-bio {
            font-size: 14px;
            color: #65676b;
            margin-top: 8px;
        }
        
        .stat-tabs {
            display: flex;
            gap: 8px;
            margin: 16px 0 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .stat-tab {
            padding: 6px 14px;
            border: none;
            background: #e4e6eb;
            color: #65676b;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .stat-tab:hover { background: #d8dadf; }
        .stat-tab.active { background: #1877f2; color: white; }
        .stat-tab .count {
            background: rgba(0,0,0,0.05);
            padding: 0 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 4px;
        }
        .stat-tab.active .count { background: rgba(255,255,255,0.2); }
        
        .stat-container {
            padding: 8px 0;
            min-height: 60px;
        }
        
        .stat-empty {
            color: #65676b;
            font-size: 14px;
            padding: 20px 0;
            text-align: center;
        }
        
        .chat-window {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            max-width: calc(100% - 40px);
            height: 500px;
            max-height: calc(100% - 100px);
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 9999;
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: chatSlideUp 0.25s ease;
        }
        
        .chat-window.active { display: flex; }
        
        @keyframes chatSlideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .chat-window .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #e4e6eb;
            background: #1877f2;
            color: white;
            flex-shrink: 0;
        }
        
        .chat-window .chat-header .title { font-weight: 600; font-size: 15px; }
        
        .chat-window .chat-header .close-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .chat-window .chat-header .close-btn:hover { background: rgba(255,255,255,0.25); }
        
        .chat-window .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            background: #f8f9fa;
        }
        
        .chat-window .chat-messages .msg {
            padding: 8px 14px;
            margin-bottom: 6px;
            background: white;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            max-width: 85%;
        }
        
        .chat-window .chat-messages .msg.self {
            margin-left: auto;
            background: #1877f2;
            color: white;
        }
        
        .chat-window .chat-messages .msg .author {
            font-weight: 600;
            font-size: 12px;
            color: #1877f2;
        }
        
        .chat-window .chat-messages .msg.self .author { color: rgba(255,255,255,0.7); }
        .chat-window .chat-messages .msg .time { color: #999; font-size: 10px; margin-left: 6px; }
        .chat-window .chat-messages .msg.self .time { color: rgba(255,255,255,0.6); }
        
        .chat-window .chat-input-wrap {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #e4e6eb;
            background: white;
            flex-shrink: 0;
        }
        
        .chat-window .chat-input-wrap input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e4e6eb;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
            font-family: inherit;
        }
        
        .chat-window .chat-input-wrap input:focus { border-color: #1877f2; }
        
        .chat-window .chat-input-wrap button {
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .chat-window .chat-input-wrap button:hover { background: #4a9eff; }
        
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            padding: 8px 0;
            min-width: 200px;
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 1000;
            border: 1px solid #e4e6eb;
        }
        
        .context-menu.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        
        .context-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            color: #050505;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
        }
        
        .context-menu .menu-item:hover { background: #f0f2f5; }
        .context-menu .menu-item .icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
        .context-menu .menu-item.danger { color: #e74c3c; }
        .context-menu .menu-item.danger:hover { background: #fef0ef; }
        .context-menu .menu-divider { height: 1px; background: #e4e6eb; margin: 4px 16px; }
        .context-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 999;
            display: none;
        }
        .context-overlay.active { display: block; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal.open { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlide 0.2s ease;
        }
        
        @keyframes modalSlide {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-content h3 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #050505;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e4e6eb;
            border-radius: 8px;
            margin: 6px 0;
            font-size: 15px;
            font-family: inherit;
        }
        
        .modal-content input:focus {
            outline: none;
            border-color: #1877f2;
        }
        
        .modal-content .btns {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        
        .modal-content .btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s;
        }
        
        .modal-content .btns .cancel {
            background: #e4e6eb;
            color: #050505;
        }
        
        .modal-content .btns .cancel:hover { background: #d8dadf; }
        .modal-content .btns .save {
            background: #1877f2;
            color: white;
        }
        .modal-content .btns .save:hover { background: #4a9eff; }
        
        .notif-item {
            padding: 12px;
            border-bottom: 1px solid #e4e6eb;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: background 0.15s;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .notif-item:hover { background: #f0f2f5; }
        .notif-item.unread { background: #f0f7ff; }
        .notif-item .notif-icon { font-size: 20px; flex-shrink: 0; }
        .notif-item .notif-text { flex: 1; font-size: 14px; }
        .notif-item .notif-time { color: #65676b; font-size: 11px; }
        .notif-item .notif-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1877f2;
            flex-shrink: 0;
        }
        
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #e4e6eb;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .google-btn:hover { background: #f0f2f5; }
        .google-btn img { width: 20px; }
        
        .profile-selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 12px 0;
        }
        
        .profile-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 2px solid #e4e6eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .profile-option:hover {
            border-color: #1877f2;
            background: #f0f7ff;
        }
        
        .profile-option .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e4e6eb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #65676b;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .profile-option .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-option .info .name { font-weight: 600; font-size: 14px; }
        .profile-option .info .email { font-size: 12px; color: #65676b; }
        .profile-option .remove-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
        }
        .profile-option .remove-btn:hover { color: #e74c3c; }
        
        .room-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .room-card {
            background: #f0f2f5;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .room-card:hover { background: #e4e6eb; transform: translateY(-2px); }
        .room-card .icon { font-size: 28px; }
        .room-card .name { font-weight: 600; margin: 4px 0; font-size: 14px; }
        .room-card .count { font-size: 13px; color: #65676b; }
        
        .hidden { display: none; }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .header { padding: 10px 16px; }
            .header .left h2 { font-size: 17px; }
            .user-item { padding: 6px 8px; height: 54px; gap: 10px; }
            .user-item .avatar { width: 34px; height: 34px; min-width: 34px; font-size: 14px; }
            .user-item .info .name { font-size: 14px; }
            .btn-action { padding: 4px 10px; height: 28px; font-size: 12px; }
            .btn-friend { min-width: 60px; }
            .user-item .actions { gap: 6px; }
            .room-grid { grid-template-columns: 1fr; }
            .profile-avatar { width: 80px; height: 80px; font-size: 32px; }
            .profile-name { font-size: 19px; }
            .chat-window { width: calc(100% - 20px); right: 10px; bottom: 10px; height: 400px; }
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <div class="left">
        <h2>🏠 METAIMPERIYA</h2>
    </div>
    <div class="right">
        <button class="notif-btn" onclick="openNotifications()" id="notifBtn">
            🔔
            <span class="badge" id="notifBadge" style="display:none;">0</span>
        </button>
        <div class="avatar-small" id="headerAvatar" onclick="goToProfile()">
            <span>?</span>
        </div>
    </div>
</div>

<!-- ===== TABS ===== -->
<div class="tab-bar">
    <button class="tab active" onclick="showTab('groups')">👥 Группы</button>
    <button class="tab" onclick="showTab('people')">👤 Люди</button>
</div>

<!-- ===== GROUPS ===== -->
<div id="groupsTab">
    <div class="card">
        <h3>👥 Группы</h3>
        <div id="roomsList" class="room-grid"></div>
    </div>
</div>

<!-- ===== PEOPLE ===== -->
<div id="peopleTab" class="hidden">
    <div class="card">
        <h3>👤 Все пользователи</h3>
        <div id="peopleList"></div>
    </div>
</div>

<!-- ===== PROFILE ===== -->
<div id="profileTab" class="hidden">
    <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">
            <span id="avatarLetter">?</span>
        </div>
        
        <div class="profile-name" id="profileName">Имя</div>
        <div class="profile-email" id="profileEmail">email@example.com</div>
        <div class="profile-bio" id="profileBio">Привет! 👋</div>
        
        <div class="stat-tabs">
            <button class="stat-tab active" onclick="switchFriendTab('friends')">
                🤝 Друзья <span class="count" id="friendsCount">0</span>
            </button>
            <button class="stat-tab" onclick="switchFriendTab('following')">
                📌 Подписки <span class="count" id="subscriptionsCount">0</span>
            </button>
            <button class="stat-tab" onclick="switchFriendTab('followers')">
                👀 Подписчики <span class="count" id="followersCount">0</span>
            </button>
        </div>
        
        <div id="friendsListContainer" class="stat-container">
            <div class="stat-empty">Загрузка...</div>
        </div>
    </div>
</div>

<!-- ===== CHAT WINDOW ===== -->
<div class="chat-window" id="chatWindow">
    <div class="chat-header">
        <span class="title" id="chatTitle">💬 Чат</span>
        <button class="close-btn" onclick="closeChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">

// ================================================================

// ================================================================
const activeRequests = new Map();

function cancelRequest(key) {
    if (activeRequests.has(key)) {
        const cancelFn = activeRequests.get(key);
        if (typeof cancelFn === 'function') {
            cancelFn();
        }
        activeRequests.delete(key);
        return true;
    }
    return false;
}

function safeFirebaseQuery(key, ref, callback) {
    cancelRequest(key);
    let isCancelled = false;
    const cancelFn = () => {
        isCancelled = true;
        activeRequests.delete(key);
    };
    activeRequests.set(key, cancelFn);
    
    ref.once('value', snap => {
        if (isCancelled) {
            console.log(`🔄 Запрос "${key}" отменен`);
            return;
        }
        activeRequests.delete(key);
        callback(snap);
    }).catch(err => {
        if (!isCancelled) {
            activeRequests.delete(key);
            console.warn(`❌ Ошибка запроса "${key}":`, err);
        }
    });
    return cancelFn;
}

function cancelAllRequests() {
    for (const [key, cancelFn] of activeRequests) {
        if (typeof cancelFn === 'function') {
            cancelFn();
        }
    }
    activeRequests.clear();
}

window.addEventListener('beforeunload', function() {
    cancelAllRequests();
    closeContextMenu();
    if (window.friendListeners) {
        Object.values(window.friendListeners).forEach(unsubscribe => {
            if (typeof unsubscribe === 'function') unsubscribe();

});

const SITE = (window.location.hostname || 'local').replace(/\./g, '_');

window.friendListeners = {};

let menuState = { isOpen: false, isAnimating: false };

// ================================================================
// КОНТЕКСТНОЕ МЕНЮ
// ================================================================
function openProfileMenu(event) {
    if (menuState.isAnimating) return;
    event.stopPropagation();
    event.preventDefault();
    
    const menu = document.getElementById('contextMenu');
    const overlay = document.getElementById('contextOverlay');
    const avatar = document.getElementById('profileAvatar');
    if (!menu || !avatar) return;
    if (menu.classList.contains('open')) {
        closeContextMenu();
        return;
    }
    const rect = avatar.getBoundingClientRect();
    const menuWidth = 200;
    const leftPos = Math.max(10, rect.left + rect.width / 2 - menuWidth / 2);
    const topPos = Math.min(rect.bottom + 10, window.innerHeight - 250);
    menu.style.left = leftPos + 'px';
    menu.style.top = topPos + 'px';
    menuState.isAnimating = true;
    menu.classList.add('open');
    overlay.classList.add('active');
    setTimeout(() => {
        menuState.isAnimating = false;
        menuState.isOpen = true;
    }, 200);
}

function closeContextMenu() {
    if (menuState.isAnimating) return;
    const menu = document.getElementById('contextMenu');
    const overlay = document.getElementById('contextOverlay');
    menuState.isAnimating = true;
    if (menu) menu.classList.remove('open');
    if (overlay) overlay.classList.remove('active');
    setTimeout(() => {
        menuState.isAnimating = false;
        menuState.isOpen = false;
    }, 200);
}

document.addEventListener('click', function(e) {
    const menu = document.getElementById('contextMenu');
    const avatar = document.getElementById('profileAvatar');
    if (!menu || !menu.classList.contains('open')) return;
    const isClickInsideMenu = menu.contains(e.target);
    const isClickOnAvatar = avatar && (e.target === avatar || avatar.contains(e.target));
    if (!isClickInsideMenu && !isClickOnAvatar) {
        closeContextMenu();
    }
});

document.addEventListener('DOMContentLoaded', function() {
    const profileAvatar = document.getElementById('profileAvatar');
    if (profileAvatar) {
        profileAvatar.addEventListener('click', openProfileMenu);
    }
});

// ================================================================
// СОХРАНЕННЫЕ ПРОФИЛИ
// ================================================================
function loadSavedProfiles() {
    try {
        const saved = localStorage.getItem('dc_profiles_' + SITE);
        SAVED_PROFILES = saved ? JSON.parse(saved) : [];
    } catch(e) {
        SAVED_PROFILES = [];
    }
    renderSavedProfiles();
}

function saveProfileToList(uid, name, email, avatarUrl) {
    const existing = SAVED_PROFILES.find(p => p.uid === uid);
    if (!existing) {
        SAVED_PROFILES.push({
            uid: uid,
            name: name,
            email: email || 'anon',
            avatarUrl: avatarUrl || null,
            lastUsed: Date.now()
        });
    } else {
        existing.name = name;
        existing.email = email || 'anon';
        existing.avatarUrl = avatarUrl || null;
        existing.lastUsed = Date.now();
    }
    localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
    renderSavedProfiles();
}

function renderSavedProfiles() {
    const container = document.getElementById('profileSelector');
    if (!container) return;
    if (SAVED_PROFILES.length === 0) {
        container.innerHTML = '<div style="color:#65676b;text-align:center;padding:10px;font-size:14px;">Нет сохраненных профилей</div>';
        return;
    }
    const sorted = [...SAVED_PROFILES].sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
    container.innerHTML = sorted.map(p => {
        const letter = (p.name || '?').charAt(0).toUpperCase();
        const avatarHtml = p.avatarUrl ? `<img src="${p.avatarUrl}">` : `<span>${letter}</span>`;
        return `
            <div class="profile-option" onclick="loginWithSavedProfile('${p.uid}')">
                <div class="avatar">${avatarHtml}</div>
                <div class="info">
                    <div class="name">${p.name || 'Аноним'}</div>
                    <div class="email">${p.email || ''}</div>
                </div>
                <button class="remove-btn" onclick="event.stopPropagation();removeSavedProfile('${p.uid}')">✕</button>
            </div>
        `;
    }).join('');
}

window.removeSavedProfile = function(uid) {
    if (!confirm('Удалить сохраненный профиль?')) return;
    SAVED_PROFILES = SAVED_PROFILES.filter(p => p.uid !== uid);
    localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
    renderSavedProfiles();
};

window.loginWithSavedProfile = function(uid) {
    const profile = SAVED_PROFILES.find(p => p.uid === uid);
    if (!profile) return;
    auth.signInAnonymously().then(() => {

    safeFirebaseQuery('loadRooms', db.ref('sites/' + SITE + '/rooms'), (snap) => {
        const rooms = snap.val() || {};
        if (Object.keys(rooms).length === 0) {
            createDefaultRooms();
            return;
        }
        let html = '';
        Object.keys(rooms).forEach(roomId => {
            const room = rooms[roomId];
            safeFirebaseQuery('roomUsers_' + roomId, db.ref('sites/' + SITE + '/room_users/' + roomId), (snap) => {
                const users = snap.val() || {};
                const count = Object.keys(users).length;
                const countEl = document.querySelector(`#room-${roomId} .count`);
                if (countEl) countEl.textContent = count;
            });
            html += `
                <div class="room-card" id="room-${roomId}" onclick="joinRoom('${roomId}')">
                    <div class="icon">${room.icon || '👥'}</div>
                    <div class="name">${room.name}</div>
                    <div class="count">👥 <span class="count">0</span></div>
                </div>
            `;
        });
        el.innerHTML = html;
    });
}

}

function updateFriendStatus(myUid, targetUid, status) {
    if (!myUid || !targetUid) {
        console.error('❌ Ошибка: отсутствуют UID');
        return;
    }
    
    const updates = {};
    const path1 = 'sites/' + SITE + '/friends/' + myUid + '/' + targetUid;
    const path2 = 'sites/' + SITE + '/friends/' + targetUid + '/' + myUid;
    
    if (status === 'friend') {
        updates[path1] = 'friend';
        updates[path2] = 'friend';
        updates['sites/' + SITE + '/followers/' + targetUid + '/' + myUid] = true;
    } else if (status === 'pending') {
        updates[path1] = 'pending';
        updates[path2] = 'pending';
        updates['sites/' + SITE + '/followers/' + targetUid + '/' + myUid] = true;
    } else if (status === null) {
        updates[path1] = null;
        updates[path2] = null;
        updates['sites/' + SITE + '/followers/' + targetUid + '/' + myUid] = null;
    }
    
    db.ref().update(updates)
        .then(() => {
            console.log(`✅ Статус "${status}" установлен для ${myUid} и ${targetUid}`);
        })
        .catch(err => {
            console.error('❌ Ошибка обновления статуса:', err);
        });
}

// ================================================================
// ФУНКЦИИ УПРАВЛЕНИЯ ДРУЗЬЯМИ
// ================================================================

function sendFriendRequest(targetUid) {
    if (!USER_UID) { alert('Войдите!'); return; }
    if (targetUid === USER_UID) { alert('Нельзя добавить себя'); return; }
    
    db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid).once('value', snap => {
        const status = snap.val();
        
        if (status === 'friend') {
            alert('✅ Уже в друзьях');
            return;
        }
        
        if (status === 'pending') {
            updateFriendStatus(USER_UID, targetUid, null);
            return;
        }
        
        updateFriendStatus(USER_UID, targetUid, 'pending');
        
        sendNotification(targetUid, {
            type: 'friend_request',
            from: USER_UID,
            text: `${USER} отправил(а) запрос в друзья`,
            timestamp: Date.now()
        });
    });
}

function acceptFriendRequest(targetUid) {
    if (!USER_UID) { alert('Войдите!'); return; }
    updateFriendStatus(USER_UID, targetUid, 'friend');
    sendNotification(targetUid, {
        type: 'friend_accepted',
        from: USER_UID,
        text: `${USER} принял(а) ваш запрос в друзья`,
        timestamp: Date.now()
    });

// ================================================================

function listenFriendStatus(targetUid) {
    if (!USER_UID || !targetUid) return;
    
    if (window.friendListeners && window.friendListeners[targetUid]) {
        window.friendListeners[targetUid]();
        delete window.friendListeners[targetUid];
    }
    
    if (!window.friendListeners) {
        window.friendListeners = {};
    }
    
    const ref = db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid);
    const onValue = snap => {
        const status = snap.val();
        updateFriendButtonInline(targetUid, status || 'none');
    };
    
    // ИСПОЛЬЗУЕМ on('value') ДЛЯ РЕАЛЬНОГО ВРЕМЕНИ
    ref.on('value', onValue);
    
    window.friendListeners[targetUid] = () => {
        ref.off('value', onValue);
        delete window.friendListeners[targetUid];
    };
    
    return window.friendListeners[targetUid];
}

function updateFriendButtonInline(uid, status) {
    const btn = document.getElementById('friend-btn-' + uid);
    if (!btn) return;
    
    btn.className = 'btn-action btn-friend';
    btn.disabled = false;
    
    if (status === 'friend') {
        btn.innerHTML = `<span class="icon">✓</span> В друзьях`;
        btn.classList.add('friend');
        btn.title = 'В друзьях (нажмите чтобы удалить)';
        btn.onclick = () => removeFriend(uid);
    } else if (status === 'pending') {
        btn.innerHTML = `<span class="icon">⏳</span> Запрос`;
        btn.classList.add('pending');
        btn.title = 'Запрос отправлен (нажмите чтобы отменить)';
        btn.onclick = () => sendFriendRequest(uid);
    } else {
        btn.innerHTML = `<span class="icon">➕</span> Добавить`;
        btn.classList.add('add');
        btn.title = 'Добавить в друзья';
        btn.onclick = () => sendFriendRequest(uid);
    }
}

function sendNotification(targetUid, data) {
    if (!USER_UID) return;
    if (!targetUid || targetUid === USER_UID) {
        console.warn('❌ Нельзя отправить уведомление себе');
        return;
    }
    const notifRef = db.ref('sites/' + SITE + '/notifications/' + targetUid).push();
    notifRef.set({
        ...data,
        read: false,
        fromName: USER,
        fromUid: USER_UID
    }).then(() => {
        console.log(`✅ Уведомление отправлено пользователю ${targetUid}`);
    }).catch(err => {
        console.error('❌ Ошибка отправки уведомления:', err);
    });
}

function loadNotifications() {
    if (!USER_UID) return;
    if (notifUnsub) { notifUnsub(); notifUnsub = null; }
    const ref = db.ref('sites/' + SITE + '/notifications/' + USER_UID).orderByChild('timestamp').limitToLast(20);
    notifUnsub = ref.on('value', snap => {
        const notifications = snap.val() || {};
        const keys = Object.keys(notifications).sort((a, b) => 
            (notifications[b].timestamp || 0) - (notifications[a].timestamp || 0)
        );
        const unread = keys.filter(k => !notifications[k].read);
        const badge = document.getElementById('notifBadge');
        if (badge) {
            if (unread.length > 0) {
                badge.style.display = 'inline';
                badge.textContent = unread.length;
            } else {
                badge.style.display = 'none';
            }
        }
        if (document.getElementById('notificationsModal').classList.contains('open')) {
            renderNotifications(notifications, keys);
        }
    });
}

function renderNotifications(notifications, keys) {
    const container = document.getElementById('notificationsList');
    if (!container) return;
    if (keys.length === 0) {
        container.innerHTML = '<div style="color:#65676b;text-align:center;padding:20px;">Нет уведомлений</div>';
        return;
    }
    let html = '';
    keys.slice(0, 20).forEach(k => {
        const n = notifications[k];
        const isUnread = !n.read;
        const time = n.timestamp ? new Date(n.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        let icon = '📩';
        if (n.type === 'friend_request') icon = '🤝';
        if (n.type === 'friend_accepted') icon = '✅';
        if (n.type === 'message') icon = '💬';
        html += `
            <div class="notif-item ${isUnread ? 'unread' : ''}" 
                 onclick="handleNotifClick('${k}', '${n.fromUid || n.from}', '${n.type}')"
                 data-type="${n.type}"
                 data-from="${n.fromUid || n.from}"
                 data-id="${k}">
                <span class="notif-icon">${icon}</span>
                <div class="notif-text">
                    <div style="font-weight:${isUnread ? '600' : '400'};font-size:14px;">${n.text || 'Уведомление'}</div>
                    <div class="notif-time">${time}</div>
                </div>
                ${isUnread ? '<span class="notif-dot"></span>' : ''}
            </div>
        `;
    });
    container.innerHTML = html;
}

function handleNotifClick(notifId, fromUid, type) {
    if (!USER_UID) return;
    if (!fromUid) return;
    db.ref('sites/' + SITE + '/notifications/' + USER_UID + '/' + notifId + '/read').set(true);
    
    if (type === 'message') {
        closeNotifications();
        openPrivateChat(fromUid);
        db.ref('sites/' + SITE + '/notifications/' + USER_UID + '/' + notifId).remove();
    } else if (type === 'friend_request') {
        closeNotifications();
        viewProfileModal(fromUid);
    } else if (type === 'friend_accepted') {
        closeNotifications();
        viewProfileModal(fromUid);
    }
}

function openNotifications() {
    document.getElementById('notificationsModal').classList.add('open');
    const ref = db.ref('sites/' + SITE + '/notifications/' + USER_UID).orderByChild('timestamp').limitToLast(20);
    ref.once('value', snap => {
        const notifications = snap.val() || {};
        const keys = Object.keys(notifications).sort((a, b) => 
            (notifications[b].timestamp || 0) - (notifications[a].timestamp || 0)
        );
        renderNotifications(notifications, keys);
    });
}

function closeNotifications() {
    document.getElementById('notificationsModal').classList.remove('open');
}

function openPrivateChat(targetUid) {
    if (!USER_UID) { alert('Войдите!'); return; }
    if (targetUid === USER_UID) { alert('Нельзя писать себе'); return; }
    const chatId = [USER_UID, targetUid].sort().join('_');
    const path = 'dms/' + SITE + '/' + chatId + '/messages';
    closeNotifications();
    closeProfileView();
    closeContextMenu();
    CURRENT_ROOM = chatId;
    document.getElementById('chatWindow').classList.add('active');
    db.ref('sites/' + SITE + '/all_users/' + targetUid).once('value', snap => {
        const user = snap.val() || {};
        const name = user.name || 'Собеседник';
        document.getElementById('chatTitle').textContent = '💬 ' + name;
    });
    loadChat(path);
}

function loadChat(path) {
    if (chatUnsub) { 
        if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value');
        chatUnsub = null; 
    }
    const box = document.getElementById('chatMessages');
    box.innerHTML = '<div style="color:#65676b;text-align:center;padding:20px;">⏳ Загрузка...</div>';
    chatUnsub = path;
    db.ref(path).orderByChild('timestamp').on('value', snap => {
        box.innerHTML = '';
        if (!snap.exists()) { 
            box.innerHTML = '<div style="color:#65676b;text-align:center;padding:20px;">Сообщений нет</div>'; 
            return; 
        }
        snap.forEach(s => {
            const m = s.val();
            const isSelf = m.nick === USER;
            const div = document.createElement('div');
            div.className = 'msg' + (isSelf ? ' self' : '');
            div.innerHTML = `
                <span class="author">${esc(m.nick||'?')}</span>
                <span class="time">${m.time||''}</span>
                <div>${esc(m.text||'')}</div>
            `;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

window.sendChat = function() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !CURRENT_ROOM) return;
    const path = 'dms/' + SITE + '/' + CURRENT_ROOM + '/messages';
    const parts = CURRENT_ROOM.split('_');
    const targetUid = parts[0] === USER_UID ? parts[1] : parts[0];
    db.ref(path).push({
        nick: USER,
        text: text,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        timestamp: Date.now()
    });
    sendNotification(targetUid, {
        type: 'message',
        from: USER_UID,
        text: `${USER}: ${text}`,
        timestamp: Date.now()
    });
    input.value = '';
};

window.closeChat = function() {
    document.getElementById('chatWindow').classList.remove('active');
    if (chatUnsub) { 
        if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value');
        chatUnsub = null; 
    }
    CURRENT_ROOM = null;
};

function renderFriendsList(type) {
    const container = document.getElementById('friendsListContainer');
    if (!container) return;
    container.innerHTML = '';
    if (!USER_UID) {
        container.innerHTML = '<div class="stat-empty">Войдите, чтобы увидеть список</div>';
        return;
    }
    let queryRef;
    if (type === 'friends') {
        queryRef = db.ref('sites/' + SITE + '/friends/' + USER_UID);
    } else if (type === 'followers') {
        queryRef = db.ref('sites/' + SITE + '/followers/' + USER_UID);
    } else if (type === 'following') {
        queryRef = db.ref('sites/' + SITE + '/followers');
    } else {
        container.innerHTML = '<div class="stat-empty">Неизвестный тип списка</div>';
        return;
    }
    container.innerHTML = '<div class="stat-empty">⏳ Загрузка...</div>';
    if (type === 'following') {
        queryRef.once('value', snap => {
            const allFollowers = snap.val() || {};
            const followingList = [];
            for (const [targetUid, followers] of Object.entries(allFollowers)) {
                if (followers && followers[USER_UID] === true) {
                    followingList.push(targetUid);
                }
            }
            if (followingList.length === 0) {
                container.innerHTML = '<div class="stat-empty">Вы ни на кого не подписаны</div>';
                return;
            }
            renderUserList(container, followingList, 'following');
        });
    } else {
        queryRef.once('value', snap => {
            const data = snap.val() || {};
            let uids = Object.keys(data);
            if (type === 'friends') {
                uids = uids.filter(uid => data[uid] === 'friend');
            }
            if (uids.length === 0) {
                const emptyText = type === 'friends' ? 'Нет друзей' : 
                                 type === 'followers' ? 'Нет подписчиков' : 'Список пуст';
                container.innerHTML = `<div class="stat-empty">${emptyText}</div>`;
                return;
            }
            renderUserList(container, uids, type);
        });
    }
}

function renderUserList(container, uids, type) {
    if (!uids || uids.length === 0) {
        container.innerHTML = '<div class="stat-empty">Список пуст</div>';
        return;
    }
    let loaded = 0;
    container.innerHTML = '';
    uids.forEach(uid => {
        db.ref('sites/' + SITE + '/all_users/' + uid).once('value', snap => {
            const user = snap.val() || {};
            const name = user.name || 'Аноним';
            const letter = name.charAt(0).toUpperCase();
            const avatarHtml = user.avatarUrl ? `<img src="${user.avatarUrl}">` : `<span>${letter}</span>`;
            const itemDiv = document.createElement('div');
            itemDiv.className = 'user-item';
            let actionsHtml = '';
            if (type === 'friends') {
                actionsHtml = `
                    <button class="btn-action btn-message" onclick="openPrivateChat('${uid}')" title="Сообщение">✉</button>
                    <button class="btn-action" onclick="removeFriend('${uid}')" style="background:#e74c3c;color:white;">✕</button>
                `;
            } else if (type === 'following') {
                actionsHtml = `
                    <button class="btn-action" onclick="unfollow('${uid}')" style="background:#e74c3c;color:white;">📴 Отписаться</button>
                `;
            } else if (type === 'followers') {
                db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + uid).once('value', snap => {
                    const status = snap.val();
                    const actionBtn = itemDiv.querySelector('.follower-action');
                    if (actionBtn) {
                        if (status === 'friend') {
                            actionBtn.innerHTML = '✓ В друзьях';
                            actionBtn.className = 'btn-action btn-friend friend';
                            actionBtn.disabled = true;
                        } else if (status === 'pending') {
                            db.ref('sites/' + SITE + '/friends/' + uid + '/' + USER_UID).once('value', snap2 => {
                                if (snap2.val() === 'pending') {
                                    actionBtn.innerHTML = '⏳ Запрос';
                                    actionBtn.className = 'btn-action btn-friend pending';
                                    actionBtn.disabled = true;
                                } else {
                                    actionBtn.innerHTML = '✅ Принять';
                                    actionBtn.className = 'btn-action';
                                    actionBtn.style.background = '#27ae60';
                                    actionBtn.style.color = 'white';
                                    actionBtn.onclick = () => acceptFriendRequest(uid);
                                }
                            });
                        } else {
                            actionBtn.innerHTML = '➕ Добавить';
                            actionBtn.className = 'btn-action btn-friend add';
                            actionBtn.onclick = () => sendFriendRequest(uid);
                        }
                    }
                });
                actionsHtml = `<button class="btn-action follower-action" disabled>⏳</button>`;
            }
            itemDiv.innerHTML = `
                <div class="avatar" onclick="viewProfileModal('${uid}')">${avatarHtml}</div>
                <div class="info" onclick="viewProfileModal('${uid}')">
                    <div class="name">${name}</div>
                </div>
                <div class="actions">${actionsHtml}</div>
            `;
            container.appendChild(itemDiv);
            loaded++;
        });
    });
}

function unfollow(uid) {
    if (!USER_UID) { alert('Войдите!'); return; }
    if (!confirm(`Отписаться от пользователя?`)) return;
    db.ref('sites/' + SITE + '/followers/' + uid + '/' + USER_UID).remove();
    alert('✅ Вы отписались');
    renderFriendsList('following');

window.uploadAvatar = function() {
    if (!USER_UID) { alert('Войдите!'); return; }
    closeContextMenu();
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { alert('Максимум 5 МБ'); return; }
        const ref = storage.ref('avatars/' + USER_UID + '/' + Date.now() + '_' + file.name);
        ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
            db.ref('sites/' + SITE + '/users/' + USER_UID + '/avatarUrl').set(url);
            db.ref('sites/' + SITE + '/all_users/' + USER_UID + '/avatarUrl').set(url);
            const profile = SAVED_PROFILES.find(p => p.uid === USER_UID);
            if (profile) {
                profile.avatarUrl = url;
                localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
            }
            refreshAvatarCache();
            loadProfile();
            alert('✅ Аватарка обновлена!');
        });
    };
    input.click();
};

// РЕДАКТИРОВАНИЕ
// ================================================================

window.editProfile = function() {
    closeContextMenu();
    document.getElementById('editProfileModal').classList.add('open');
    document.getElementById('editName').value = USER || '';
    document.getElementById('editBio').value = '';
};

window.closeEditProfile = function() {
    document.getElementById('editProfileModal').classList.remove('open');
};

window.saveProfile = function() {
    const name = document.getElementById('editName').value.trim();
    const bio = document.getElementById('editBio').value.trim();
    if (!name) { alert('Введите имя'); return; }
    USER = name;
    localStorage.setItem('dc_u_' + SITE, USER);
    const updates = { name: USER, bio: bio };
    db.ref('sites/' + SITE + '/users/' + USER_UID).update(updates);
    db.ref('sites/' + SITE + '/all_users/' + USER_UID).update(updates);
    const profile = SAVED_PROFILES.find(p => p.uid === USER_UID);
    if (profile) {
        profile.name = USER;
        localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
    }
    closeEditProfile();
    loadProfile();
    updateUI();
    loadPeople();
};
