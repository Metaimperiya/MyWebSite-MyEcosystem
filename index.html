<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepChat · Сообщество</title>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        /* ===== СТИЛИ (кратко, но красиво) ===== */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0d1117;color:#e6edf3;font-family:system-ui,sans-serif;min-height:100vh;padding:10px;}
        .app{max-width:800px;margin:0 auto;}
        .header{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #30363d;flex-wrap:wrap;}
        .logo{font-size:1.4rem;font-weight:800;color:#f0f6fc;}
        .logo span{color:#ff8c00;}
        .spacer{flex:1;}
        .user-btn{background:#21262d;border:1px solid #30363d;border-radius:40px;padding:4px 14px;color:#c9d1d9;font-size:0.75rem;cursor:pointer;display:flex;align-items:center;gap:6px;}
        .user-btn:hover{background:#30363d;}
        .change-name-btn{background:transparent;border:1px solid #30363d;color:#8b949e;border-radius:40px;padding:2px 10px;font-size:0.6rem;cursor:pointer;margin-left:4px;}
        .change-name-btn:hover{background:#30363d;color:#fff;}
        .tabs{display:flex;gap:0;margin:12px 0;border-bottom:1px solid #30363d;}
        .tab{padding:10px 20px;cursor:pointer;color:#8b949e;border-bottom:2px solid transparent;font-size:0.9rem;}
        .tab.active{color:#f0f6fc;border-bottom-color:#ff8c00;}
        .tab:hover{color:#f0f6fc;}
        .hidden{display:none!important;}

        .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px;margin-top:10px;}
        .card-title{font-weight:700;color:#f0f6fc;margin-bottom:8px;}

        /* Лента */
        .df-post{background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:12px;margin-bottom:12px;}
        .df-author{color:#ff8c00;font-weight:700;}
        .df-time{color:#8b949e;font-size:0.65rem;margin-left:6px;}
        .df-text{margin:6px 0;color:#e6edf3;}
        .df-marquee{background:#21262d;padding:4px 10px;border-radius:6px;color:#ff8c00;font-weight:600;margin-bottom:6px;overflow:hidden;white-space:nowrap;}
        .df-marquee span{display:inline-block;animation:scroll 10s linear infinite;padding-left:100%;}
        @keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
        .df-btn{display:inline-block;background:#ff8c00;color:#0d1117;padding:6px 16px;border-radius:40px;text-decoration:none;font-weight:700;font-size:0.8rem;margin:4px 4px 0 0;}
        .df-btn:hover{background:#ffa033;}
        .df-tag{color:#58a6ff;font-size:0.6rem;background:#1f2937;padding:0 8px;border-radius:20px;border:1px solid #30363d;}
        .df-actions{display:flex;gap:4px;margin-top:6px;}
        .df-actions button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:0 10px;border-radius:20px;font-size:0.55rem;cursor:pointer;}
        .df-actions button:hover{background:#30363d;}
        .df-discuss-btn{background:#21262d;border:1px solid #30363d;color:#58a6ff;padding:2px 12px;border-radius:40px;font-size:0.6rem;cursor:pointer;}
        .df-discuss-btn:hover{background:#30363d;}

        /* Форма поста */
        .df-form{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px;margin-bottom:12px;}
        .df-form input,.df-form textarea{width:100%;padding:8px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:0.85rem;margin-bottom:6px;font-family:inherit;}
        .df-form textarea{min-height:50px;resize:vertical;}
        .df-fbtn-row{display:flex;gap:4px;margin-bottom:4px;}
        .df-fbtn-row input{flex:1;margin-bottom:0;}
        .df-fbtn-row button{background:#21262d;border:1px solid #30363d;color:#f85149;border-radius:4px;padding:0 8px;cursor:pointer;}
        .df-fadd{background:transparent;border:1px solid #30363d;color:#ff8c00;padding:2px 12px;border-radius:20px;cursor:pointer;font-size:0.7rem;}
        .df-factions{display:flex;gap:6px;margin-top:6px;}
        .df-factions button{padding:6px 16px;border-radius:40px;border:none;font-weight:700;cursor:pointer;}
        .df-fsubmit{background:#ff8c00;color:#0d1117;}
        .df-fcancel{background:#21262d;color:#8b949e;}

        /* Чат */
        .dc-panel{background:#0d1117;border:1px solid #30363d;border-radius:10px;height:55vh;display:flex;flex-direction:column;}
        .dc-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
        .dc-msg{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:8px 10px;}
        .dc-author{color:#ff8c00;font-weight:700;font-size:0.8rem;}
        .dc-time{color:#8b949e;font-size:0.5rem;margin-left:4px;}
        .dc-msg-text{color:#e6edf3;font-size:0.85rem;}
        .dc-actions{display:flex;gap:4px;margin-top:4px;}
        .dc-actions button{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:0 8px;border-radius:20px;font-size:0.5rem;cursor:pointer;}
        .dc-actions button:hover{background:#30363d;}
        .dc-edit-btn{background:#1f2937!important;border-color:#ff8c00!important;color:#ff8c00!important;}
        .dc-del-btn{background:#1f2937!important;border-color:#f85149!important;color:#f85149!important;}

        .dc-input-wrap{padding:8px;background:#161b22;border-top:1px solid #30363d;border-radius:0 0 10px 10px;}
        .dc-input-row{display:flex;gap:6px;}
        .dc-input-row input{flex:1;padding:8px 14px;background:#0d1117;border:1px solid #30363d;border-radius:40px;color:#e6edf3;font-size:0.8rem;outline:none;}
        .dc-input-row input:focus{border-color:#ff8c00;}
        .dc-input-row button{background:#ff8c00;border:none;border-radius:40px;padding:0 16px;font-weight:700;color:#0d1117;cursor:pointer;}
        .dc-input-row button:hover{background:#ffa033;}
        .dc-file-label{color:#8b949e;font-size:0.6rem;cursor:pointer;border:1px solid #30363d;padding:0 10px;border-radius:40px;display:inline-block;}
        .dc-preview{display:none;align-items:center;gap:4px;margin-top:4px;background:#0d1117;padding:2px 8px;border-radius:40px;border:1px solid #30363d;}
        .dc-preview.show{display:flex;}
        .dc-preview img{width:24px;height:24px;border-radius:40px;object-fit:cover;}
        .dc-preview-remove{background:transparent;border:none;color:#f85149;cursor:pointer;}

        /* Админ-панель в чате */
        .dc-admin-bar{display:none;padding:8px;background:#161b22;border-top:1px solid #30363d;flex-direction:column;gap:4px;}
        .dc-admin-bar.show{display:flex;}
        .dc-admin-bar-title{color:#ff8c00;font-weight:700;font-size:0.7rem;display:flex;justify-content:space-between;}
        .dc-admin-bar-title button{background:transparent;border:1px solid #30363d;color:#8b949e;border-radius:20px;padding:0 8px;cursor:pointer;font-size:0.55rem;}
        .dc-admin-form{display:none;flex-direction:column;gap:4px;}
        .dc-admin-form.open{display:flex;}
        .dc-admin-form input,.dc-admin-form textarea{width:100%;padding:6px 10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:0.7rem;font-family:inherit;}
        .dc-admin-form textarea{min-height:30px;resize:vertical;}
        .dc-abtn-row{display:flex;gap:4px;}
        .dc-abtn-row input{flex:1;}
        .dc-aadd{background:transparent;border:1px solid #30363d;color:#ff8c00;padding:0 10px;border-radius:20px;cursor:pointer;font-size:0.6rem;}
        .dc-apublish{background:#ff8c00;border:none;border-radius:20px;padding:4px;font-weight:700;color:#0d1117;cursor:pointer;font-size:0.7rem;}

        /* Админ-точки */
        .admin-dots{position:fixed;bottom:10px;right:10px;display:flex;gap:6px;z-index:999;}
        .admin-dot{width:12px;height:12px;border-radius:50%;border:2px solid #30363d;cursor:pointer;background:#21262d;}
        .admin-dot.active{background:#ff8c00;border-color:#ff8c00;}
        .admin-dot.feed-dot.active{background:#ff8c00;}
        .admin-dot.room-dot.active{background:#da3633;}

        /* Модалки */
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9999;justify-content:center;align-items:center;padding:16px;}
        .modal.open{display:flex;}
        .modal-box{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:20px;max-width:400px;width:100%;}
        .modal-box h3{color:#f0f6fc;margin-bottom:4px;}
        .modal-box input{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:0.9rem;margin:8px 0;}
        .modal-btns{display:flex;gap:8px;justify-content:flex-end;}
        .modal-btns button{padding:6px 16px;border-radius:40px;border:none;font-weight:700;cursor:pointer;}
        .btn-cancel{background:#21262d;color:#8b949e;}
        .btn-save{background:#ff8c00;color:#0d1117;}

        /* Edit modal */
        .edit-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9999;justify-content:center;align-items:center;padding:12px;}
        .edit-overlay.open{display:flex;}
        .edit-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px;max-width:400px;width:100%;}
        .edit-box h2{color:#ff8c00;font-size:0.9rem;}
        .edit-box input,.edit-box textarea{width:100%;padding:6px 10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:0.75rem;margin-bottom:4px;font-family:inherit;}
        .edit-box textarea{min-height:30px;resize:vertical;}
        .edit-action-row{display:flex;gap:6px;margin-top:6px;}
        .edit-save{background:#ff8c00;border:none;border-radius:40px;padding:6px;flex:1;font-weight:700;color:#0d1117;cursor:pointer;}
        .edit-close{background:#21262d;border:none;border-radius:40px;padding:6px;flex:1;font-weight:700;color:#8b949e;cursor:pointer;}
        .edit-delete{background:#21262d;border:1px solid #f85149;color:#f85149;border-radius:40px;padding:6px;width:100%;margin-top:6px;cursor:pointer;}

        .auth-panel{text-align:center;padding:50px 20px;}
        .auth-panel h2{font-size:1.2rem;color:#f0f6fc;}
        .auth-panel p{color:#8b949e;margin:10px 0 20px;}
        .google-btn{background:#fff;border:1px solid #dadce0;border-radius:40px;padding:12px 28px;font-size:1rem;font-weight:600;color:#3c4043;cursor:pointer;display:inline-flex;align-items:center;gap:12px;transition:.2s;}
        .google-btn:hover{background:#f8f9fa;transform:scale(1.02);}
        .google-btn img{width:20px;height:20px;}

        .room-item{display:flex;justify-content:space-between;padding:6px 10px;border-radius:6px;cursor:pointer;color:#8b949e;border:1px solid transparent;}
        .room-item:hover{background:#21262d;border-color:#30363d;color:#f0f6fc;}
        .room-item.active{background:#1f2937;border-color:#ff8c00;color:#f0f6fc;}
        .room-cnt{color:#8b949e;font-size:0.65rem;}
        .create-room-btn{display:none;width:100%;background:#21262d;border:1px solid #30363d;color:#f0f6fc;padding:6px;border-radius:40px;margin-top:8px;cursor:pointer;}
        .create-room-btn.show{display:block;}
        .create-room-btn:hover{background:#30363d;}
        .sb-footer{margin-top:10px;padding-top:8px;border-top:1px solid #30363d;}
        .rooms-title{color:#8b949e;font-size:0.6rem;text-transform:uppercase;margin:8px 0 4px;}

        @media(max-width:640px){.header{flex-wrap:wrap;gap:6px;}.logo{font-size:1.1rem;}}
    </style>
</head>
<body>

<div class="app">

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="logo">Deep<span>Chat</span></div>
        <div class="spacer"></div>
        <span class="user-btn" id="userDisplay" onclick="openChangeName()">
            👤 <span id="userNameDisplay">Гость</span>
        </span>
        <button class="change-name-btn" onclick="openChangeName()">✏️</button>
    </header>

    <!-- ===== TABS ===== -->
    <div class="tabs">
        <div class="tab active" id="tabFeed" onclick="switchTab('feed')">📰 Лента</div>
        <div class="tab" id="tabRooms" onclick="switchTab('rooms')">💬 Комнаты</div>
    </div>

    <!-- ===== AUTH PANEL (показывается, если не залогинен) ===== -->
    <div id="authPanel" class="auth-panel">
        <h2>🚀 Добро пожаловать</h2>
        <p>Войдите через Google, чтобы начать</p>
        <button class="google-btn" id="googleLoginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
            Войти через Google
        </button>
    </div>

    <!-- ===== CONTENT (скрыто, пока не залогинен) ===== -->
    <div id="appContent" class="hidden">

        <!-- ===== FEED ===== -->
        <div id="feedSection">
            <div class="card">
                <div class="card-title">📰 Лента новостей</div>
                <div id="feedForm" class="df-form hidden">
                    <div class="card-title" style="color:#ff8c00;">✏️ Новый пост</div>
                    <input type="text" id="fMarquee" placeholder="Бегущая строка">
                    <textarea id="fText" placeholder="Текст поста..."></textarea>
                    <input type="url" id="fLink" placeholder="Ссылка (iframe)">
                    <input type="text" id="fHashtags" placeholder="#хештеги через пробел">
                    <div style="color:#8b949e;font-size:0.6rem;">Кнопки</div>
                    <div id="fBtns"></div>
                    <button class="df-fadd" onclick="fAddBtn()">➕ Кнопку</button>
                    <div class="df-factions">
                        <button class="df-fsubmit" id="fSubmitBtn" onclick="fSubmit()">📤 Опубликовать</button>
                        <button class="df-fcancel" onclick="fCancel()">✕ Отмена</button>
                    </div>
                </div>
                <div id="feedPosts"></div>
            </div>
        </div>

        <!-- ===== ROOMS (sidebar) ===== -->
        <div id="roomsSection" class="hidden">
            <div class="card">
                <div class="card-title">💬 Комнаты</div>
                <div id="roomList"><div style="color:#8b949e;">Нет комнат</div></div>
                <div class="sb-footer">
                    <button class="create-room-btn" id="createRoomBtn" onclick="openCreateRoom()">➕ Создать комнату</button>
                </div>
            </div>
        </div>

        <!-- ===== CHAT ===== -->
        <div id="chatSection" class="hidden">
            <div class="card">
                <div class="card-title">💬 <span id="chatRoomLabel">Комната</span></div>
                <div class="dc-panel">
                    <div class="dc-messages" id="dcMessages"></div>

                    <!-- Admin publish bar -->
                    <div class="dc-admin-bar" id="dcAdminBar">
                        <div class="dc-admin-bar-title">
                            ✏️ Опубликовать пост
                            <button onclick="toggleAdminForm()">▼ Открыть</button>
                        </div>
                        <div class="dc-admin-form" id="dcAdminForm">
                            <input type="text" id="apMarquee" placeholder="Бегущая строка">
                            <textarea id="apText" placeholder="Текст поста..."></textarea>
                            <input type="url" id="apLink" placeholder="Ссылка (iframe)">
                            <input type="text" id="apHashtags" placeholder="#хештеги">
                            <div style="color:#8b949e;font-size:0.6rem;">Кнопки</div>
                            <div class="dc-abtns" id="apBtns"></div>
                            <button class="dc-aadd" onclick="apAddBtn()">➕ Кнопку</button>
                            <button class="dc-apublish" onclick="apPublish()">📤 Опубликовать</button>
                        </div>
                    </div>

                    <div class="dc-input-wrap">
                        <div class="dc-input-row">
                            <input type="text" id="dcInput" placeholder="Напиши сообщение...">
                            <button onclick="dcSend()">→</button>
                        </div>
                        <div class="dc-file-row">
                            <label class="dc-file-label" for="dcFile">📎 фото</label>
                            <input type="file" id="dcFile" accept="image/*" style="display:none;">
                            <div class="dc-preview" id="dcPreview">
                                <img id="dcPreviewImg" src="" alt="">
                                <span class="dc-preview-name" id="dcPreviewName"></span>
                                <button class="dc-preview-remove" onclick="dcRemoveImg()">✕</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== ADMIN DOTS ===== -->
    <div class="admin-dots">
        <div class="admin-dot feed-dot" id="feedDot" onclick="openFeedLogin()"></div>
        <div class="admin-dot room-dot" id="roomDot" onclick="openRoomLogin()"></div>
    </div>

    <!-- ===== MODALS ===== -->
    <div class="modal" id="feedLoginModal">
        <div class="modal-box">
            <h3>📰 Админ ленты</h3>
            <input type="password" id="feedPass" placeholder="Пароль">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal('feedLoginModal')">Отмена</button>
                <button class="btn-save" onclick="checkFeedPass()">Войти</button>
            </div>
        </div>
    </div>

    <div class="modal" id="roomLoginModal">
        <div class="modal-box">
            <h3>💬 Админ комнат</h3>
            <input type="password" id="roomPass" placeholder="Пароль">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal('roomLoginModal')">Отмена</button>
                <button class="btn-save" onclick="checkRoomPass()">Войти</button>
            </div>
        </div>
    </div>

    <div class="modal" id="createRoomModal">
        <div class="modal-box">
            <h3>📝 Новая комната</h3>
            <input type="text" id="roomNameInput" placeholder="Название комнаты" maxlength="30">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal('createRoomModal')">Отмена</button>
                <button class="btn-save" onclick="doCreateRoom()">Создать</button>
            </div>
        </div>
    </div>

    <div class="modal" id="changeNameModal">
        <div class="modal-box">
            <h3>✏️ Сменить имя</h3>
            <input type="text" id="changeNameInput" placeholder="Новое имя" maxlength="24">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal('changeNameModal')">Отмена</button>
                <button class="btn-save" onclick="doChangeName()">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="edit-overlay" id="editOverlay">
        <div class="edit-box">
            <h2>✏️ Редактировать</h2>
            <input type="text" id="editMarquee" placeholder="Бегущая строка">
            <textarea id="editText" placeholder="Текст..."></textarea>
            <input type="url" id="editLink" placeholder="Ссылка (iframe)">
            <input type="text" id="editHashtags" placeholder="#хештеги">
            <div style="color:#8b949e;font-size:0.6rem;">Кнопки</div>
            <div id="editBtns"></div>
            <button onclick="editAddBtn()" style="background:transparent;border:1px solid #30363d;color:#ff8c00;padding:2px 10px;border-radius:20px;cursor:pointer;font-size:0.6rem;margin-bottom:4px;">➕ Кнопку</button>
            <div class="edit-action-row">
                <button class="edit-save" onclick="doSaveEdit()">💾 Сохранить</button>
                <button class="edit-close" onclick="closeEdit()">✕ Отмена</button>
            </div>
            <button class="edit-delete" onclick="doDeleteEdit()">🗑 Удалить</button>
        </div>
    </div>

</div>

<!-- ===== JAVASCRIPT =============================================== -->
<!-- ================================================================ -->
<script>
(function(){

// ================================================================
// FIREBASE CONFIG (ТВОЙ ПРОЕКТ)
// ================================================================
const FB_CONFIG = {
    apiKey: "AIzaSyDCx2wLK2EZJOrUNoXEdWDlYY0e8cOHhtY",
    authDomain: "myecosystem-e6414.firebaseapp.com",
    databaseURL: "https://myecosystem-e6414-default-rtdb.firebaseio.com",
    projectId: "myecosystem-e6414",
    storageBucket: "myecosystem-e6414.firebasestorage.app",
    messagingSenderId: "426302111033",
    appId: "1:426302111033:web:7b39e7026e94f528a13ce8"
};

firebase.initializeApp(FB_CONFIG);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

// ================================================================
// СОСТОЯНИЕ
// ================================================================
const SITE = (window.location.hostname || 'local').replace(/\./g, '_');
let USER = null;           // текущее отображаемое имя
let USER_UID = null;       // Firebase UID
let IS_FEED_ADMIN = localStorage.getItem('dc_fa_'+SITE) === '1';
let IS_ROOM_ADMIN = localStorage.getItem('dc_ra_'+SITE) === '1';
let CUR_ROOM = '';
let FEED_EDIT_ID = null;
let CHAT_EDIT_ID = null;
let DC_IMG = null;
let chatUnsub = null;

// ================================================================
// AUTH (Google вход)
// ================================================================
document.getElementById('googleLoginBtn').addEventListener('click', () => {
    auth.signInWithPopup(provider)
        .then(result => {
            console.log('✅ Вход выполнен');
        })
        .catch(err => {
            alert('❌ Ошибка: ' + err.message);
        });
});

// Выход
window.logout = function() {
    auth.signOut();
};

// Следим за пользователем
auth.onAuthStateChanged(user => {
    const authPanel = document.getElementById('authPanel');
    const appContent = document.getElementById('appContent');
    const userDisplay = document.getElementById('userNameDisplay');

    if (user) {
        USER_UID = user.uid;
        // Имя из Google, либо из localStorage, либо uid
        let savedName = localStorage.getItem('dc_u_'+SITE);
        if (savedName) {
            USER = savedName;
        } else {
            USER = user.displayName || user.email || user.uid.slice(0,8);
            localStorage.setItem('dc_u_'+SITE, USER);
        }
        // Сохраняем в базу, чтобы другие видели
        db.ref('sites/'+SITE+'/users/'+USER_UID).set({ name: USER, email: user.email });

        // Показываем интерфейс
        authPanel.style.display = 'none';
        appContent.classList.remove('hidden');
        userDisplay.textContent = USER;

        // Загружаем ленту и комнаты
        loadFeed();
        loadRooms();
        applyAdminUI();

        // Если есть комната — подгружаем чат
        if (CUR_ROOM) loadChat(CUR_ROOM);
    } else {
        // Не залогинен
        USER = null;
        USER_UID = null;
        authPanel.style.display = 'block';
        appContent.classList.add('hidden');
        userDisplay.textContent = 'Гость';
        if (chatUnsub) { db.ref(chatUnsub).off('value'); chatUnsub = null; }
        document.getElementById('feedPosts').innerHTML = '';
        document.getElementById('roomList').innerHTML = '<div style="color:#8b949e;">Нет комнат</div>';
        document.getElementById('dcMessages').innerHTML = '';
    }
});

// ================================================================
// УТИЛИТЫ
// ================================================================
const esc = s => s ? String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) : '';
const now = () => new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

// ================================================================
// КОМНАТЫ
// ================================================================
function loadRooms() {
    db.ref('sites/'+SITE+'/rooms').orderByChild('createdAt').on('value', snap => {
        const data = snap.val() || {};
        const keys = Object.keys(data).sort((a,b) => (data[a].createdAt||0) - (data[b].createdAt||0));
        const list = document.getElementById('roomList');
        if (!keys.length) {
            list.innerHTML = '<div style="color:#8b949e;">Нет комнат</div>';
            return;
        }
        list.innerHTML = keys.map(k => {
            const r = data[k];
            const ac = k === CUR_ROOM ? 'active' : '';
            return `<div class="room-item ${ac}" onclick="openRoom('${k}','${esc(r.name||'Комната')}')">
                <span># ${esc(r.name||'?')}</span>
                <span class="room-cnt">${r.count||0}</span>
            </div>`;
        }).join('');
    });
}

window.openRoom = function(roomId, roomName) {
    if (!USER) { alert('Сначала войдите!'); return; }
    CUR_ROOM = roomId;
    document.getElementById('chatSection').classList.remove('hidden');
    document.getElementById('roomsSection').style.display = 'none';
    document.getElementById('feedSection').style.display = 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tabRooms').classList.add('active');
    document.getElementById('chatRoomLabel').textContent = roomName || 'Комната';
    loadChat(roomId);
};

window.openCreateRoom = function() {
    if (!IS_ROOM_ADMIN) { alert('⛔ Только для админа!'); return; }
    document.getElementById('createRoomModal').classList.add('open');
};
window.doCreateRoom = function() {
    const name = document.getElementById('roomNameInput').value.trim();
    if (!name || name.length < 2) { alert('⚠️ Минимум 2 символа'); return; }
    db.ref('sites/'+SITE+'/rooms').push({ name, createdAt: Date.now(), count: 0 })
        .then(() => closeModal('createRoomModal'))
        .catch(e => alert('❌ '+e.message));
};

// ================================================================
// ЛЕНТА (FEED)
// ================================================================
function loadFeed() {
    db.ref('sites/'+SITE+'/feed_posts').orderByChild('timestamp').on('value', snap => {
        const c = document.getElementById('feedPosts');
        c.innerHTML = '';
        const data = snap.val() || {};
        const keys = Object.keys(data).sort((a,b) => (data[b].timestamp||0) - (data[a].timestamp||0));
        if (!keys.length) {
            c.innerHTML = '<div style="text-align:center;padding:30px;color:#8b949e;">Пока пусто</div>';
            return;
        }
        keys.forEach(k => { const p = data[k]; p.id = k; c.appendChild(renderFeedPost(p)); });
    });
}

function renderFeedPost(p) {
    const d = document.createElement('div');
    d.className = 'df-post';
    const mq = p.marquee ? `<div class="df-marquee"><span>${esc(p.marquee)}</span></div>` : '';
    const fr = p.link ? `<iframe src="${esc(p.link)}" style="width:100%;height:200px;border:1px solid #30363d;border-radius:8px;margin:4px 0;"></iframe>` : '';
    let btns = '';
    if (p.buttons && p.buttons.length) {
        btns = p.buttons.filter(b=>b.url).map(b => `<a href="${esc(b.url)}" target="_blank" class="df-btn">${esc(b.label||'🔗 Перейти')}</a>`).join('');
    }
    let tags = '';
    if (p.hashtags && p.hashtags.length) {
        tags = p.hashtags.map(t => `<span class="df-tag">${esc(t)}</span>`).join(' ');
    }
    let acts = '';
    if (IS_FEED_ADMIN) {
        acts = `<div class="df-actions">
            <button class="df-edit-btn" onclick="feedOpenEdit('${p.id}')">✏️ Ред.</button>
            <button class="df-del-btn" onclick="feedDel('${p.id}')">🗑</button>
        </div>`;
    }
    d.innerHTML = `
        ${mq}
        <div><span class="df-author">${esc(p.author||'Аноним')}</span><span class="df-time">${p.time||''}${p.edited?' (ред.)':''}</span></div>
        <div class="df-text">${esc(p.text||'')}</div>
        ${btns}
        ${fr}
        <div>${tags}</div>
        ${acts}
        <div style="margin-top:6px;">
            <button class="df-discuss-btn" onclick="openRoom('post_${p.id}','${esc((p.text||'Пост').slice(0,28))}')">💬 Обсудить</button>
        </div>
    `;
    return d;
}

// Форма поста
window.fAddBtn = function(l='', u='') {
    const c = document.getElementById('fBtns');
    const d = document.createElement('div'); d.className = 'df-fbtn-row';
    d.innerHTML = `<input placeholder="Текст" value="${esc(l)}"><input placeholder="Ссылка" value="${esc(u)}"><button onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(d);
};
window.fSubmit = function() {
    if (!USER) { alert('Сначала войдите!'); return; }
    const marquee = document.getElementById('fMarquee').value.trim();
    const text = document.getElementById('fText').value.trim();
    const link = document.getElementById('fLink').value.trim();
    const hr = document.getElementById('fHashtags').value.trim();
    const hashtags = hr ? hr.split(/\s+/).filter(t=>t.startsWith('#')).slice(0,5) : [];
    if (!text && !link) { alert('⚠️ Введите текст или ссылку'); return; }
    const buttons = [];
    document.querySelectorAll('#fBtns .df-fbtn-row').forEach(g => {
        const [li, ui] = g.querySelectorAll('input');
        if (ui.value.trim()) buttons.push({label: li.value.trim()||'🔗 Перейти', url: ui.value.trim()});
    });
    const post = { author: USER, text: text||'📝', time: now(), timestamp: Date.now(), marquee: marquee||null, link: link||null, buttons, hashtags, img: null, edited: false };
    const ref = db.ref('sites/'+SITE+'/feed_posts');
    if (FEED_EDIT_ID) {
        ref.child(FEED_EDIT_ID).update({...post, edited: true, editedAt: Date.now()}).then(fCancel);
    } else {
        ref.push(post).then(fCancel);
    }
};
window.fCancel = function() {
    ['fMarquee','fText','fLink','fHashtags'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fBtns').innerHTML = '';
    document.getElementById('fSubmitBtn').textContent = '📤 Опубликовать';
    FEED_EDIT_ID = null;
};
window.feedOpenEdit = function(id) {
    FEED_EDIT_ID = id;
    db.ref('sites/'+SITE+'/feed_posts/'+id).once('value', snap => {
        const p = snap.val(); if (!p) return;
        document.getElementById('fMarquee').value = p.marquee||'';
        document.getElementById('fText').value = p.text||'';
        document.getElementById('fLink').value = p.link||'';
        document.getElementById('fHashtags').value = (p.hashtags||[]).join(' ');
        document.getElementById('fBtns').innerHTML = '';
        (p.buttons||[]).forEach(b => fAddBtn(b.label, b.url));
        document.getElementById('fSubmitBtn').textContent = '💾 Обновить';
        document.getElementById('feedForm').classList.remove('hidden');
        document.getElementById('feedForm').scrollIntoView({behavior:'smooth'});
    });
};
window.feedDel = function(id) {
    if (!confirm('🗑 Удалить пост?')) return;
    db.ref('sites/'+SITE+'/feed_posts/'+id).remove();
};

// ================================================================
// ЧАТ
// ================================================================
function chatPath(roomId) { return 'rooms/'+SITE+'_'+roomId+'/messages'; }

function loadChat(roomId) {
    if (chatUnsub) { db.ref(chatUnsub).off('value'); chatUnsub = null; }
    DC_IMG = null;
    document.getElementById('dcPreview').classList.remove('show');
    document.getElementById('dcInput').value = '';
    const box = document.getElementById('dcMessages');
    box.innerHTML = '<div style="color:#8b949e;text-align:center;padding:20px;">⏳ Загрузка...</div>';
    const path = chatPath(roomId);
    chatUnsub = path;
    db.ref(path).orderByChild('timestamp').on('value', snap => {
        box.innerHTML = '';
        if (!snap.exists()) {
            box.innerHTML = '<div style="color:#8b949e;text-align:center;padding:30px;">Сообщений пока нет 👋</div>';
            return;
        }
        snap.forEach(s => { const m = s.val(); m.id = s.key; box.appendChild(renderChatMsg(m, roomId)); });
        box.scrollTop = box.scrollHeight;
    });
}

function renderChatMsg(m, roomId) {
    const d = document.createElement('div');
    d.className = 'dc-msg';
    const isPost = m.isPost || m.marquee || (m.buttons && m.buttons.length);
    const mq = (isPost && m.marquee) ? `<div class="df-marquee"><span>${esc(m.marquee)}</span></div>` : '';
    const fr = (isPost && m.link) ? `<iframe src="${esc(m.link)}" style="width:100%;height:150px;border:1px solid #30363d;border-radius:6px;margin:4px 0;"></iframe>` : '';
    let btns = '';
    if (isPost && m.buttons && m.buttons.length) {
        btns = m.buttons.filter(b=>b.url).map(b => `<a href="${esc(b.url)}" target="_blank" class="df-btn" style="font-size:0.7rem;padding:4px 12px;">${esc(b.label||'🔗')}</a>`).join('');
    }
    let tags = '';
    if (isPost && m.hashtags && m.hashtags.length) {
        tags = m.hashtags.map(t => `<span class="df-tag">${esc(t)}</span>`).join(' ');
    }
    let txt = esc(m.text||'');
    let acts = `<button onclick="dcLike('${m.id}','${roomId}')">👍 ${m.likes||0}</button>
                <button onclick="dcReply('${esc(m.nick)}')">💬</button>`;
    if ((m.nick === USER) || IS_ROOM_ADMIN) {
        acts += `<button class="dc-edit-btn" onclick="openChatEdit('${m.id}','${roomId}')">✏️</button>`;
        acts += `<button class="dc-del-btn" onclick="dcDel('${m.id}','${roomId}')">🗑</button>`;
    }
    d.innerHTML = `
        ${mq}
        <div><span class="dc-author">${esc(m.nick||'?')}</span><span class="dc-time">${m.time||''}${m.edited?' (ред.)':''}</span></div>
        <div class="dc-msg-text">${txt}</div>
        ${btns}
        ${fr}
        <div>${tags}</div>
        <div class="dc-actions">${acts}</div>
    `;
    return d;
}

window.dcSend = function() {
    if (!CUR_ROOM || !USER) { alert('Сначала войдите и выберите комнату'); return; }
    const input = document.getElementById('dcInput');
    const text = input.value.trim();
    if (!text && !DC_IMG) return;
    db.ref(chatPath(CUR_ROOM)).push({
        nick: USER,
        text: text || '📷',
        time: now(),
        timestamp: Date.now(),
        likes: 0,
        img: DC_IMG || null,
        edited: false,
        isPost: false
    });
    input.value = '';
    dcRemoveImg();
};
document.getElementById('dcInput').addEventListener('keypress', e => { if (e.key === 'Enter') dcSend(); });

// Фото
document.getElementById('dcFile').addEventListener('change', function(e) {
    const f = e.target.files[0];
    if (!f || !f.type.startsWith('image/')) return;
    if (f.size > 2*1024*1024) { alert('Максимум 2MB'); return; }
    const r = new FileReader();
    r.onload = ev => {
        DC_IMG = ev.target.result;
        document.getElementById('dcPreviewImg').src = DC_IMG;
        document.getElementById('dcPreviewName').textContent = f.name.slice(0,12);
        document.getElementById('dcPreview').classList.add('show');
    };
    r.readAsDataURL(f);
});
window.dcRemoveImg = function() {
    DC_IMG = null;
    document.getElementById('dcPreview').classList.remove('show');
    document.getElementById('dcFile').value = '';
};

window.dcLike = function(id, roomId) {
    if (!USER) return;
    const key = 'lk_'+id+'_'+USER_UID;
    if (localStorage.getItem(key)) return;
    db.ref(chatPath(roomId)+'/'+id+'/likes').transaction(v => (v||0)+1);
    localStorage.setItem(key, '1');
};
window.dcReply = function(nick) {
    document.getElementById('dcInput').value = '@'+nick+' ';
    document.getElementById('dcInput').focus();
};
window.dcDel = function(id, roomId) {
    if (!confirm('Удалить?')) return;
    db.ref(chatPath(roomId)+'/'+id).remove();
};

        const m = snap.val(); if (!m) return;
        document.getElementById('editMarquee').value = m.marquee||'';

        document.getElementById('editHashtags').value = (m.hashtags||[]).join(' ');

        document.getElementById('editOverlay').classList.add('open');
    });

window.closeEdit = function() { document.getElementById('editOverlay').classList.remove('open'); CHAT_EDIT_ID = null; };
window.editAddBtn = function(l='', u='') {
    const c = document.getElementById('editBtns');
    const d = document.createElement('div'); d.className = 'edit-btn-row';
    d.innerHTML = `<input placeholder="Текст" value="${esc(l)}"><input placeholder="Ссылка" value="${esc(u)}"><button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:#f85149;cursor:pointer;">✕</button>`;

window.doSaveEdit = function() {
    if (!CHAT_EDIT_ID) return;
    const { msgId, roomId } = CHAT_EDIT_ID;
    const marquee = document.getElementById('editMarquee').value.trim();
    const text = document.getElementById('editText').value.trim();
    const link = document.getElementById('editLink').value.trim();
    const hr = document.getElementById('editHashtags').value.trim();
    const hashtags = hr ? hr.split(/\s+/).filter(t=>t.startsWith('#')).slice(0,5) : [];
    const buttons = [];
    document.querySelectorAll('#editBtns .edit-btn-row').forEach(g => {
        const [li, ui] = g.querySelectorAll('input');
        if (ui.value.trim()) buttons.push({label: li.value.trim()||'🔗 Перейти', url: ui.value.trim()});
    });
    db.ref(chatPath(roomId)+'/'+msgId).update({
        marquee: marquee || null,
        text: text || '📝',
        link: link || null,
        hashtags: hashtags,
        buttons: buttons,
        edited: true,
        editedAt: Date.now(),
        isPost: !!(marquee || link || buttons.length)
    }).then(closeEdit);
};
window.doDeleteEdit = function() {
