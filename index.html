<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>METAIMPERIYA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a12; color:#eee; font-family:system-ui; padding:12px; }
        .container { max-width:720px; margin:0 auto; }
        
        .topbar {
            background:#14141f; padding:10px 16px; border-radius:12px;
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom:10px; border:1px solid #262633;
        }
        .topbar .logo { color:#ff8c00; font-weight:700; font-size:1.1rem; cursor:pointer; }
        .topbar .right { display:flex; align-items:center; gap:8px; }
        .topbar .right .avatar-wrap {
            width:32px; height:32px; border-radius:50%; overflow:hidden;
            background:#ff8c00; cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .topbar .right .avatar-wrap img { width:100%; height:100%; object-fit:cover; }
        .topbar .right .avatar-wrap .letter { color:#0b0b0f; font-weight:700; font-size:0.7rem; }
        .topbar .right .name { font-size:0.7rem; color:#888; cursor:pointer; }
        .topbar .right .name:hover { color:#ff8c00; }
        
        .menu {
            display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap;
        }
        .menu button {
            background:#14141f; border:1px solid #262633; color:#888;
            padding:8px 16px; border-radius:30px; cursor:pointer; font-weight:600;
            font-size:0.75rem; flex:1; min-width:60px;
        }
        .menu button.active { background:#ff8c00; color:#0b0b0f; border-color:#ff8c00; }
        .menu button:hover { background:#1f1f2f; }
        
        .page { display:none; }
        .page.active { display:block; }
        
        .post-form {
            background:#10101a; border-radius:16px; border:1px solid #262633;
            padding:12px; margin-bottom:10px;
        }
        .post-form .input-row { display:flex; gap:8px; }
        .post-form .input-row input {
            flex:1; padding:10px 16px; background:#181825;
            border:1px solid #323245; border-radius:60px; color:white;
            font-size:0.9rem; outline:none;
        }
        .post-form .input-row input:focus { border-color:#ff8c00; }
        .post-form .input-row button {
            background:#ff8c00; border:none; border-radius:60px;
            padding:0 20px; font-weight:700; color:#0b0b0f; cursor:pointer;
        }
        .post-form .file-label {
            background:#222235; padding:4px 16px; border-radius:40px;
            font-size:0.75rem; border:1px solid #3e3e55; cursor:pointer;
            display:inline-block; margin-top:6px;
        }
        .post-form .hidden { display:none; }
        .post-form .preview-box {
            display:none; align-items:center; gap:10px;
            background:#181825; padding:4px 14px 4px 4px;
            border-radius:40px; margin-top:6px; border:1px solid #3a3a50;
        }
        .post-form .preview-box.visible { display:flex; }
        .post-form .preview-box img { width:40px; height:40px; border-radius:30px; object-fit:cover; }
        .post-form .remove-pic { background:#6a1a1a; color:white; border:none; border-radius:30px; padding:2px 12px; cursor:pointer; }
        
        .post {
            background:#14141f; border-radius:16px; padding:14px 16px;
            border:1px solid #2a2a3a; margin-bottom:10px;
        }
        .post .author { display:flex; align-items:center; gap:8px; margin-bottom:6px; cursor:pointer; }
        .post .author .avatar-wrap {
            width:28px; height:28px; border-radius:50%; overflow:hidden;
            background:#ff8c00; display:flex; align-items:center; justify-content:center;
        }
        .post .author .avatar-wrap img { width:100%; height:100%; object-fit:cover; }
        .post .author .avatar-wrap .letter { color:#0b0b0f; font-weight:700; font-size:0.6rem; }
        .post .name { color:#ffaa44; font-weight:700; }
        .post .time { color:#666; font-size:0.65rem; margin-left:10px; }
        .post .text { margin:6px 0; word-break:break-word; font-size:0.95rem; line-height:1.5; }
        .post img { max-width:100%; max-height:400px; border-radius:12px; margin:6px 0; border:1px solid #333; cursor:pointer; }
        .post .actions { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; align-items:center; }
        .post .actions button {
            background:#222233; border:1px solid #333349; color:#ccc;
            padding:2px 14px; border-radius:40px; font-size:0.7rem; cursor:pointer;
        }
        .post .actions button:hover { background:#2a2a3a; }
        .post .actions .likes { color:#ff8c00; font-weight:700; font-size:0.8rem; }
        .post .actions .del-btn { background:#4a1a1a; border-color:#6a1a1a; color:#ff6666; }
        .post .actions .like-10 { background:#1a3a1a; border-color:#2a5a2a; color:#66ff66; }
        .post .actions .like-100 { background:#3a3a1a; border-color:#5a5a2a; color:#ffff66; }
        .post .actions .like-500 { background:#3a1a1a; border-color:#5a2a2a; color:#ff6666; }
        
        .comments { margin-top:8px; border-top:1px solid #222; padding-top:8px; }
        .comments .toggle { background:none; border:none; color:#ff8c00; cursor:pointer; font-size:0.7rem; }
        .comments .list { display:none; margin-top:6px; }
        .comments .list.open { display:block; }
        .comments .comment { display:flex; gap:6px; padding:4px 0; border-bottom:1px solid #1a1a2a; }
        .comments .comment .avatar-wrap { width:20px; height:20px; border-radius:50%; overflow:hidden; background:#ff8c00; display:flex; align-items:center; justify-content:center; }
        .comments .comment .avatar-wrap .letter { color:#0b0b0f; font-weight:700; font-size:0.5rem; }
        .comments .comment .body { flex:1; font-size:0.75rem; }
        .comments .comment .body .name { color:#ffaa44; font-weight:600; }
        .comments .comment .body .time { color:#666; font-size:0.5rem; margin-left:6px; }
        .comments .input-wrap { display:flex; gap:6px; margin-top:6px; }
        .comments .input-wrap input { flex:1; padding:6px 12px; background:#181825; border:1px solid #323245; border-radius:30px; color:white; font-size:0.75rem; outline:none; }
        .comments .input-wrap input:focus { border-color:#ff8c00; }
        .comments .input-wrap button { background:#ff8c00; border:none; border-radius:30px; padding:0 14px; color:#0b0b0f; font-weight:700; cursor:pointer; font-size:0.7rem; }
        
        .profile-header {
            background:#14141f; border-radius:16px; padding:20px;
            text-align:center; border:1px solid #262633; margin-bottom:10px;
        }
        .profile-header .avatar-wrap {
            width:80px; height:80px; border-radius:50%; overflow:hidden;
            margin:0 auto 10px; background:#ff8c00; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        }
        .profile-header .avatar-wrap img { width:100%; height:100%; object-fit:cover; }
        .profile-header .avatar-wrap .letter { color:#0b0b0f; font-size:2rem; font-weight:700; }
        .profile-header .name { font-size:1.2rem; font-weight:700; color:#ffaa44; }
        .profile-header .bio { color:#888; font-size:0.8rem; margin-top:4px; }
        .profile-header .actions { display:flex; gap:6px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
        .profile-header .actions button { padding:4px 14px; border:none; border-radius:30px; font-weight:600; cursor:pointer; font-size:0.7rem; }
        .profile-header .actions .edit { background:#ff8c00; color:#0b0b0f; }
        .profile-header .actions .msg { background:#222233; color:#ff8c00; border:1px solid #ff8c00; }
        .profile-header .actions .friend { background:#222233; color:#66aaff; border:1px solid #66aaff; }
        .profile-header .actions .friend.added { background:#1a3a1a; color:#66ff66; border-color:#66ff66; }
        
        .profile-stats { display:flex; gap:20px; justify-content:center; margin:8px 0; font-size:0.7rem; color:#888; }
        .profile-stats span { cursor:pointer; }
        .profile-stats span:hover { color:#ff8c00; }
        
        .group-list { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .group-card {
            background:#14141f; border-radius:16px; padding:16px;
            text-align:center; border:1px solid #262633; cursor:pointer; transition:0.2s;
        }
        .group-card:hover { transform:scale(1.02); border-color:#ff8c00; }
        .group-card .icon { font-size:2rem; }
        .group-card .name { font-weight:600; font-size:0.85rem; margin-top:4px; }
        .group-card .count { color:#666; font-size:0.65rem; }
        
        .people-list { display:flex; flex-direction:column; gap:6px; }
        .people-item {
            background:#14141f; border-radius:12px; padding:10px 14px;
            border:1px solid #262633; cursor:pointer; display:flex; align-items:center; gap:10px;
        }
        .people-item:hover { border-color:#ff8c00; }
        .people-item .avatar-wrap {
            width:32px; height:32px; border-radius:50%; overflow:hidden;
            background:#ff8c00; display:flex; align-items:center; justify-content:center;
        }
        .people-item .avatar-wrap img { width:100%; height:100%; object-fit:cover; }
        .people-item .avatar-wrap .letter { color:#0b0b0f; font-weight:700; font-size:0.7rem; }
        .people-item .info { flex:1; }
        .people-item .info .name { font-weight:600; font-size:0.8rem; }
        .people-item .info .status { color:#666; font-size:0.6rem; }
        
        .chat-view {
            display:none; background:#14141f; border-radius:16px;
            padding:12px; border:1px solid #262633;
            height:65vh; flex-direction:column;
        }
        .chat-view.active { display:flex; }
        .chat-view .back { background:none; border:none; color:#ff8c00; cursor:pointer; font-weight:600; margin-bottom:6px; font-size:0.8rem; }
        .chat-view .messages { flex:1; overflow-y:auto; margin-bottom:6px; }
        .chat-view .messages .msg { padding:6px 10px; margin-bottom:4px; background:#0f0f1a; border-radius:8px; font-size:0.8rem; border:1px solid #1a1a2a; }
        .chat-view .messages .msg .author { font-weight:600; color:#ffaa44; font-size:0.7rem; }
        .chat-view .messages .msg .time { color:#666; font-size:0.5rem; margin-left:6px; }
        .chat-view .messages .msg .text { margin-top:2px; }
        .chat-view .input-wrap { display:flex; gap:6px; }
        .chat-view .input-wrap input { flex:1; padding:8px 14px; background:#181825; border:1px solid #323245; border-radius:30px; color:white; font-size:0.8rem; outline:none; }
        .chat-view .input-wrap input:focus { border-color:#ff8c00; }
        .chat-view .input-wrap button { background:#ff8c00; border:none; border-radius:30px; padding:0 18px; font-weight:700; color:#0b0b0f; cursor:pointer; }
        
        .modal {
            display:none; position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.85); z-index:999; justify-content:center; align-items:center; padding:20px;
        }
        .modal.open { display:flex; }
        .modal .box {
            background:#1a1a2a; border-radius:16px; padding:24px;
            max-width:400px; width:100%; border:1px solid #333;
        }
        .modal .box h3 { color:#ff8c00; margin-bottom:10px; text-align:center; }
        .modal .box .google-btn {
            display:flex; align-items:center; justify-content:center; gap:10px;
            width:100%; padding:12px; background:#fff; border:1px solid #ddd;
            border-radius:40px; font-weight:600; font-size:0.9rem; cursor:pointer;
            color:#333; transition:0.2s;
        }
        .modal .box .google-btn:hover { background:#f0f0f0; }
        .modal .box .google-btn img { width:20px; height:20px; }
        .modal .box .divider {
            text-align:center; color:#666; margin:12px 0;
            font-size:0.7rem; position:relative;
        }
        .modal .box .divider::before {
            content:''; position:absolute; left:0; top:50%;
            width:40%; height:1px; background:#333;
        }
        .modal .box .divider::after {
            content:''; position:absolute; right:0; top:50%;
            width:40%; height:1px; background:#333;
        }
        .modal .box input {
            width:100%; padding:12px; background:#0f0f1a;
            border:1px solid #333; border-radius:40px; color:white;
            margin-bottom:10px; font-size:0.9rem; outline:none;
        }
        .modal .box input:focus { border-color:#ff8c00; }
        .modal .box textarea {
            width:100%; padding:10px; background:#0f0f1a;
            border:1px solid #333; border-radius:8px; color:white;
            margin-bottom:10px; font-family:inherit; font-size:0.9rem; resize:vertical;
        }
        .modal .box .btns { display:flex; gap:8px; }
        .modal .box .btns button {
            padding:10px 20px; border:none; border-radius:30px;
            font-weight:700; cursor:pointer; flex:1;
        }
        .modal .box .btns .cancel { background:#333; color:#888; }
        .modal .box .btns .save { background:#ff8c00; color:#0b0b0f; }
        
        .admin-dot {
            position:fixed; bottom:10px; right:10px;
            width:12px; height:12px; border-radius:50%;
            border:2px solid #333; cursor:pointer;
            background:#222; z-index:99;
        }
        .admin-dot.active { background:#ff8c00; border-color:#ff8c00; }
        
        .toast {
            position:fixed; bottom:70px; left:50%; transform:translateX(-50%);
            background:#1a1f26; color:#ffb347; padding:8px 20px;
            border-radius:40px; font-size:0.9rem; font-weight:bold;
            z-index:999; border:1px solid #ff9f2e;
            box-shadow:0 4px 15px rgba(255,159,46,0.2);
            animation:fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateX(-50%) translateY(10px); }
            to { opacity:1; transform:translateX(-50%) translateY(0); }
        }
        
        @media(max-width:480px){ .group-list{grid-template-columns:1fr 1fr;} .menu button{font-size:0.65rem;padding:6px 10px;} }
    </style>
</head>
<body>

<div class="container">
    <!-- ТОПБАР -->
    <div class="topbar">
        <div class="logo" onclick="goToFeed()">🌀 METAIMPERIYA</div>
        <div class="right">
            <span class="name" id="topName" onclick="goToProfile()">Гость</span>
            <div class="avatar-wrap" id="topAvatar" onclick="uploadAvatar()">
                <span class="letter">?</span>
            </div>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="menu">
        <button class="active" id="mFeed" onclick="goToFeed()">📰 Лента</button>
        <button id="mGroups" onclick="goToGroups()">👥 Группы</button>
        <button id="mPeople" onclick="goToPeople()">👤 Люди</button>
        <button id="mProfile" onclick="goToProfile()">👤 Профиль</button>
    </div>

    <!-- ЛЕНТА -->
    <div class="page active" id="feedPage">
        <div class="post-form">
            <div class="input-row">
                <input type="text" id="msgInput" placeholder="Что нового?">
                <button onclick="sendPost()">→</button>
            </div>
            <label class="file-label" for="fileInput">📎 Добавить фото</label>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
            <div id="previewBox" class="preview-box">
                <img id="previewImg">
                <span id="previewName" style="font-size:0.75rem;max-width:80px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;"></span>
                <button class="remove-pic" onclick="removeImage()">✕</button>
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <!-- ГРУППЫ -->
    <div class="page" id="groupsPage">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <h3 style="color:#ff8c00;">👥 Группы</h3>
            <button onclick="openCreateGroup()" style="background:#ff8c00;border:none;border-radius:30px;padding:6px 16px;font-weight:700;color:#0b0b0f;cursor:pointer;">➕ Создать</button>
        </div>
        <div class="group-list" id="groupList"></div>
    </div>

    <!-- ЛЮДИ -->
    <div class="page" id="peoplePage">
        <h3 style="color:#ff8c00;margin-bottom:10px;">👤 Люди</h3>
        <div class="people-list" id="peopleList"></div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div class="page" id="profilePage">
        <div class="profile-header" id="profileHeader">
            <div class="avatar-wrap" id="profileAvatar" onclick="uploadAvatar()">
                <span class="letter">?</span>
            </div>
            <div class="name" id="profileName">Гость</div>
            <div class="bio" id="profileBio">Настрой свой профиль</div>
            <div class="profile-stats">
                <span>🤝 Друзья: <span id="friendsCount">0</span></span>
                <span>👀 Подписчики: <span id="subscribersCount">0</span></span>
                <span>📌 Подписки: <span id="subscriptionsCount">0</span></span>
            </div>
            <div class="actions" id="profileActions">
                <button class="edit" onclick="openEditProfile()">✏️ Редактировать</button>
                <button class="msg" onclick="uploadAvatar()">📷 Аватар</button>
            </div>
        </div>
        <div id="profilePosts"></div>
    </div>

    <!-- ЧАТ -->
    <div class="chat-view" id="chatView">
        <button class="back" onclick="closeChat()">← Назад</button>
        <div class="messages" id="chatMessages"></div>
        <div class="input-wrap">
            <input type="text" id="chatInput" placeholder="Сообщение...">
            <button onclick="sendChat()">→</button>
        </div>
    </div>
</div>

<!-- АДМИН ТОЧКА -->
<div class="admin-dot" id="adminDot" onclick="adminLogin()"></div>

<!-- МОДАЛКА ВХОДА С GOOGLE -->
<div class="modal open" id="loginModal">
    <div class="box">
        <h3>👤 Вход в METAIMPERIYA</h3>
        <button class="google-btn" id="googleLoginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" />
            Войти через Google
        </button>
        <div class="divider">или</div>
        <input type="text" id="nameInput" placeholder="Введите ник..." maxlength="24">
        <div class="btns">
            <button class="save" onclick="loginWithName()">Войти</button>
        </div>
    </div>
</div>

<!-- МОДАЛКА РЕДАКТИРОВАНИЯ ПРОФИЛЯ -->
<div class="modal" id="editProfileModal">
    <div class="box">
        <h3>✏️ Редактировать</h3>
        <input type="text" id="editName" placeholder="Имя">
        <textarea id="editBio" placeholder="О себе..."></textarea>
        <div class="btns">
            <button class="cancel" onclick="closeEditProfile()">Отмена</button>
            <button class="save" onclick="saveProfile()">Сохранить</button>
        </div>
    </div>
</div>

<!-- МОДАЛКА СОЗДАНИЯ ГРУППЫ -->
<div class="modal" id="createGroupModal">
    <div class="box">
        <h3>📝 Создать группу</h3>
        <input type="text" id="groupName" placeholder="Название группы...">
        <div class="btns">
            <button class="cancel" onclick="closeCreateGroup()">Отмена</button>
            <button class="save" onclick="createGroup()">Создать</button>
        </div>
    </div>
</div>

<script>
(function() {
    // ================================================================
    // FIREBASE - ПРАВИЛЬНЫЙ КОНФИГ С authDomain!!!
    // ================================================================
    const FB_CONFIG = {
        apiKey: "AIzaSyDCx2wLK2EZJOrUNoXEdWDlYY0e8cOHhtY",
        authDomain: "myecosystem-e6414.firebaseapp.com",
        databaseURL: "https://myecosystem-e6414-default-rtdb.firebaseio.com",
        projectId: "myecosystem-e6414",
        storageBucket: "myecosystem-e6414.firebasestorage.app",
        messagingSenderId: "426302111033",
        appId: "1:426302111033:web:7b39e7026e94f528a13ce8"
    };
    firebase.initializeApp(FB_CONFIG);
    const db = firebase.database();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ================================================================
    // СОСТОЯНИЕ
    // ================================================================
    let USER = localStorage.getItem('smm_username') || null;
    let USER_UID = localStorage.getItem('smm_uid') || null;
    let IS_ADMIN = localStorage.getItem('admin_metaimperiya') === '1';
    let pendingImage = null;
    let pendingImageFile = null;
    let CURRENT_CHAT = null;
    let chatUnsub = null;
    let VIEWING_USER = null;

    // ================================================================
    // AUTH - GOOGLE + АНОНИМ
    // ================================================================
    auth.onAuthStateChanged(user => {
        const loginModal = document.getElementById('loginModal');
        if (user) {
            USER_UID = user.uid;
            USER = user.displayName || user.email || user.uid.slice(0, 8);
            localStorage.setItem('smm_username', USER);
            localStorage.setItem('smm_uid', USER_UID);
            
            db.ref('users/' + USER_UID).update({
                name: USER,
                email: user.email || 'anon',
                uid: USER_UID
            });
            
            loginModal.classList.remove('open');
            updateUI();
            loadFeed();
            loadGroups();
            loadPeople();
        } else {
            USER = null;
            USER_UID = null;
            updateUI();
            loginModal.classList.add('open');
        }
    });

    // Google вход
    document.getElementById('googleLoginBtn').addEventListener('click', function() {
        auth.signInWithPopup(provider).catch(err => {
            if (err.code === 'auth/popup-blocked') {
                auth.signInWithRedirect(provider);
            } else {
                alert('Ошибка: ' + err.message);
            }
        });
    });

    // Анонимный вход
    window.loginWithName = function() {
        const n = document.getElementById('nameInput').value.trim();
        if (!n) { alert('Введите имя'); return; }
        auth.signInAnonymously().then(() => {
            USER = n.slice(0, 24);
            localStorage.setItem('smm_username', USER);
            updateUI();
            loadFeed();
            loadGroups();
            loadPeople();
            document.getElementById('loginModal').classList.remove('open');

    function getUserAvatar(uid, callback) {
        db.ref('users/' + uid + '/avatar').once('value', snap => {
            callback(snap.val() || null);
        });
    }

    function renderAvatar(uid, container, letter) {
        if (!container) return;
        getUserAvatar(uid, function(url) {
            if (url) {
                container.innerHTML = `<img src="${url}" />`;
            } else {
                container.innerHTML = `<span class="letter">${letter || '?'}</span>`;
            }
        });
    }

    window.uploadAvatar = function() {
        if (!USER) { alert('Войдите!'); return; }
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
                alert('Максимум 5 МБ');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(ev) {
                const url = ev.target.result;
                db.ref('users/' + USER_UID + '/avatar').set(url);
                updateUI();
                alert('✅ Аватарка обновлена!');
            };
            reader.readAsDataURL(file);
        };
        input.click();
    };

    // ================================================================
    // ЛЕНТА
    // ================================================================
    function loadFeed() {
        if (!USER) return;
        db.ref('posts').orderByChild('timestamp').on('value', snap => {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            const data = snap.val() || {};
            const keys = Object.keys(data).sort((a, b) => (data[b].timestamp || 0) - (data[a].timestamp || 0));

            if (!keys.length) {
                feed.innerHTML = '<div style="text-align:center;padding:20px;color:#666;font-size:0.8rem;">Нет постов</div>';
                return;
            }

            keys.forEach(k => { const p = data[k]; p.id = k; feed.appendChild(renderPost(p)); });
        });
    }

    function renderPost(p) {
        const div = document.createElement('div');
        div.className = 'post';

        const letter = (p.nick || '?').charAt(0).toUpperCase();
        
        let imgHtml = '';
        if (p.img) {
            imgHtml = `<img src="${p.img}" onclick="window.open(this.src)" loading="lazy">`;
        }

        let actionsHtml = `
            <button class="like-10" onclick="likePost('${p.id}', 10)">+10</button>
            <button class="like-100" onclick="likePost('${p.id}', 100)">+100</button>
            <button class="like-500" onclick="likePost('${p.id}', 500)">+500</button>
            <span class="likes">❤️ ${p.likes || 0}</span>
            <button onclick="toggleComments('${p.id}')">💬 ${p.commentCount || 0}</button>
        `;
        if (p.nick === USER || IS_ADMIN) {
            actionsHtml += `<button class="del-btn" onclick="deletePost('${p.id}')">🗑</button>`;
        }

        div.innerHTML = `
            <div class="author" onclick="viewUserProfile('${p.uid || ''}')">
                <span class="avatar-wrap" id="post-avatar-${p.id}"><span class="letter">${letter}</span></span>
                <span class="name">${esc(p.nick || 'Аноним')}</span>
                <span class="time">${p.time || ''}</span>
            </div>
            <div class="text">${esc(p.msg || '')}</div>
            ${imgHtml}
            <div class="actions">${actionsHtml}</div>
            <div class="comments" id="comments_${p.id}">
                <button class="toggle" onclick="toggleComments('${p.id}')">💬 Показать комментарии</button>
                <div class="list" id="commentsList_${p.id}">
                    <div id="commentsContainer_${p.id}"></div>
                    <div class="input-wrap">
                        <input type="text" id="commentInput_${p.id}" placeholder="Напиши комментарий...">
                        <button onclick="submitComment('${p.id}')">→</button>
                    </div>
                </div>
            </div>
        `;

        if (p.uid) {
            const avatarEl = document.getElementById('post-avatar-' + p.id);
            if (avatarEl) renderAvatar(p.uid, avatarEl, letter);
        }

        loadComments(p.id);
        return div;
    }

    // ================================================================
    // КОММЕНТАРИИ
    // ================================================================
    function loadComments(postId) {
        db.ref('comments/' + postId).orderByChild('timestamp').on('value', snap => {
            const container = document.getElementById('commentsContainer_' + postId);
            if (!container) return;
            container.innerHTML = '';
            const data = snap.val() || {};
            const keys = Object.keys(data).sort((a, b) => (data[a].timestamp || 0) - (data[b].timestamp || 0));

            const count = keys.length;
            const countEl = document.querySelector(`#comments_${postId} .actions button:last-child`);
            if (countEl) countEl.textContent = `💬 ${count}`;
            db.ref('posts/' + postId + '/commentCount').set(count);

            if (!keys.length) {
                container.innerHTML = '<div style="color:#666;font-size:0.65rem;padding:4px 0;">Нет комментариев</div>';
                return;
            }

            keys.forEach(k => {
                const c = data[k];
                const div = document.createElement('div');
                div.className = 'comment';
                const letter = (c.nick || '?').charAt(0).toUpperCase();
                div.innerHTML = `
                    <span class="avatar-wrap" id="comment-avatar-${k}"><span class="letter">${letter}</span></span>
                    <div class="body">
                        <span class="name">${esc(c.nick)}</span>
                        <span class="time">${c.time || ''}</span>
                        <div>${esc(c.text || '')}</div>
                    </div>
                    ${(c.nick === USER || IS_ADMIN) ? `<button onclick="deleteComment('${postId}','${k}')" style="background:none;border:none;color:#ff6666;cursor:pointer;font-size:0.6rem;">✕</button>` : ''}
                `;
                container.appendChild(div);
                if (c.uid) {
                    const avatarEl = document.getElementById('comment-avatar-' + k);
                    if (avatarEl) renderAvatar(c.uid, avatarEl, letter);
                }
            });
        });
    }

    window.toggleComments = function(postId) {
        const list = document.getElementById('commentsList_' + postId);
        const toggle = document.querySelector(`#comments_${postId} .toggle`);
        if (list) {
            list.classList.toggle('open');
            if (toggle) {
                toggle.textContent = list.classList.contains('open') ? '▲ Скрыть' : '💬 Показать комментарии';
            }
        }
    };

    window.submitComment = function(postId) {
        if (!USER) { alert('Войдите!'); return; }
        const input = document.getElementById('commentInput_' + postId);
        const text = input.value.trim();
        if (!text) return;

        db.ref('comments/' + postId).push({
            nick: USER,
            uid: USER_UID,
            text: text,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            timestamp: Date.now()
        });
        input.value = '';
        const list = document.getElementById('commentsList_' + postId);
        if (list) list.classList.add('open');
        const toggle = document.querySelector(`#comments_${postId} .toggle`);
        if (toggle) toggle.textContent = '▲ Скрыть';
    };

    window.deleteComment = function(postId, commentId) {
        if (!confirm('Удалить комментарий?')) return;
        db.ref('comments/' + postId + '/' + commentId).remove();
    };

    // ================================================================
    // ОТПРАВКА ПОСТА
    // ================================================================
    window.sendPost = function() {
        const text = document.getElementById('msgInput').value.trim();
        if (!text && !pendingImageFile) {
            alert('Напиши текст или добавь фото');
            return;
        }

        const postObj = {
            nick: USER || 'Аноним',
            uid: USER_UID,
            msg: text || '📷 Фото',
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            timestamp: Date.now(),
            likes: 0,
            commentCount: 0
        };

        if (pendingImageFile) {
            const reader = new FileReader();
            reader.onload = function(e) {
                postObj.img = e.target.result;
                db.ref('posts').push(postObj);
                clearInputs();
            };
            reader.readAsDataURL(pendingImageFile);
        } else {
            db.ref('posts').push(postObj);
            clearInputs();
        }
    };

    function clearInputs() {
        document.getElementById('msgInput').value = '';
        pendingImage = null;
        pendingImageFile = null;
        document.getElementById('previewBox').classList.remove('visible');
        document.getElementById('fileInput').value = '';
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) { alert('Только изображения!'); this.value = ''; return; }
        if (file.size > 5 * 1024 * 1024) { alert('Максимум 5 МБ'); this.value = ''; return; }
        
        pendingImageFile = file;
        const reader = new FileReader();
        reader.onload = function(ev) {
            pendingImage = ev.target.result;
            document.getElementById('previewImg').src = pendingImage;
            document.getElementById('previewName').textContent = file.name.slice(0, 18);
            document.getElementById('previewBox').classList.add('visible');
        };
        reader.readAsDataURL(file);
    });

    window.removeImage = function() {
        pendingImage = null;
        pendingImageFile = null;
        document.getElementById('previewBox').classList.remove('visible');
        document.getElementById('fileInput').value = '';
    };

    document.getElementById('msgInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendPost();
    });

    // ================================================================
    // ЛАЙКИ
    // ================================================================
    window.likePost = function(id, amount) {
        const ref = db.ref('posts/' + id + '/likes');
        ref.transaction(current => (current || 0) + amount);
        showToast(`🔥 +${amount} likes!`);
    };

    function showToast(text) {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = text;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    window.deletePost = function(id) {
        if (!confirm('Удалить пост?')) return;
        db.ref('posts/' + id).remove();
        db.ref('comments/' + id).remove();
    };

    // ================================================================
    // ПРОФИЛЬ
    // ================================================================
    function loadProfile() {
        const uid = VIEWING_USER || USER_UID;
        if (!uid) return;

        db.ref('users/' + uid).once('value', snap => {
            const u = snap.val() || {};
            const name = u.name || 'Аноним';
            const bio = u.bio || '';
            document.getElementById('profileName').textContent = name;
            document.getElementById('profileBio').textContent = bio;
            renderAvatar(uid, document.getElementById('profileAvatar'), name.charAt(0).toUpperCase());
            showProfileActions(uid);
        });

        db.ref('posts').orderByChild('timestamp').on('value', snap => {
            const container = document.getElementById('profilePosts');
            container.innerHTML = '';
            const data = snap.val() || {};
            const keys = Object.keys(data).filter(k => data[k].uid === uid).sort((a, b) => (data[b].timestamp || 0) - (data[a].timestamp || 0));
            if (!keys.length) {
                container.innerHTML = '<div style="text-align:center;padding:10px;color:#666;font-size:0.7rem;">Нет постов</div>';
                return;
            }
            keys.forEach(k => { const p = data[k]; p.id = k; container.appendChild(renderPost(p)); });
        });

        loadFriends(uid);
        loadSubscribers(uid);
        loadSubscriptions(uid);
    }

    function showProfileActions(uid) {
        const actions = document.getElementById('profileActions');
        if (!uid || uid === USER_UID) {
            actions.innerHTML = `
                <button class="edit" onclick="openEditProfile()">✏️ Редактировать</button>
                <button class="msg" onclick="uploadAvatar()">📷 Аватар</button>
                <button class="msg" onclick="logout()" style="background:#4a1a1a;color:#ff6666;border-color:#6a1a1a;">🚪 Выйти</button>
            `;
            return;
        }
        const isFriend = checkFriend(uid);
        actions.innerHTML = `
            <button class="msg" onclick="openDM('${uid}')">✉️ Сообщение</button>
            <button class="friend ${isFriend ? 'added' : ''}" onclick="toggleFriend('${uid}')">
                ${isFriend ? '✅ В друзьях' : '➕ Добавить в друзья'}
            </button>
        `;
    }

    function checkFriend(uid) {
        if (!USER_UID) return false;
        return localStorage.getItem('fr_' + USER_UID + '_' + uid) === '1';
    }

    window.toggleFriend = function(uid) {
        if (!USER_UID) return;
        const isFriend = checkFriend(uid);
        if (isFriend) {
            if (!confirm('Удалить из друзей?')) return;
            localStorage.removeItem('fr_' + USER_UID + '_' + uid);
            db.ref('friends/' + USER_UID + '/' + uid).remove();
            db.ref('friends/' + uid + '/' + USER_UID).remove();
        } else {
            localStorage.setItem('fr_' + USER_UID + '_' + uid, '1');
            db.ref('friends/' + USER_UID + '/' + uid).set(true);
            db.ref('friends/' + uid + '/' + USER_UID).set(true);
        }
        loadProfile();
        if (VIEWING_USER) showProfileActions(VIEWING_USER);
    };

    function loadFriends(uid) {
        db.ref('friends/' + uid).on('value', snap => {
            const data = snap.val() || {};
            const count = Object.keys(data).length;
            document.getElementById('friendsCount').textContent = count;
        });
    }

    function loadSubscribers(uid) {
        db.ref('subscribers/' + uid).on('value', snap => {
            const data = snap.val() || {};
            document.getElementById('subscribersCount').textContent = Object.keys(data).length;
        });
    }

    function loadSubscriptions(uid) {
        db.ref('subscriptions/' + uid).on('value', snap => {
            const data = snap.val() || {};

    }

    function loadGroups() {

    window.openGroup = function(groupId) {
        CURRENT_CHAT = 'group_' + groupId;
        document.getElementById('chatView').classList.add('active');
        setActivePage(null);
        loadGroupChat(groupId);

    function loadGroupChat(groupId) {
        if (chatUnsub) { db.ref(chatUnsub).off('value'); chatUnsub = null; }
        const box = document.getElementById('chatMessages');
        box.innerHTML = '<div style="text-align:center;padding:20px;color:#666;font-size:0.8rem;">Загрузка...</div>';
        
        if (USER_UID) {
            db.ref('groups/' + groupId + '/members/' + USER_UID).set(true);
        }
        
        const path = 'group_messages/' + groupId;
        chatUnsub = path;
        db.ref(path).orderByChild('timestamp').on('value', snap => {

    window.createGroup = function() {

        if (!name) { alert('Введите название'); return; }
        const groupId = 'group_' + Date.now();
        const newGroup = { id: groupId, name: name };
        GROUPS.push(newGroup);
        db.ref('groups/' + groupId).set({
            name: name,
            creator: USER_UID,
            createdAt: Date.now()
        });
        db.ref('groups/' + groupId + '/members/' + USER_UID).set(true);
        closeCreateGroup();
        alert('✅ Группа создана!');
        loadGroups();

    // ================================================================
    // ЛИЧНЫЕ СООБЩЕНИЯ
    // ================================================================
    function getDMId(uid1, uid2) {
        return [uid1, uid2].sort().join('_');
    }

    window.openDM = function(userId) {
        CURRENT_CHAT = 'dm_' + userId;
        document.getElementById('chatView').classList.add('active');
        setActivePage(null);
        loadDMChat(userId);
    };

    function loadDMChat(userId) {
        if (chatUnsub) { db.ref(chatUnsub).off('value'); chatUnsub = null; }
        const box = document.getElementById('chatMessages');
        box.innerHTML = '<div style="text-align:center;padding:20px;color:#666;font-size:0.8rem;">Загрузка...</div>';
        const dmId = getDMId(USER_UID, userId);
        const path = 'dms/' + dmId;
        chatUnsub = path;
        db.ref(path).orderByChild('timestamp').on('value', snap => {
            box.innerHTML = '';
            if (!snap.exists()) {
                box.innerHTML = '<div style="text-align:center;padding:20px;color:#666;font-size:0.8rem;">Нет сообщений</div>';
                return;
            }
            snap.forEach(s => {
                const m = s.val();
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `
                    <div><span class="author">${esc(m.nick)}</span><span class="time">${m.time || ''}</span></div>
                    <div class="text">${esc(m.text || '')}</div>
                    ${m.img ? `<img src="${m.img}" style="max-width:100%;max-height:150px;border-radius:8px;margin-top:4px;">` : ''}
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    // ================================================================
    // ОТПРАВКА В ЧАТ
    // ================================================================
    window.sendChat = function() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const msgObj = {
            nick: USER,
            uid: USER_UID,
            text: text,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            timestamp: Date.now()
        };

        if (CURRENT_CHAT && CURRENT_CHAT.startsWith('group_')) {
            const groupId = CURRENT_CHAT.replace('group_', '');
            db.ref('group_messages/' + groupId).push(msgObj);
        } else if (CURRENT_CHAT && CURRENT_CHAT.startsWith('dm_')) {
            const userId = CURRENT_CHAT.replace('dm_', '');
            const dmId = getDMId(USER_UID, userId);
            db.ref('dms/' + dmId).push(msgObj);
        } else {
            alert('Выберите чат');
        }
        input.value = '';
    };

    document.getElementById('chatInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendChat();
    });

    window.closeChat = function() {
        document.getElementById('chatView').classList.remove('active');
        if (chatUnsub) { db.ref(chatUnsub).off('value'); chatUnsub = null; }
        CURRENT_CHAT = null;
        if (document.getElementById('groupsPage').classList.contains('active')) goToGroups();
        else if (document.getElementById('peoplePage').classList.contains('active')) goToPeople();
        else if (document.getElementById('profilePage').classList.contains('active')) goToProfile();
        else goToFeed();
    };

    // ================================================================
    // УТИЛИТЫ
    // ================================================================
    function esc(s) {
        if (!s) return '';
        return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // ================================================================
    // СИД
    // ================================================================
    db.ref('posts').once('value', snap => {
        if (!snap.exists()) {
            const posts = [
                { nick: '📢 Админ', uid: 'admin', msg: 'Добро пожаловать в METAIMPERIYA! 🏳️‍🌈 Общайся, делись фото, находи друзей!', time: '12:00', timestamp: Date.now() - 3600000, likes: 5, commentCount: 0, img: null },
                { nick: '🚀 Орг', uid: 'org', msg: 'Завтра в 19:00 встреча в группе "Общий"! Всех ждём!', time: '11:30', timestamp: Date.now() - 7200000, likes: 3, commentCount: 0, img: null }
            ];
            posts.forEach(p => db.ref('posts').push(p));
        }
    });

    // ================================================================
    // ЗАПУСК
    // ================================================================
    updateUI();
    loadFeed();
    loadGroups();
    loadPeople();
    setActivePage('feedPage');
    console.log('🏛️ METAIMPERIYA - ПОЛНАЯ СОЦСЕТЬ!');
    console.log('📸 Фото работают!');
    console.log('👥 Группы, личка, друзья!');
    console.log('🔑 Google вход есть!');
    console.log('🏴‍☠️ Админ-пароль: 12345');

})();
</script>
</body>
