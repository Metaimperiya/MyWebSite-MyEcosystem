<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход через Google</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            margin: 0;
        }
        #authPanel, #userPanel {
            background: #161b22;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            min-width: 350px;
            margin-top: 20px;
        }
        #status {
            padding: 15px;
            background: #161b22;
            border-radius: 8px;
            margin: 20px 0;
            min-width: 350px;
            text-align: center;
        }
        button {
            transition: 0.2s;
            font-size: 16px;
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .error {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🚀 Моя Экосистема</h1>
    <div id="status">Загрузка...</div>

    <!-- Панель входа -->
    <div id="authPanel">
        <h2>🔑 Вход через Google</h2>
        <button id="googleBtn" style="background: #4285F4; padding: 15px 40px; font-size: 18px; border: none; border-radius: 8px; color: white; cursor: pointer;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" style="vertical-align: middle; margin-right: 10px;">
            Войти через Google
        </button>
        <div id="errorMessage" class="error"></div>
        <p style="color: #888; font-size: 12px; margin-top: 10px;">
            💡 Если не открывается окно - проверь консоль (F12)
        </p>
    </div>

    <!-- Панель пользователя -->
    <div id="userPanel" style="display: none;">
        <h2>🎮 Добро пожаловать!</h2>
        <p>Ты в своей экосистеме. Здесь будут твои сайты.</p>
        <button id="logoutBtn" style="background: #da3633; padding: 10px 20px; border: none; border-radius: 8px; color: white; cursor: pointer;">Выйти</button>
    </div>

    <!-- 👇 СКРИПТ ПЕРЕД /BODY - ТАК БЕЗОПАСНЕЕ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { 
            getAuth, 
            GoogleAuthProvider, 
            signInWithPopup, 
            signInWithRedirect,
            getRedirectResult,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCx2wLK2EZJOrUNoXEdWDlYY0e8cOHhtY",
            authDomain: "myecosystem-e6414.firebaseapp.com",
            projectId: "myecosystem-e6414",
            storageBucket: "myecosystem-e6414.firebasestorage.app",
            messagingSenderId: "426302111033",
            appId: "1:426302111033:web:7b39e7026e94f528a13ce8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 👇 Элементы DOM - теперь они точно существуют
        const googleBtn = document.getElementById('googleBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const statusDiv = document.getElementById('status');
        const authPanel = document.getElementById('authPanel');
        const userPanel = document.getElementById('userPanel');
        const errorDiv = document.getElementById('errorMessage');

        // Функция для отображения ошибок
        function showError(msg) {
            if (errorDiv) errorDiv.textContent = '❌ ' + msg;
            console.error('Firebase Error:', msg);
        }

        // 👇 КНОПКА ВХОДА
        googleBtn.addEventListener('click', async () => {
            try {
                errorDiv.textContent = '';
                
                // Вариант 1: С ВЫБОРОМ АККАУНТА (для нескольких Google-аккаунтов)
                provider.setCustomParameters({
                    prompt: 'select_account'
                });
                
                // Пробуем popup
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                await setDoc(doc(db, "users", user.uid), {
                    username: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    createdAt: new Date().toISOString()
                }, { merge: true });

                alert('✅ Вход выполнен как: ' + user.email);
                
            } catch (error) {
                console.error('Full error:', error);
                
                // Если popup заблокирован - пробуем redirect
                if (error.code === 'auth/popup-blocked' || error.code === 'auth/popup-closed-by-user') {
                    showError('Popup заблокирован! Используем redirect...');
                    try {
                        // Вариант 2: REDIRECT (работает везде)
                        await signInWithRedirect(auth, provider);
                    } catch (redirectError) {
                        showError('Redirect тоже не сработал: ' + redirectError.message);
                    }
                } else {
                    showError(error.message);
                }
            }
        });

        // 👇 ОБРАБОТКА REDIRECT (если вернулись после редиректа)
        try {
            const result = await getRedirectResult(auth);
            if (result) {
                const user = result.user;
                await setDoc(doc(db, "users", user.uid), {
                    username: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    createdAt: new Date().toISOString()
                }, { merge: true });
                alert('✅ Вход через redirect выполнен как: ' + user.email);
            }
        } catch (error) {
            showError('Ошибка redirect: ' + error.message);
        }

        // 👇 СЛЕДИМ ЗА ПОЛЬЗОВАТЕЛЕМ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusDiv.innerHTML = `
                    ✅ Ты зашел как: ${user.displayName || user.email}
                    <br>
                    <img src="${user.photoURL || ''}" width="50" style="border-radius: 50%;">
                    <br>
                    <small style="color: #888;">${user.email}</small>
                `;
                authPanel.style.display = 'none';
                userPanel.style.display = 'block';
            } else {
                statusDiv.innerHTML = '❌ Ты не авторизован, зайди, блядь!';
                authPanel.style.display = 'block';
                userPanel.style.display = 'none';
            }
        });

        // 👇 ВЫХОД
        logoutBtn.addEventListener('click', () => {
            auth.signOut();
            alert('Вышел, нахуй!');
        });

        // 👇 ПРОВЕРКА КОНСОЛИ (для отладки)
        console.log('✅ Firebase инициализирован. Ждем клика...');
        console.log('🔍 Текущий домен:', window.location.origin);
        
        // Проверка - добавлен ли домен в Firebase Console
        const currentDomain = window.location.hostname;
        if (currentDomain === '127.0.0.1' || currentDomain === 'localhost') {
            console.warn('⚠️ Ты на localhost. Убедись, что localhost добавлен в Authorized Domains в Firebase Console!');
        }
    </script>
</body>
</html>
