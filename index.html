<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход через Google</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDCx2wLK2EZJOrUNoXEdWDlYY0e8cOHhtY",
            authDomain: "myecosystem-e6414.firebaseapp.com",
            projectId: "myecosystem-e6414",
            storageBucket: "myecosystem-e6414.firebasestorage.app",
            messagingSenderId: "426302111033",
            appId: "1:426302111033:web:7b39e7026e94f528a13ce8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 👇 КЛЮЧЕВОЙ МОМЕНТ - принудительный выбор аккаунта
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                // Заставляем Google показывать выбор аккаунта
                provider.setCustomParameters({
                    prompt: 'select_account'
                });
                
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                await setDoc(doc(db, "users", user.uid), {
                    username: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    createdAt: new Date().toISOString()
                }, { merge: true });

                alert('✅ Вход выполнен как: ' + user.email);
            } catch (error) {
                if (error.code === 'auth/popup-closed-by-user') {
                    alert('❌ Ты закрыл окно, блядь!');
                } else if (error.code === 'auth/cancelled-popup-request') {
                    alert('❌ Слишком быстро кликаешь, ебать! Подожди секунду.');
                } else {
                    alert('❌ Ошибка: ' + error.message);
                }
            }
        });

        // Следим за пользователем
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('status').innerHTML = `
                    ✅ Ты зашел как: ${user.displayName || user.email}
                    <br>
                    <img src="${user.photoURL || ''}" width="50" style="border-radius: 50%;">
                    <br>
                    <small style="color: #888;">${user.email}</small>
                `;
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('userPanel').style.display = 'block';
            } else {
                document.getElementById('status').innerHTML = '❌ Ты не авторизован, зайди, блядь!';
                document.getElementById('authPanel').style.display = 'block';
                document.getElementById('userPanel').style.display = 'none';
            }
        });

        // Выход
        document.getElementById('logoutBtn').addEventListener('click', () => {
            auth.signOut();
            alert('Вышел, нахуй!');
        });
    </script>
</head>
<body>
    <h1>🚀 Моя Экосистема</h1>
    <div id="status">Загрузка...</div>

    <!-- Панель входа -->
    <div id="authPanel">
        <h2>🔑 Вход через Google</h2>
        <button id="googleBtn" style="background: #4285F4; padding: 15px 40px; font-size: 18px; border: none; border-radius: 8px; color: white; cursor: pointer;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" style="vertical-align: middle; margin-right: 10px;">
            Войти через Google
        </button>
        <p style="color: #888; font-size: 12px; margin-top: 10px;">Теперь будет выбор аккаунта, бро!</p>
    </div>

    <!-- Панель пользователя -->
    <div id="userPanel" style="display: none;">
        <h2>🎮 Добро пожаловать!</h2>
        <p>Ты в своей экосистеме. Здесь будут твои сайты.</p>
        <button id="logoutBtn" style="background: #da3633; padding: 10px 20px; border: none; border-radius: 8px; color: white; cursor: pointer;">Выйти</button>
    </div>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            margin: 0;
        }
        #authPanel, #userPanel {
            background: #161b22;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            min-width: 350px;
            margin-top: 20px;
        }
        #status {
            padding: 15px;
            background: #161b22;
            border-radius: 8px;
            margin: 20px 0;
            min-width: 350px;
            text-align: center;
        }
        button {
            transition: 0.2s;
            font-size: 16px;
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</body>
</html>
