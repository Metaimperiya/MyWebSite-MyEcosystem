<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METAIMPERIYA - Социальная сеть</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
        }
        
        .header {
            background: transparent;
            padding: 8px 0 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .header .left h2 {
            font-size: 18px;
            color: #1877f2;
        }
        
        .header .right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header .notif-btn {
            position: relative;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header .notif-btn:hover {
            background: rgba(0,0,0,0.05);
        }
        
        .header .notif-btn .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #e74c3c;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }
        
        .header .avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1877f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: white;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #1877f2;
            flex-shrink: 0;
        }
        
        .header .avatar-small:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 12px rgba(24, 119, 242, 0.3);
        }
        
        .header .avatar-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: white;
            border-radius: 16px;
            padding: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .tab:hover { background: #f5f7fa; }
        .tab.active {
            background: #1877f2;
            color: white;
        }
        
        .profile-card {
            background: white;
            border-radius: 20px;
            padding: 40px 20px 30px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #1877f2;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: white;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border: 3px solid #1877f2;
        }
        
        .profile-avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(24, 119, 242, 0.3);
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-avatar .avatar-hint {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 12px;
            padding: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .profile-avatar:hover .avatar-hint {
            opacity: 1;
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        
        .profile-email {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .profile-bio {
            font-size: 15px;
            color: #555;
            line-height: 1.5;
            max-width: 80%;
            margin: 0 auto;
        }
        
        .stat-tabs {
            display: flex;
            gap: 8px;
            margin: 16px 0 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .stat-tab {
            padding: 6px 14px;
            border: none;
            background: #e8ecf1;
            color: #555;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .stat-tab:hover {
            background: #d5d9df;
        }
        
        .stat-tab.active {
            background: #1877f2;
            color: white;
        }
        
        .stat-tab .count {
            background: rgba(0,0,0,0.05);
            padding: 0 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 4px;
        }
        
        .stat-tab.active .count {
            background: rgba(255,255,255,0.2);
        }
        
        .stat-container {
            padding: 8px 0;
            min-height: 60px;
        }
        
        .stat-empty {
            color: #888;
            font-size: 14px;
            padding: 20px 0;
            text-align: center;
        }
        
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 8px 0;
            min-width: 200px;
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 1000;
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .context-menu.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        
        .context-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
        }
        
        .context-menu .menu-item:hover {
            background: #f5f7fa;
        }
        
        .context-menu .menu-item .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .context-menu .menu-item.danger {
            color: #e74c3c;
        }
        
        .context-menu .menu-item.danger:hover {
            background: #fef0ef;
        }
        
        .context-menu .menu-divider {
            height: 1px;
            background: #eee;
            margin: 4px 16px;
        }
        
        .context-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 999;
            display: none;
        }
        
        .context-overlay.active {
            display: block;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        
        .card h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 8px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
            border-radius: 8px;
        }
        
        .user-item:hover {
            background: #f5f7fa;
        }
        
        .user-item:last-child {
            border-bottom: none;
        }
        
        .user-item .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1877f2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
        }
        
        .user-item .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .user-item .info {
            flex: 1;
            cursor: pointer;
            min-width: 0;
        }
        
        .user-item .info .name {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-item .info .email {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-item .actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        
        .btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .btn:hover { background: #4a9eff; }
        .btn:active { transform: scale(0.96); }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #219a52; }
        .btn-secondary { background: #e8ecf1; color: #333; }
        .btn-secondary:hover { background: #d5d9df; }
        
        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 8px;
            min-width: 32px;
        }
        
        .btn-small:disabled {
            opacity: 0.6;
            cursor: default;
        }
        
        .btn-small:hover:not(:disabled) {
            transform: scale(1.05);
        }
        
        .room-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .room-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .room-card:hover {
            background: #f0f2f5;
            transform: translateY(-2px);
        }
        
        .room-card .icon { font-size: 28px; }
        .room-card .name { font-weight: 600; margin: 4px 0; font-size: 14px; }
        .room-card .count { font-size: 13px; color: #888; }
        
        .hidden { display: none; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal.open { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            animation: modalSlide 0.2s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        @keyframes modalSlide {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-content h3 {
            font-size: 18px;
            margin-bottom: 12px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin: 6px 0;
            font-size: 15px;
            font-family: inherit;
        }
        
        .modal-content input:focus {
            outline: none;
            border-color: #1877f2;
        }
        
        .modal-content .btns {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        
        .modal-content .btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s;
        }
        
        .modal-content .btns .cancel {
            background: #e8ecf1;
            color: #333;
        }
        
        .modal-content .btns .cancel:hover { background: #d5d9df; }
        .modal-content .btns .save {
            background: #1877f2;
            color: white;
        }
        .modal-content .btns .save:hover { background: #4a9eff; }
        
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .google-btn:hover { background: #f5f5f5; }
        .google-btn img { width: 20px; }
        
        .profile-selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 12px 0;
        }
        
        .profile-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .profile-option:hover {
            border-color: #1877f2;
            background: #f5f9ff;
        }
        
        .profile-option .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1877f2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .profile-option .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-option .info .name { font-weight: 600; font-size: 14px; }
        .profile-option .info .email { font-size: 12px; color: #888; }
        
        .profile-option .remove-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
        }
        
        .profile-option .remove-btn:hover { color: #e74c3c; }
        
        .chat-view {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            height: 70vh;
            flex-direction: column;
            margin-bottom: 20px;
        }
        
        .chat-view.active { display: flex; }
        
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
            margin-bottom: 12px;
        }
        
        .chat-header .title {
            font-weight: 600;
            font-size: 16px;
        }
        
        .chat-header .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            padding: 4px 8px;
        }
        
        .chat-header .close-btn:hover { color: #333; }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        
        .chat-messages .msg {
            padding: 8px 12px;
            margin-bottom: 6px;
            background: #f5f7fa;
            border-radius: 12px;
            font-size: 14px;
        }
        
        .chat-messages .msg .author {
            font-weight: 600;
            font-size: 13px;
            color: #1877f2;
        }
        
        .chat-messages .msg .time {
            color: #999;
            font-size: 11px;
            margin-left: 6px;
        }
        
        .chat-input-wrap {
            display: flex;
            gap: 8px;
        }
        
        .chat-input-wrap input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
            font-family: inherit;
        }
        
        .chat-input-wrap input:focus {
            border-color: #1877f2;
        }
        
        .chat-input-wrap button {
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .chat-input-wrap button:hover { background: #4a9eff; }
        .chat-input-wrap button:active { transform: scale(0.95); }
        
        .notif-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: background 0.15s;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .notif-item:hover {
            background: #f5f7fa;
        }
        
        .notif-item.unread {
            background: #f0f7ff;
        }
        
        .notif-item .notif-icon {
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .notif-item .notif-text {
            flex: 1;
            font-size: 14px;
        }
        
        .notif-item .notif-text .name {
            font-weight: 600;
        }
        
        .notif-item .notif-time {
            color: #888;
            font-size: 11px;
        }
        
        .notif-item .notif-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1877f2;
            flex-shrink: 0;
        }
        
        @media (max-width: 480px) {
            .profile-card { padding: 30px 16px 20px; }
            .profile-avatar { width: 100px; height: 100px; font-size: 40px; }
            .profile-name { font-size: 20px; }
            .room-grid { grid-template-columns: 1fr; }
            .modal-content { padding: 16px; }
            .header .left h2 { font-size: 15px; }
            .stat-tabs { gap: 4px; }
            .stat-tab { font-size: 12px; padding: 4px 10px; }
            .user-item { padding: 8px 4px; }
            .user-item .info .name { font-size: 13px; }
            .btn-small { font-size: 11px; padding: 3px 8px; }
        }
    </style>
</head>
<body>

<!-- ===== ХЕДЕР ===== -->
<div class="header">
    <div class="left">
        <h2>🏠 METAIMPERIYA</h2>
    </div>
    <div class="right">
        <button class="notif-btn" onclick="openNotifications()" id="notifBtn">
            🔔
            <span class="badge" id="notifBadge" style="display:none;">0</span>
        </button>
        <div class="avatar-small" id="headerAvatar" onclick="goToProfile()">
            <span>?</span>
        </div>
    </div>
</div>

<!-- ===== ВКЛАДКИ ===== -->
<div class="tab-bar">
    <button class="tab active" onclick="showTab('groups')">👥 Группы</button>
    <button class="tab" onclick="showTab('people')">👤 Люди</button>
</div>

<!-- ===== ГРУППЫ ===== -->
<div id="groupsTab">
    <div class="card">
        <h3>👥 Группы</h3>
        <div id="roomsList" class="room-grid"></div>
    </div>
</div>

<!-- ===== ЛЮДИ ===== -->
<div id="peopleTab" class="hidden">
    <div class="card">
        <h3>👤 Все пользователи</h3>
        <div id="peopleList"></div>
    </div>
</div>

<!-- ===== ПРОФИЛЬ ===== -->
<div id="profileTab" class="hidden">
    <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">
            <span id="avatarLetter">?</span>
            <span class="avatar-hint">👆 Нажми для меню</span>
        </div>
        
        <div class="profile-name" id="profileName">Имя</div>
        <div class="profile-email" id="profileEmail">email@example.com</div>
        <div class="profile-bio" id="profileBio">Привет! 👋</div>
        
        <div class="stat-tabs">
            <button class="stat-tab active" onclick="switchFriendTab('friends')">
                🤝 Друзья <span class="count" id="friendsCount">0</span>
            </button>
            <button class="stat-tab" onclick="switchFriendTab('following')">
                📌 Подписки <span class="count" id="subscriptionsCount">0</span>
            </button>
            <button class="stat-tab" onclick="switchFriendTab('followers')">
                👀 Подписчики <span class="count" id="followersCount">0</span>
            </button>
        </div>
        
        <div id="friendsListContainer" class="stat-container">
            <div class="stat-empty">Загрузка...</div>
        </div>
    </div>
</div>

<!-- ===== ЧАТ ===== -->
<div class="chat-view" id="chatView">
    <div class="chat-header">
        <span class="title" id="chatTitle">💬 Чат</span>
        <button class="close-btn" onclick="closeChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
        <input type="text" id="chatInput" placeholder="Сообщение...">
        <button onclick="sendChat()">→</button>
    </div>
</div>

<!-- ===== КОНТЕКСТНОЕ МЕНЮ ===== -->
<div class="context-menu" id="contextMenu">
    <button class="menu-item" onclick="editProfile();closeContextMenu();">
        <span class="icon">✏️</span> Редактировать профиль
    </button>
    <button class="menu-item" onclick="uploadAvatar();closeContextMenu();">
        <span class="icon">📷</span> Сменить аватар
    </button>
    <div class="menu-divider"></div>
    <button class="menu-item danger" onclick="logout();closeContextMenu();">

// ================================================================

// ================================================================
const activeRequests = new Map();

function cancelRequest(key) {
    if (activeRequests.has(key)) {
        const cancelFn = activeRequests.get(key);
        if (typeof cancelFn === 'function') {
            cancelFn();
        }
        activeRequests.delete(key);
        return true;
    }
    return false;
}

function safeFirebaseQuery(key, ref, callback) {
    cancelRequest(key);
    
    let isCancelled = false;
    const cancelFn = () => {
        isCancelled = true;
        activeRequests.delete(key);
    };
    
    activeRequests.set(key, cancelFn);
    
    ref.once('value', snap => {
        if (isCancelled) {
            console.log(`🔄 Запрос "${key}" отменен`);
            return;
        }
        activeRequests.delete(key);
        callback(snap);
    }).catch(err => {
        if (!isCancelled) {
            activeRequests.delete(key);
            console.warn(`❌ Ошибка запроса "${key}":`, err);
        }
    });
    
    return cancelFn;
}

function cancelAllRequests() {
    console.log(`🧹 Отменяем ${activeRequests.size} активных запросов`);
    for (const [key, cancelFn] of activeRequests) {
        if (typeof cancelFn === 'function') {
            cancelFn();
        }
    }
    activeRequests.clear();
}

window.addEventListener('beforeunload', function() {

// ================================================================

function openProfileMenu(event) {
    if (menuState.isAnimating) return;
    
    event.stopPropagation();
    event.preventDefault();
    
    const menu = document.getElementById('contextMenu');
    const overlay = document.getElementById('contextOverlay');
    const avatar = document.getElementById('profileAvatar');
    
    if (!menu || !avatar) return;
    
    if (menu.classList.contains('open')) {
        closeContextMenu();
        return;
    }

    const rect = avatar.getBoundingClientRect();
    const menuWidth = 200;
    const leftPos = Math.max(10, rect.left + rect.width / 2 - menuWidth / 2);
    const topPos = Math.min(
        rect.bottom + 10,
        window.innerHeight - 250
    );
    
    menu.style.left = leftPos + 'px';
    menu.style.top = topPos + 'px';
    
    menuState.isAnimating = true;
    menu.classList.add('open');
    overlay.classList.add('active');
    
    setTimeout(() => {
        menuState.isAnimating = false;
        menuState.isOpen = true;
    }, 200);
}

function closeContextMenu() {
    if (menuState.isAnimating) return;
    
    const menu = document.getElementById('contextMenu');
    const overlay = document.getElementById('contextOverlay');
    
    menuState.isAnimating = true;
    if (menu) menu.classList.remove('open');
    if (overlay) overlay.classList.remove('active');
    
    setTimeout(() => {
        menuState.isAnimating = false;
        menuState.isOpen = false;
    }, 200);
}

document.addEventListener('click', function(e) {
    const menu = document.getElementById('contextMenu');
    const avatar = document.getElementById('profileAvatar');
    const overlay = document.getElementById('contextOverlay');
    
    if (!menu || !menu.classList.contains('open')) return;
    
    const isClickInsideMenu = menu.contains(e.target);
    const isClickOnAvatar = avatar && (e.target === avatar || avatar.contains(e.target));
    const isClickOnOverlay = overlay && (e.target === overlay || overlay.contains(e.target));
    
    if (!isClickInsideMenu && !isClickOnAvatar) {
        closeContextMenu();
    }
});

document.addEventListener('DOMContentLoaded', function() {
    const profileAvatar = document.getElementById('profileAvatar');
    if (profileAvatar) {

function loadSavedProfiles() {
    try {
        const saved = localStorage.getItem('dc_profiles_' + SITE);
        SAVED_PROFILES = saved ? JSON.parse(saved) : [];
    } catch(e) {
        SAVED_PROFILES = [];
    }
    renderSavedProfiles();
}

function saveProfileToList(uid, name, email, avatarUrl) {
    const existing = SAVED_PROFILES.find(p => p.uid === uid);
    if (!existing) {
        SAVED_PROFILES.push({
            uid: uid,
            name: name,
            email: email || 'anon',
            avatarUrl: avatarUrl || null,
            lastUsed: Date.now()
        });
    } else {
        existing.name = name;
        existing.email = email || 'anon';
        existing.avatarUrl = avatarUrl || null;
        existing.lastUsed = Date.now();
    }
    localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
    renderSavedProfiles();
}

function renderSavedProfiles() {
    const container = document.getElementById('profileSelector');
    if (!container) return;
    
    if (SAVED_PROFILES.length === 0) {
        container.innerHTML = '<div style="color:#bbb;text-align:center;padding:10px;font-size:14px;">Нет сохраненных профилей</div>';
        return;
    }
    
    const sorted = [...SAVED_PROFILES].sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
    
    container.innerHTML = sorted.map(p => {
        const letter = (p.name || '?').charAt(0).toUpperCase();
        const avatarHtml = p.avatarUrl ? 
            `<img src="${p.avatarUrl}">` :
            `<span>${letter}</span>`;
        
        return `
            <div class="profile-option" onclick="loginWithSavedProfile('${p.uid}')">
                <div class="avatar">${avatarHtml}</div>
                <div class="info">
                    <div class="name">${p.name || 'Аноним'}</div>
                    <div class="email">${p.email || ''}</div>
                </div>
                <button class="remove-btn" onclick="event.stopPropagation();removeSavedProfile('${p.uid}')">✕</button>
            </div>
        `;
    }).join('');
}

window.removeSavedProfile = function(uid) {
    if (!confirm('Удалить сохраненный профиль?')) return;

                    `<img src="${u.avatarUrl}">` : 
                    `<span>${letter}</span>`;

    );

function loadRooms() {
    if (!USER_UID) return;
    const el = document.getElementById('roomsList');
    if (!el) return;
    
    safeFirebaseQuery(
        'loadRooms',
        db.ref('sites/' + SITE + '/rooms'),
        (snap) => {
            const rooms = snap.val() || {};
            
            if (Object.keys(rooms).length === 0) {
                createDefaultRooms();
                return;
            }
            
            let html = '';
            Object.keys(rooms).forEach(roomId => {
                const room = rooms[roomId];
                
                safeFirebaseQuery(
                    'roomUsers_' + roomId,
                    db.ref('sites/' + SITE + '/room_users/' + roomId),
                    (snap) => {
                        const users = snap.val() || {};
                        const count = Object.keys(users).length;
                        const countEl = document.querySelector(`#room-${roomId} .count`);
                        if (countEl) countEl.textContent = count;
                    }
                );
                
                html += `
                    <div class="room-card" id="room-${roomId}" onclick="joinRoom('${roomId}')">
                        <div class="icon">${room.icon || '👥'}</div>
                        <div class="name">${room.name}</div>
                        <div class="count">👥 <span class="count">0</span></div>
                    </div>
                `;
            });
            el.innerHTML = html;
        }
    );
}

    for (let i = 1; i <= 10; i++) {

            name: 'Группа ' + i,
            icon: '👥',
            createdBy: 'system',
            createdAt: Date.now()

    }
}

    });
    alert('✅ Вы вошли в группу!');
    loadRooms();
};

function toggleFriendStatus(targetUid) {
    if (!USER_UID) { 
        console.warn('❌ Не авторизован');
        return; 
    }
    
    if (targetUid === USER_UID) { 
        console.warn('❌ Нельзя добавить себя');
        return; 
    }
    
    db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid).once('value', snap => {
        const status = snap.val();
        
        if (status === 'friend') {
            const updates = {};
            updates['sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid] = null;
            updates['sites/' + SITE + '/friends/' + targetUid + '/' + USER_UID] = null;
            updates['sites/' + SITE + '/followers/' + targetUid + '/' + USER_UID] = null;
            
            db.ref().update(updates);
            updateFriendButton(targetUid, 'none');
            updateCounters();
            
        } else if (status === 'pending') {
            const updates = {};
            updates['sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid] = null;
            updates['sites/' + SITE + '/friends/' + targetUid + '/' + USER_UID] = null;
            updates['sites/' + SITE + '/followers/' + targetUid + '/' + USER_UID] = null;
            
            db.ref().update(updates);
            updateFriendButton(targetUid, 'none');
            updateCounters();
            
        } else {
            const updates = {};
            updates['sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid] = 'pending';
            updates['sites/' + SITE + '/friends/' + targetUid + '/' + USER_UID] = 'pending';
            updates['sites/' + SITE + '/followers/' + targetUid + '/' + USER_UID] = true;
            
            db.ref().update(updates);
            
            sendNotification(targetUid, {
                type: 'friend_request',
                from: USER_UID,
                text: `${USER} отправил(а) запрос в друзья`,
                timestamp: Date.now()
            });
            
            updateFriendButton(targetUid, 'pending');
            updateCounters();
        }
    });
}

function updateFriendButton(targetUid, status) {
    const actions = document.getElementById('viewActions');
    if (!actions) return;
    
    let btn = actions.querySelector('.friend-toggle-btn');
    
    if (!btn) {
        btn = document.createElement('button');
        btn.className = 'btn friend-toggle-btn';
        btn.onclick = () => toggleFriendStatus(targetUid);
        actions.appendChild(btn);
    }
    
    if (status === 'friend') {
        btn.textContent = '❌ В друзьях';
        btn.className = 'btn btn-danger friend-toggle-btn';
    } else if (status === 'pending') {
        btn.textContent = '⏳ Запрос отправлен';
        btn.className = 'btn btn-secondary friend-toggle-btn';
    } else {
        btn.textContent = '➕ Добавить в друзья';
        btn.className = 'btn friend-toggle-btn';
    }
}

// ПОЛУЧЕНИЕ СТАТУСА ДЛЯ КНОПКИ

function getFriendStatus(targetUid, callback) {
    if (!USER_UID) { callback('none'); return; }
    
    db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid).once('value', snap => {
        const status = snap.val();
        callback(status || 'none');
    });
}

// ================================================================
// СЛУШАТЕЛЬ ДЛЯ ОБНОВЛЕНИЯ КНОПКИ В РЕАЛЬНОМ ВРЕМЕНИ
// ================================================================

function listenFriendStatus(targetUid) {
    if (!USER_UID || !targetUid) return;
    
    if (friendListener) {
        friendListener();
        friendListener = null;
    }
    
    const ref = db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid);
    const onValue = snap => {
        const status = snap.val();
        updateFriendButton(targetUid, status || 'none');
    };
    
    ref.on('value', onValue);
    
    friendListener = () => {
        ref.off('value', onValue);
        friendListener = null;
    };
    
    return friendListener;
}

function sendNotification(targetUid, data) {
    if (!USER_UID) return;
    if (!targetUid || targetUid === USER_UID) {
        console.warn('❌ Нельзя отправить уведомление себе');
        return;
    }
    
    const notifRef = db.ref('sites/' + SITE + '/notifications/' + targetUid).push();
    notifRef.set({
        ...data,
        read: false,
        fromName: USER,
        fromUid: USER_UID
    }).then(() => {
        console.log(`✅ Уведомление отправлено пользователю ${targetUid}`);
    }).catch(err => {
        console.error('❌ Ошибка отправки уведомления:', err);
    });
}

function loadNotifications() {
    if (!USER_UID) return;
    
    if (notifUnsub) { notifUnsub(); notifUnsub = null; }
    
    const ref = db.ref('sites/' + SITE + '/notifications/' + USER_UID).orderByChild('timestamp').limitToLast(20);
    notifUnsub = ref.on('value', snap => {
        const notifications = snap.val() || {};
        const keys = Object.keys(notifications).sort((a, b) => 
            (notifications[b].timestamp || 0) - (notifications[a].timestamp || 0)
        );
        
        const unread = keys.filter(k => !notifications[k].read);
        const badge = document.getElementById('notifBadge');
        if (badge) {
            if (unread.length > 0) {
                badge.style.display = 'inline';
                badge.textContent = unread.length;
            } else {
                badge.style.display = 'none';
            }
        }
        
        if (document.getElementById('notificationsModal').classList.contains('open')) {
            renderNotifications(notifications, keys);
        }
    });
}

function renderNotifications(notifications, keys) {
    const container = document.getElementById('notificationsList');
    if (!container) return;
    
    if (keys.length === 0) {
        container.innerHTML = '<div style="color:#888;text-align:center;padding:20px;">Нет уведомлений</div>';
        return;
    }
    
    let html = '';
    keys.slice(0, 20).forEach(k => {
        const n = notifications[k];
        const isUnread = !n.read;
        const time = n.timestamp ? new Date(n.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        
        let icon = '📩';
        if (n.type === 'friend_request') icon = '🤝';
        if (n.type === 'friend_accepted') icon = '✅';
        if (n.type === 'message') icon = '💬';
        
        html += `
            <div class="notif-item ${isUnread ? 'unread' : ''}" 
                 onclick="handleNotifClick('${k}', '${n.fromUid || n.from}', '${n.type}')"
                 data-type="${n.type}"
                 data-from="${n.fromUid || n.from}"
                 data-id="${k}">
                <span class="notif-icon">${icon}</span>
                <div class="notif-text">
                    <div style="font-weight:${isUnread ? '600' : '400'};font-size:14px;">${n.text || 'Уведомление'}</div>
                    <div class="notif-time">${time}</div>
                </div>
                ${isUnread ? '<span class="notif-dot"></span>' : ''}
            </div>
        `;
    });
    container.innerHTML = html;
}

function handleNotifClick(notifId, fromUid, type) {
    if (!USER_UID) return;
    if (!fromUid) return;
    
    db.ref('sites/' + SITE + '/notifications/' + USER_UID + '/' + notifId + '/read').set(true);
    
    if (type === 'message') {
        closeNotifications();
        openPrivateChat(fromUid);
        db.ref('sites/' + SITE + '/notifications/' + USER_UID + '/' + notifId).remove();
    } else if (type === 'friend_request') {
        closeNotifications();
        viewProfile(fromUid);
    } else {
        closeNotifications();
        viewProfile(fromUid);
    }
}

function openNotifications() {
    document.getElementById('notificationsModal').classList.add('open');
    const ref = db.ref('sites/' + SITE + '/notifications/' + USER_UID).orderByChild('timestamp').limitToLast(20);
    ref.once('value', snap => {
        const notifications = snap.val() || {};
        const keys = Object.keys(notifications).sort((a, b) => 
            (notifications[b].timestamp || 0) - (notifications[a].timestamp || 0)
        );
        renderNotifications(notifications, keys);
    });
}

function closeNotifications() {
    document.getElementById('notificationsModal').classList.remove('open');
}

function openPrivateChat(targetUid) {
    if (!USER_UID) { alert('Войдите!'); return; }
    if (targetUid === USER_UID) { alert('Нельзя писать себе'); return; }
    
    const chatId = [USER_UID, targetUid].sort().join('_');
    const path = 'dms/' + SITE + '/' + chatId + '/messages';
    
    closeProfileView();
    closeNotifications();
    
    CURRENT_ROOM = chatId;
    document.getElementById('chatView').classList.add('active');
    
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    
    loadChat(path);
    closeSidebar();
    
    db.ref('sites/' + SITE + '/all_users/' + targetUid).once('value', snap => {
        const user = snap.val() || {};
        const name = user.name || 'Собеседник';
        document.getElementById('chatTitle').textContent = '💬 ' + name;
    });
    
    if (targetUid) {
        db.ref('sites/' + SITE + '/notifications/' + USER_UID)
            .orderByChild('fromUid')
            .equalTo(targetUid)
            .once('value', snap => {
                const notifs = snap.val() || {};
                const updates = {};
                Object.keys(notifs).forEach(key => {
                    updates[key] = null;
                });
                if (Object.keys(updates).length > 0) {
                    db.ref('sites/' + SITE + '/notifications/' + USER_UID).update(updates);
                    console.log(`🧹 Удалены уведомления от ${targetUid}`);
                }
            });
    }
}

function loadChat(path) {
    if (chatUnsub) { 
        if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value');
        chatUnsub = null; 
    }
    const box = document.getElementById('chatMessages');
    box.innerHTML = '<div style="color:#bbb;text-align:center;padding:20px;">⏳ Загрузка...</div>';
    chatUnsub = path;
    db.ref(path).orderByChild('timestamp').on('value', snap => {
        box.innerHTML = '';
        if (!snap.exists()) { 
            box.innerHTML = '<div style="color:#bbb;text-align:center;padding:20px;">Сообщений нет</div>'; 
            return; 
        }
        snap.forEach(s => {
            const m = s.val();
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="author">${esc(m.nick||'?')}</span><span class="time">${m.time||''}</span><div>${esc(m.text||'')}</div>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

window.sendChat = function() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !CURRENT_ROOM) return;
    
    const path = 'dms/' + SITE + '/' + CURRENT_ROOM + '/messages';
    const parts = CURRENT_ROOM.split('_');
    const targetUid = parts[0] === USER_UID ? parts[1] : parts[0];
    
    db.ref(path).push({
        nick: USER,
        text: text,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        timestamp: Date.now()
    });
    
    sendNotification(targetUid, {
        type: 'message',
        from: USER_UID,
        text: `${USER}: ${text}`,
        timestamp: Date.now()
    });
    
    input.value = '';
};

document.getElementById('chatInput').addEventListener('keypress', e => { 
    if (e.key === 'Enter') sendChat(); 
});

window.closeChat = function() {
    document.getElementById('chatView').classList.remove('active');
    if (chatUnsub) { 
        if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value');
        chatUnsub = null; 
    }
    CURRENT_ROOM = null;
    showTab(currentTab);
};

function renderFriendsList(type) {
    const container = document.getElementById('friendsListContainer');
    if (!container) return;
    
    container.innerHTML = '';
    
    if (!USER_UID) {
        container.innerHTML = '<div class="stat-empty">Войдите, чтобы увидеть список</div>';
        return;
    }
    
    let queryRef;
    
    if (type === 'friends') {
        queryRef = db.ref('sites/' + SITE + '/friends/' + USER_UID);
    } else if (type === 'followers') {
        queryRef = db.ref('sites/' + SITE + '/followers/' + USER_UID);
    } else if (type === 'following') {
        queryRef = db.ref('sites/' + SITE + '/followers');
    } else {
        container.innerHTML = '<div class="stat-empty">Неизвестный тип списка</div>';
        return;
    }
    
    container.innerHTML = '<div class="stat-empty">⏳ Загрузка...</div>';
    
    if (type === 'following') {
        queryRef.once('value', snap => {
            const allFollowers = snap.val() || {};
            const followingList = [];
            
            for (const [targetUid, followers] of Object.entries(allFollowers)) {
                if (followers && followers[USER_UID] === true) {
                    followingList.push(targetUid);
                }
            }
            
            if (followingList.length === 0) {
                container.innerHTML = '<div class="stat-empty">Вы ни на кого не подписаны</div>';
                return;
            }
            
            renderUserList(container, followingList, 'following');
        });
    } else {
        queryRef.once('value', snap => {
            const data = snap.val() || {};
            let uids = Object.keys(data);
            
            if (type === 'friends') {
                uids = uids.filter(uid => data[uid] === 'friend');
            }
            
            if (uids.length === 0) {
                const emptyText = type === 'friends' ? 'Нет друзей' : 
                                 type === 'followers' ? 'Нет подписчиков' : 'Список пуст';
                container.innerHTML = `<div class="stat-empty">${emptyText}</div>`;
                return;
            }
            
            renderUserList(container, uids, type);
        });
    }
}

function renderUserList(container, uids, type) {
    if (!uids || uids.length === 0) {
        container.innerHTML = '<div class="stat-empty">Список пуст</div>';
        return;
    }
    
    let loaded = 0;
    container.innerHTML = '';
    
    uids.forEach(uid => {
        db.ref('sites/' + SITE + '/all_users/' + uid).once('value', snap => {
            const user = snap.val() || {};
            const name = user.name || 'Аноним';
            const email = user.email || '';
            const letter = name.charAt(0).toUpperCase();
            const avatarHtml = user.avatarUrl ? 
                `<img src="${user.avatarUrl}">` : 
                `<span>${letter}</span>`;
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'user-item';
            
            let actionsHtml = '';
            
            if (type === 'friends') {
                actionsHtml = `
                    <button class="btn btn-small" onclick="openPrivateChat('${uid}')" title="Сообщение">✉️</button>
                    <button class="btn btn-danger btn-small" onclick="removeFriend('${uid}')" title="Удалить">❌</button>
                `;
            } else if (type === 'following') {
                actionsHtml = `
                    <button class="btn btn-danger btn-small" onclick="unfollow('${uid}')">📴 Отписаться</button>
                `;
            } else if (type === 'followers') {
                db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + uid).once('value', snap => {
                    const status = snap.val();
                    const actionBtn = itemDiv.querySelector('.follower-action');
                    if (actionBtn) {
                        if (status === 'friend') {
                            actionBtn.innerHTML = '✅ В друзьях';
                            actionBtn.className = 'btn btn-small btn-secondary';
                            actionBtn.disabled = true;
                        } else if (status === 'pending') {
                            db.ref('sites/' + SITE + '/friends/' + uid + '/' + USER_UID).once('value', snap2 => {
                                if (snap2.val() === 'pending') {
                                    actionBtn.innerHTML = '⏳ Запрос отправлен';
                                    actionBtn.className = 'btn btn-small btn-secondary';
                                    actionBtn.disabled = true;
                                } else {
                                    actionBtn.innerHTML = '✅ Принять';
                                    actionBtn.className = 'btn btn-small btn-success';
                                    actionBtn.onclick = () => {
                                        handleFriendRequest(uid, 'accept');
                                    };
                                }
                            });
                        } else {
                            actionBtn.innerHTML = '➕ Добавить';
                            actionBtn.className = 'btn btn-small';
                            actionBtn.onclick = () => {
                                sendFriendRequest(uid);
                            };
                        }
                    }
                });
                actionsHtml = `
                    <button class="btn btn-small btn-secondary follower-action" disabled>⏳ Проверка...</button>
                `;
            }
            
            itemDiv.innerHTML = `
                <div class="avatar" onclick="viewProfile('${uid}')">${avatarHtml}</div>
                <div class="info" onclick="viewProfile('${uid}')">
                    <div class="name">${name}</div>
                    <div class="email">${email}</div>
                </div>
                <div class="actions">
                    ${actionsHtml}
                </div>
            `;
            
            container.appendChild(itemDiv);
            loaded++;
        });
    });
}

function updateCounters() {
    if (!USER_UID) return;
    
    db.ref('sites/' + SITE + '/friends/' + USER_UID).once('value', snap => {
        const data = snap.val() || {};
        const friends = Object.keys(data).filter(k => data[k] === 'friend');
        document.getElementById('friendsCount').textContent = friends.length;
    });
    
    db.ref('sites/' + SITE + '/followers/' + USER_UID).once('value', snap => {
        const data = snap.val() || {};
        document.getElementById('followersCount').textContent = Object.keys(data).length;
    });
    
    db.ref('sites/' + SITE + '/followers').once('value', snap => {
        const allFollowers = snap.val() || {};
        let count = 0;
        for (const [targetUid, followers] of Object.entries(allFollowers)) {
            if (followers && followers[USER_UID] === true) {
                count++;
            }
        }
        document.getElementById('subscriptionsCount').textContent = count;

}

window.uploadAvatar = function() {
    if (!USER_UID) { alert('Войдите!'); return; }
    closeContextMenu();
    
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { alert('Максимум 5 МБ'); return; }
        
        const ref = storage.ref('avatars/' + USER_UID + '/' + Date.now() + '_' + file.name);
        ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
            db.ref('sites/' + SITE + '/users/' + USER_UID + '/avatarUrl').set(url);
            db.ref('sites/' + SITE + '/all_users/' + USER_UID + '/avatarUrl').set(url);
            
            const profile = SAVED_PROFILES.find(p => p.uid === USER_UID);
            if (profile) {
                profile.avatarUrl = url;
                localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
            }
            
            refreshAvatarCache();
            loadProfile();
            alert('✅ Аватарка обновлена!');
        });
    };
    input.click();
};

const esc = s => s ? String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])) : '';

function goToGroups() { showTab('groups'); }
function goToPeople() { showTab('people'); }

function sendFriendRequest(uid) {
    toggleFriendStatus(uid);
}

function handleFriendRequest(uid, action) {
    if (action === 'accept') {
        const updates = {};
        updates['sites/' + SITE + '/friends/' + USER_UID + '/' + uid] = 'friend';
        updates['sites/' + SITE + '/friends/' + uid + '/' + USER_UID] = 'friend';
        updates['sites/' + SITE + '/followers/' + uid + '/' + USER_UID] = true;
        
        db.ref().update(updates);
        
        sendNotification(uid, {
            type: 'friend_accepted',
            from: USER_UID,
            text: `${USER} принял(а) ваш запрос в друзья`,
            timestamp: Date.now()
        });
        
        alert('✅ Дружба подтверждена!');
        renderFriendsList('followers');
        loadProfile();
    }
}
