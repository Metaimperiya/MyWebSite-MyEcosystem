<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>METAIMPERIYA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial; background:#f0f2f5; }
        .topbar {
            background:#fff;
            padding:10px 16px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:1px solid #ddd;
            position:sticky;
            top:0;
            z-index:999;
        }
        .logo { font-weight:bold; font-size:18px; color:#1877f2; cursor:pointer; }
        .right { display:flex; align-items:center; gap:10px; }
        .avatar {
            width:32px; height:32px; border-radius:50%;
            background:#1877f2; color:#fff;
            display:flex; align-items:center; justify-content:center;
            font-weight:bold; font-size:16px;
        }
        .username { font-weight:600; font-size:14px; }
        .modal {
            display:none; position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.5); z-index:9999;
            justify-content:center; align-items:center;
        }
        .modal.open { display:flex; }
        .modal-box {
            background:#fff; padding:30px; border-radius:12px;
            width:300px; text-align:center;
        }
        .modal-box input {
            width:100%; padding:10px; margin:10px 0;
            border:1px solid #ddd; border-radius:6px;
            font-size:16px;
        }
        .modal-box button {
            width:100%; padding:10px; background:#1877f2;
            color:#fff; border:none; border-radius:6px;
            font-size:16px; cursor:pointer;
        }
        .modal-box button:hover { background:#1558b0; }
        .menu-btn { background:none; border:none; font-size:24px; cursor:pointer; }
        .menu-dots { background:none; border:none; font-size:20px; cursor:pointer; }
    </style>
</head>
<body>

<!-- ===== ШАПКА ===== -->
<div class="topbar" id="topbar">
    <div>
        <button class="menu-btn">☰</button>
        <span class="logo">METAIMPERIYA 🏴‍☠️</span>
    </div>
    <div class="right">
        <div class="avatar" id="avatar">?</div>
        <span class="username" id="username">Гость</span>
        <button class="menu-dots" onclick="logout()">⋮</button>
    </div>
</div>

<!-- ===== МОДАЛКА ВХОДА ===== -->
<div class="modal open" id="loginModal">
    <div class="modal-box">
        <h2>Вход</h2>
        <input type="text" id="nameInput" placeholder="Введите имя">
        <button onclick="login()">Войти</button>
    </div>
</div>

<script>
// ================================================================
// ГЛАВНАЯ ФУНКЦИЯ - ОБНОВЛЕНИЕ ШАПКИ
// ================================================================

function updateTopbar() {
    // Берем имя из localStorage
    var name = localStorage.getItem('myName');
    
    if (name) {
        document.getElementById('username').textContent = name;
        document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
    } else {
        document.getElementById('username').textContent = 'Гость';
        document.getElementById('avatar').textContent = '?';
    }
}

// ================================================================
// ВХОД - СОХРАНЯЕМ ИМЯ
// ================================================================

function login() {
    var input = document.getElementById('nameInput');
    var name = input.value.trim();
    
    if (!name) {
        alert('Введите имя!');
        return;
    }
    
    // Сохраняем в localStorage
    localStorage.setItem('myName', name);
    
    // Закрываем модалку
    document.getElementById('loginModal').classList.remove('open');
    
    // Обновляем шапку
    updateTopbar();
}

// ================================================================
// ВЫХОД
// ================================================================

function logout() {
    if (!confirm('Выйти?')) return;
    localStorage.removeItem('myName');
    updateTopbar();
    document.getElementById('loginModal').classList.add('open');
}

// ================================================================
// ЗАГРУЗКА СТРАНИЦЫ
// ================================================================

// Проверяем есть ли имя при загрузке
var savedName = localStorage.getItem('myName');

if (savedName) {
    // Имя есть - закрываем модалку и обновляем шапку
    document.getElementById('loginModal').classList.remove('open');
    updateTopbar();
} else {
    // Имени нет - показываем модалку
    document.getElementById('loginModal').classList.add('open');
}

// Обновляем шапку каждые 2 секунды (на случай если что-то сбросилось)
setInterval(updateTopbar, 2000);

console.log('✅ Всё работает! Имя:', localStorage.getItem('myName') || 'Гость');
</script>

</body>
</html>
