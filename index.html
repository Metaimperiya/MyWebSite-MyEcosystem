<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>METAIMPERIYA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial; background:#f0f2f5; }
        .topbar {
            background:#fff;
            padding:10px 16px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:1px solid #ddd;
            position:sticky;
            top:0;
            z-index:999;
        }
        .logo { font-weight:bold; font-size:18px; color:#1877f2; cursor:pointer; }
        .right { display:flex; align-items:center; gap:10px; }
        .avatar {
            width:32px; height:32px; border-radius:50%;
            background:#1877f2; color:#fff;
            display:flex; align-items:center; justify-content:center;
            font-weight:bold; font-size:16px;
        }
        .username { font-weight:600; font-size:14px; }
        .modal {
            display:none; position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.5); z-index:9999;
            justify-content:center; align-items:center;
        }
        .modal.open { display:flex; }
        .modal-box {
            background:#fff; padding:30px; border-radius:12px;
            width:300px; text-align:center;
        }
        .modal-box input {
            width:100%; padding:10px; margin:10px 0;
            border:1px solid #ddd; border-radius:6px;
            font-size:16px;
        }
        .modal-box button {
            width:100%; padding:10px; background:#1877f2;
            color:#fff; border:none; border-radius:6px;
            font-size:16px; cursor:pointer;
        }
        .menu-dots { background:none; border:none; font-size:20px; cursor:pointer; }
    </style>
</head>
<body>

<div class="topbar" id="topbar">
    <div>
        <span class="logo">METAIMPERIYA 🏴‍☠️</span>
    </div>
    <div class="right">
        <div class="avatar" id="avatar">?</div>
        <span class="username" id="username">Гость</span>
        <button class="menu-dots" onclick="logout()">⋮</button>
    </div>
</div>

<div class="modal open" id="loginModal">
    <div class="modal-box">
        <h2>Вход</h2>
        <input type="text" id="nameInput" placeholder="Введите имя">
        <button onclick="login()">Войти</button>
    </div>
</div>

<script>
// ================================================================
// FIREBASE КОНФИГ
// ================================================================
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const SITE = 'default';

// ================================================================
// ОБНОВЛЕНИЕ ШАПКИ
// ================================================================
function updateTopbar(name) {
    if (name) {
        document.getElementById('username').textContent = name;
        document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
        localStorage.setItem('dc_u_', name);
    } else {
        var saved = localStorage.getItem('dc_u_');
        if (saved) {
            document.getElementById('username').textContent = saved;
            document.getElementById('avatar').textContent = saved.charAt(0).toUpperCase();
        } else {
            document.getElementById('username').textContent = 'Гость';
            document.getElementById('avatar').textContent = '?';
        }
    }
}

// ================================================================
// ВХОД
// ================================================================
function login() {
    var input = document.getElementById('nameInput');
    var name = input.value.trim();
    if (!name) { alert('Введите имя'); return; }
    
    var uid = 'user_' + Date.now();
    
    // Сохраняем в Firebase
    db.ref('sites/' + SITE + '/users/' + uid).set({
        name: name,
        uid: uid,
        lastLogin: Date.now()
    });
    
    // Сохраняем локально
    localStorage.setItem('dc_u_', name);
    localStorage.setItem('dc_uid_', uid);
    
    document.getElementById('loginModal').classList.remove('open');
    updateTopbar(name);
}

// ================================================================
// ВЫХОД
// ================================================================
function logout() {
    if (!confirm('Выйти?')) return;
    localStorage.removeItem('dc_u_');
    localStorage.removeItem('dc_uid_');
    document.getElementById('username').textContent = 'Гость';
    document.getElementById('avatar').textContent = '?';
    document.getElementById('loginModal').classList.add('open');
}

// ================================================================
// ВОССТАНОВЛЕНИЕ ИЗ FIREBASE
// ================================================================
function restoreFromFirebase() {
    var savedUid = localStorage.getItem('dc_uid_');
    if (savedUid) {
        db.ref('sites/' + SITE + '/users/' + savedUid + '/name').once('value')
            .then(function(snap) {
                var name = snap.val();
                if (name) {
                    localStorage.setItem('dc_u_', name);
                    updateTopbar(name);
                    document.getElementById('loginModal').classList.remove('open');
                }
            });
    }
}

// ================================================================
// ЗАГРУЗКА
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
    var savedName = localStorage.getItem('dc_u_');
    if (savedName) {
        updateTopbar(savedName);
        document.getElementById('loginModal').classList.remove('open');
    } else {
        restoreFromFirebase();
    }
    
    setInterval(function() {
        var name = localStorage.getItem('dc_u_');
        if (name) {
            document.getElementById('username').textContent = name;
            document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
        }
    }, 2000);
});
</script>

</body>
</html>
