<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METAIMPERIYA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
            min-height: 100vh;
        }
        
        .admin-panel {
            display: none;
            background: #e8f0fe;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #1877f2;
            margin-bottom: 12px;
        }
        .admin-mode .admin-panel { display: block !important; }
        .admin-mode .admin-only { display: flex !important; }
        .admin-only { display: none !important; }
        .admin-delete-btn { display: none !important; }
        .admin-mode .admin-delete-btn { display: flex !important; }
        
        .header {
            background: #1877f2;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(24, 119, 242, 0.3);

        .header .left h2:hover { opacity: 0.8; }
        .header .right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .notif-btn {
            position: relative;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .header .notif-btn:hover { background: rgba(255,255,255,0.25); }
        .header .notif-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #e74c3c;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }
        .header .avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
        }
        .header .avatar-small:hover { border-color: white; transform: scale(1.05); }
        .header .avatar-small img { width: 100%; height: 100%; object-fit: cover; }
        
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: white;
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            color: #65676b;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .tab:hover { background: #f0f2f5; }
        .tab.active { background: #1877f2; color: white; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .card h3 {
            font-size: 17px;
            color: #050505;
            margin-bottom: 12px;
            font-weight: 600;
        }

            display: flex;
            align-items: center;
            padding: 8px 12px;
            height: 60px;
            border-bottom: 1px solid #e4e6eb;
            transition: background 0.15s;
            gap: 12px;
            cursor: pointer;
        }
        .user-item:hover { background: #f0f2f5; border-radius: 8px; }
        .user-item:last-child { border-bottom: none; }
        .user-item .avatar {
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 50%;
            background: #e4e6eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #65676b;
            overflow: hidden;
            flex-shrink: 0;
        }
        .user-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-item .info {
            flex: 1;
            min-width: 0;
        }
        .user-item .info .name {
            font-size: 15px;
            font-weight: 600;
            color: #050505;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-item .info .username {
            font-size: 12px;
            color: #65676b;
        }
        .user-item .actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .user-item .actions .btn-action { pointer-events: auto; }
        
        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 14px;
            height: 32px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            white-space: nowrap;
            background: #e4e6eb;
            color: #050505;
            pointer-events: auto;
        }
        .btn-action:hover { background: #d8dadf; }
        .btn-action:active { transform: scale(0.95); }
        .btn-message {
            background: #e4e6eb;
            color: #050505;
            min-width: 32px;
            padding: 6px 12px;
        }
        .btn-message:hover { background: #d8dadf; }
        .btn-message .icon { font-size: 15px; line-height: 1; }
        .btn-friend {
            min-width: 80px;
            padding: 6px 14px;
            background: #e4e6eb;
            color: #050505;
        }
        .btn-friend:hover { background: #d8dadf; }
        .btn-friend.add { background: #e4e6eb; color: #050505; }
        .btn-friend.add:hover { background: #d8dadf; }
        .btn-friend.pending {
            background: #e4e6eb;
            color: #050505;
            opacity: 0.7;
            cursor: pointer;
        }
        .btn-friend.pending:hover { background: #d8dadf; opacity: 0.9; }
        .btn-friend.friend {
            background: #e4e6eb;
            color: #050505;
        }
        .btn-friend.friend:hover { background: #d8dadf; }
        .btn-friend .icon { font-size: 14px; line-height: 1; margin-right: 4px; }
        
        .profile-page {
            background: white;
            border-radius: 12px;
            padding: 30px 20px 24px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 12px;
            position: relative;
        }
        .profile-page .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: #1877f2;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .profile-page .back-btn:hover { background: #f0f7ff; }
        
        .profile-more-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            color: #65676b;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
            line-height: 1;
        }
        .profile-more-btn:hover {
            background: #f0f2f5;
            color: #1877f2;
        }
        .profile-more-btn:active { transform: scale(0.9); }
        
        .profile-dropdown {
            position: absolute;
            top: 50px;
            right: 10px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            padding: 8px 0;
            min-width: 220px;
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 100;
            border: 1px solid #e4e6eb;
        }
        .profile-dropdown.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .profile-dropdown .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            color: #050505;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
        }
        .profile-dropdown .dropdown-item:hover { background: #f0f2f5; }
        .profile-dropdown .dropdown-item .icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
        .profile-dropdown .dropdown-item.danger { color: #e74c3c; }
        .profile-dropdown .dropdown-item.danger:hover { background: #fef0ef; }
        .profile-dropdown .dropdown-divider { height: 1px; background: #e4e6eb; margin: 4px 16px; }
        .profile-dropdown .toggle-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            color: #050505;
            cursor: default;
        }
        .profile-dropdown .toggle-wrap .toggle-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .profile-dropdown .toggle-wrap .toggle-label .icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
            background: #e4e6eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .toggle-switch.active { background: #1877f2; }
        .toggle-switch .toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: all 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .toggle-switch.active .toggle-slider { left: 20px; }
        
        .profile-dropdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 99;
            display: none;
        }
        .profile-dropdown-overlay.active { display: block; }
        
        .profile-page .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e4e6eb;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: #65676b;
            overflow: hidden;
            border: 3px solid #e4e6eb;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .profile-page .profile-avatar:hover {
            border-color: #1877f2;
            transform: scale(1.02);
        }
        .profile-page .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-page .profile-avatar .avatar-hint {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 10px;
            padding: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .profile-page .profile-avatar:hover .avatar-hint { opacity: 1; }
        
        .profile-page .profile-name {
            font-size: 22px;
            font-weight: 700;
            color: #050505;
        }
        .profile-page .profile-username {
            font-size: 14px;
            color: #65676b;
            margin-top: 2px;
        }
        .profile-page .profile-email {
            font-size: 14px;
            color: #65676b;
            margin-top: 4px;
        }
        .profile-page .profile-bio {
            font-size: 14px;
            color: #65676b;
            margin-top: 8px;
        }
        .profile-page .profile-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        
        .stat-toggles {
            display: flex;
            gap: 8px;
            margin: 16px 0 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .stat-toggle {
            padding: 6px 14px;
            border: none;
            background: #e4e6eb;
            color: #65676b;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
        }
        .stat-toggle:hover { background: #d8dadf; }
        .stat-toggle.active {
            background: #1877f2;
            color: white;
        }
        .stat-toggle .count {
            background: rgba(0,0,0,0.05);
            padding: 0 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 4px;
        }
        .stat-toggle.active .count { background: rgba(255,255,255,0.2); }
        
        .stat-container {
            padding: 8px 0;
            min-height: 60px;
            display: none;
        }
        .stat-container.open { display: block; }
        .stat-empty {
            color: #65676b;
            font-size: 14px;
            padding: 20px 0;
            text-align: center;
        }
        .stat-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0;
        }
        .stat-list .stat-item {
            background: #f0f2f5;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .stat-list .stat-item:hover { background: #e4e6eb; }
        .stat-list .stat-item .mini-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #1877f2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .stat-list .stat-item .mini-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .stat-private {
            color: #65676b;
            font-size: 14px;
            text-align: center;
            padding: 20px 0;
        }
        
        .chat-window {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            max-width: calc(100% - 40px);
            height: 500px;
            max-height: calc(100% - 100px);
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 9999;
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: chatSlideUp 0.25s ease;
        }
        .chat-window.active { display: flex; }
        @keyframes chatSlideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .chat-window .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #e4e6eb;
            background: #1877f2;
            color: white;
            flex-shrink: 0;
        }
        .chat-window .chat-header .title { font-weight: 600; font-size: 15px; }
        .chat-window .chat-header .close-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .chat-window .chat-header .close-btn:hover { background: rgba(255,255,255,0.25); }
        .chat-window .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            background: #f8f9fa;
        }
        .chat-window .chat-messages .msg {
            padding: 8px 14px;
            margin-bottom: 6px;
            background: white;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            max-width: 85%;
        }
        .chat-window .chat-messages .msg.self {
            margin-left: auto;
            background: #1877f2;
            color: white;
        }
        .chat-window .chat-messages .msg .author {
            font-weight: 600;
            font-size: 12px;
            color: #1877f2;
        }
        .chat-window .chat-messages .msg.self .author { color: rgba(255,255,255,0.7); }
        .chat-window .chat-messages .msg .time { color: #999; font-size: 10px; margin-left: 6px; }
        .chat-window .chat-messages .msg.self .time { color: rgba(255,255,255,0.6); }
        .chat-window .chat-input-wrap {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #e4e6eb;
            background: white;
            flex-shrink: 0;
        }
        .chat-window .chat-input-wrap input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e4e6eb;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
            font-family: inherit;
        }
        .chat-window .chat-input-wrap input:focus { border-color: #1877f2; }
        .chat-window .chat-input-wrap button {
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .chat-window .chat-input-wrap button:hover { background: #4a9eff; }
        
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            padding: 8px 0;
            min-width: 200px;
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 1000;
            border: 1px solid #e4e6eb;
        }
        .context-menu.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        .context-menu .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            color: #050505;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
        }
        .context-menu .menu-item:hover { background: #f0f2f5; }
        .context-menu .menu-item .icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
        .context-menu .menu-item.danger { color: #e74c3c; }
        .context-menu .menu-item.danger:hover { background: #fef0ef; }
        .context-menu .menu-divider { height: 1px; background: #e4e6eb; margin: 4px 16px; }
        .context-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 999;
            display: none;
        }
        .context-overlay.active { display: block; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlide 0.2s ease;
        }
        @keyframes modalSlide {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h3 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #050505;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e4e6eb;
            border-radius: 8px;
            margin: 6px 0;
            font-size: 15px;
            font-family: inherit;
        }
        .modal-content input:focus { outline: none; border-color: #1877f2; }
        .modal-content .btns {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .modal-content .btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s;
        }
        .modal-content .btns .cancel {
            background: #e4e6eb;
            color: #050505;
        }
        .modal-content .btns .cancel:hover { background: #d8dadf; }
        .modal-content .btns .save {
            background: #1877f2;
            color: white;
        }
        .modal-content .btns .save:hover { background: #4a9eff; }
        
        .notif-item {
            padding: 12px;
            border-bottom: 1px solid #e4e6eb;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: background 0.15s;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .notif-item:hover { background: #f0f2f5; }
        .notif-item.unread { background: #f0f7ff; }
        .notif-item .notif-icon { font-size: 20px; flex-shrink: 0; }
        .notif-item .notif-text { flex: 1; font-size: 14px; }
        .notif-item .notif-time { color: #65676b; font-size: 11px; }
        .notif-item .notif-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1877f2;
            flex-shrink: 0;

// ================================================================
// ГЕНЕРАЦИЯ USERNAME
// ================================================================

function generateUsername(name) {
    if (!name) return 'user_' + Date.now();
    
    const translitMap = {
        'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e',
        'ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m',
        'н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u',
        'ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch',
        'ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya',
        'А':'A','Б':'B','В':'V','Г':'G','Д':'D','Е':'E','Ё':'E',
        'Ж':'Zh','З':'Z','И':'I','Й':'Y','К':'K','Л':'L','М':'M',
        'Н':'N','О':'O','П':'P','Р':'R','С':'S','Т':'T','У':'U',
        'Ф':'F','Х':'H','Ц':'Ts','Ч':'Ch','Ш':'Sh','Щ':'Sch',
        'Ъ':'','Ы':'Y','Ь':'','Э':'E','Ю':'Yu','Я':'Ya'
    };
    
    let username = '';
    for (let char of name.trim()) {
        username += translitMap[char] || char;
    }
    
    username = username.replace(/[^a-zA-Z0-9_]/g, '').toLowerCase();
    
    if (username.length < 3) {
        username = username + '_' + Math.random().toString(36).substring(2, 6);
    }
    
    return new Promise((resolve) => {
        checkUsernameUnique(username, resolve);
    });
}

function checkUsernameUnique(baseUsername, callback) {
    let username = baseUsername;
    let counter = 1;
    
    const check = function(name, cb) {
        db.ref('sites/' + SITE + '/users_by_name/' + name).once('value', snap => {
            if (snap.val()) {
                const newName = baseUsername + '_' + counter;
                counter++;
                check(newName, cb);
            } else {
                cb(name);
            }
        });
    };
    
    check(username, callback);
}

function saveUsername(uid, username) {
    if (!uid || !username) return;
    db.ref('sites/' + SITE + '/users_by_name/' + username).set(uid);
    db.ref('sites/' + SITE + '/users/' + uid + '/username').set(username);
    db.ref('sites/' + SITE + '/all_users/' + uid + '/username').set(username);
    console.log(`✅ Username "${username}" привязан к пользователю ${uid}`);
}

function updateUrl(username) {
    if (username && history.pushState) {
        const newUrl = '/' + username;
        if (window.location.pathname !== newUrl) {
            history.pushState(null, '', newUrl);
        }
    }
}

function copyUsername(username) {
    if (!username) return;

            el.textContent = '✅ Скопировано!';

}

function adminFixUsernames() {
    if (!isAdmin) { console.warn('❌ Доступ запрещен'); return; }
    if (!confirm('Починить username для всех пользователей?')) return;
    
    db.ref('sites/' + SITE + '/all_users').once('value', snap => {
        const users = snap.val() || {};
        let count = 0;
        const promises = [];
        
        Object.keys(users).forEach(uid => {

                promises.push(
                    generateUsername(user.name).then(username => {
                        saveUsername(uid, username);
                        db.ref('sites/' + SITE + '/all_users/' + uid + '/username').set(username);
                        count++;
                    })
                );
            }
        });
        
        Promise.all(promises).then(() => {
            alert(`✅ Username обновлены для ${count} пользователей`);
            loadPeople();

            console.error('❌ Ошибка:', err);

// ================================================================
// УПРАВЛЕНИЕ ЗАПРОСАМИ
// ================================================================
const activeRequests = new Map();

function cancelRequest(key) {
    if (activeRequests.has(key)) {
        const cancelFn = activeRequests.get(key);
        if (typeof cancelFn === 'function') { cancelFn(); }
        activeRequests.delete(key);
        return true;
    }
    return false;
}

function safeFirebaseQuery(key, ref, callback) {
    cancelRequest(key);
    let isCancelled = false;
    const cancelFn = () => {
        isCancelled = true;
        activeRequests.delete(key);
    };
    activeRequests.set(key, cancelFn);
    
    ref.once('value', snap => {
        if (isCancelled) { console.log(`🔄 Запрос "${key}" отменен`); return; }
        activeRequests.delete(key);
        callback(snap);
    }).catch(err => {
        if (!isCancelled) {
            activeRequests.delete(key);
            console.warn(`❌ Ошибка запроса "${key}":`, err);
        }
    });
    return cancelFn;
}

function cancelAllRequests() {
    for (const [key, cancelFn] of activeRequests) {
        if (typeof cancelFn === 'function') { cancelFn(); }
    }
    activeRequests.clear();
}

window.addEventListener('beforeunload', function() {
    cancelAllRequests();
    closeContextMenu();

function toggleProfileDropdown() {
    const dropdown = document.getElementById('profileDropdown');
    const overlay = document.getElementById('profileDropdownOverlay');
    if (!dropdown) return;
    if (dropdown.classList.contains('open')) {
        closeProfileDropdown();
    } else {
        dropdown.classList.add('open');
        overlay.classList.add('active');
        dropdownState.isOpen = true;
    }
}

function closeProfileDropdown() {
    const dropdown = document.getElementById('profileDropdown');
    const overlay = document.getElementById('profileDropdownOverlay');
    if (dropdown) dropdown.classList.remove('open');
    if (overlay) overlay.classList.remove('active');
    dropdownState.isOpen = false;
}

document.addEventListener('click', function(e) {
    const dropdown = document.getElementById('profileDropdown');
    const btn = document.getElementById('profileMoreBtn');
    if (!dropdown || !dropdown.classList.contains('open')) return;
    if (!dropdown.contains(e.target) && !btn.contains(e.target)) {
        closeProfileDropdown();
    }
});

function loadSavedProfiles() {
    try {
        const saved = localStorage.getItem('dc_profiles_' + SITE);
        SAVED_PROFILES = saved ? JSON.parse(saved) : [];
    } catch(e) { SAVED_PROFILES = []; }
    renderSavedProfiles();
}

function saveProfileToList(uid, name, email, avatarUrl) {
    const existing = SAVED_PROFILES.find(p => p.uid === uid);
    if (!existing) {
        SAVED_PROFILES.push({ uid, name, email: email || 'anon', avatarUrl: avatarUrl || null, lastUsed: Date.now() });
    } else {
        existing.name = name;
        existing.email = email || 'anon';
        existing.avatarUrl = avatarUrl || null;
        existing.lastUsed = Date.now();
    }
    localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
    renderSavedProfiles();
}

function renderSavedProfiles() {
    const container = document.getElementById('profileSelector');
    if (!container) return;
    if (SAVED_PROFILES.length === 0) {
        container.innerHTML = '<div style="color:#65676b;text-align:center;padding:10px;font-size:14px;">Нет сохраненных профилей</div>';
        return;
    }
    const sorted = [...SAVED_PROFILES].sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
    container.innerHTML = sorted.map(p => {
        const letter = (p.name || '?').charAt(0).toUpperCase();
        const avatarHtml = p.avatarUrl ? `<img src="${p.avatarUrl}">` : `<span>${letter}</span>`;
        return `
            <div class="profile-option" onclick="loginWithSavedProfile('${p.uid}')">
                <div class="avatar">${avatarHtml}</div>
                <div class="info">
                    <div class="name">${p.name || 'Аноним'}</div>
                    <div class="email">${p.email || ''}</div>
                </div>
                <button class="remove-btn" onclick="event.stopPropagation();removeSavedProfile('${p.uid}')">✕</button>
            </div>
        `;
    }).join('');
}

window.removeSavedProfile = function(uid) {
    if (!confirm('Удалить сохраненный профиль?')) return;
    SAVED_PROFILES = SAVED_PROFILES.filter(p => p.uid !== uid);
    localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
    renderSavedProfiles();
};

window.loginWithSavedProfile = function(uid) {
    const profile = SAVED_PROFILES.find(p => p.uid === uid);
    if (!profile) return;
    auth.signInAnonymously().then(() => {
        USER = profile.name;
        USER_UID = uid;
        localStorage.setItem('dc_u_' + SITE, USER);
        const data = { name: profile.name, email: profile.email || 'anon', uid, lastLogin: Date.now(), avatarUrl: profile.avatarUrl || null };
        db.ref('sites/' + SITE + '/users/' + uid).update(data);
        db.ref('sites/' + SITE + '/all_users/' + uid).set(data);
        profile.lastUsed = Date.now();
        localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
        document.getElementById('loginModal').classList.remove('open');
        updateUI();
        loadData();
        navigateToFeed();
    }).catch(e => alert('Ошибка входа: ' + e.message));
};

            generateUsername(USER).then(username => {
                currentUsername = username;
                data.username = username;
                db.ref('sites/' + SITE + '/users/' + USER_UID).update(data);
                db.ref('sites/' + SITE + '/all_users/' + USER_UID).set(data);
                saveUsername(USER_UID, username);

                document.getElementById('loginModal').classList.remove('open');
                updateUI();

                loadNotifications();

                setTimeout(handleRouting, 300);
            });
        } else {
            document.getElementById('loginModal').classList.remove('open');
            updateUI();
            loadData();
            loadNotifications();
            
            // Проверяем роутинг после входа
            setTimeout(handleRouting, 300);
        }
    } else {
        USER = null;
        USER_UID = null;
        avatarCache = null;
        isAdmin = false;
        currentUsername = null;
        updateAdminUI();
        
        cancelAllRequests();
        if (notifUnsub) { notifUnsub(); notifUnsub = null; }

function showTabInternal(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-bar .tab').forEach(t => {
        const text = t.textContent.trim();
        if ((tab === 'groups' && text.includes('Группы')) ||
            (tab === 'people' && text.includes('Люди'))) {
            t.classList.add('active');
        }
    });
    
    document.getElementById('groupsPage').classList.toggle('active', tab === 'groups');
    document.getElementById('groupsPage').classList.toggle('hidden', tab !== 'groups');
    document.getElementById('peoplePage').classList.toggle('active', tab === 'people');
    document.getElementById('peoplePage').classList.toggle('hidden', tab !== 'people');

    document.getElementById('profilePage').classList.add('hidden');
    viewingProfileUid = null;
    activeStatToggle = null;
    closeProfileDropdown();

}

function togglePrivacy(event) {
    event.stopPropagation();
    if (!USER_UID) return;
    
    const toggle = document.getElementById('privacyToggle');
    if (!toggle) return;
    
    const newState = !toggle.classList.contains('active');
    toggle.classList.toggle('active', newState);
    profilePrivacy.hideFriends = newState;
    
    db.ref('sites/' + SITE + '/users/' + USER_UID + '/settings/hideFriends').set(newState);
    
    if (viewingProfileUid) renderProfile(viewingProfileUid);
}

// ================================================================
// TOGGLE СПИСКОВ
// ================================================================

function toggleStatList(type, btn) {
    if (!btn) {
        const btns = document.querySelectorAll('.stat-toggle');
        btns.forEach(b => {
            const text = b.textContent.trim();
            if ((type === 'friends' && text.includes('Друзья')) ||
                (type === 'following' && text.includes('Подписки')) ||
                (type === 'followers' && text.includes('Подписчики'))) {
                btn = b;
            }
        });
    }
    
    const container = document.getElementById('statContainer');
    if (!container) return;
    
    if (activeStatToggle === type && container.classList.contains('open')) {
        container.classList.remove('open');
        activeStatToggle = null;
        if (btn) btn.classList.remove('active');
        return;
    }
    
    document.querySelectorAll('.stat-toggle').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    container.classList.add('open');
    activeStatToggle = type;
    
    loadStatList(type);
}

function loadStatList(type) {
    const container = document.getElementById('statListContent');
    if (!container) return;
    
    container.innerHTML = '<div style="text-align:center;padding:20px;color:#65676b;">⏳ Загрузка...</div>';
    
    if (type === 'friends') {
        db.ref('sites/' + SITE + '/friends/' + USER_UID).once('value', snap => {
            const data = snap.val() || {};
            const friends = Object.keys(data).filter(k => data[k] === 'friend');
            renderStatList(container, friends, 'Друзья', 'friends');
        });
    } else if (type === 'followers') {
        db.ref('sites/' + SITE + '/followers/' + USER_UID).once('value', snap => {
            const data = snap.val() || {};
            const followers = Object.keys(data);
            renderStatList(container, followers, 'Подписчики', 'followers');
        });
    } else if (type === 'following') {
        db.ref('sites/' + SITE + '/followers').once('value', snap => {
            const allFollowers = snap.val() || {};
            const following = [];
            for (const [targetUid, followers] of Object.entries(allFollowers)) {
                if (followers && followers[USER_UID] === true) {
                    following.push(targetUid);
                }
            }
            renderStatList(container, following, 'Подписки', 'following');
        });
    }
}

function renderStatList(container, uids, title, type) {
    if (!uids || uids.length === 0) {
        container.innerHTML = `<div class="stat-empty">Нет ${title.toLowerCase()}</div>`;
        return;
    }
    
    let html = '<div class="stat-list">';
    let loaded = 0;
    
    uids.forEach(uid => {
        db.ref('sites/' + SITE + '/all_users/' + uid).once('value', snap => {
            const user = snap.val() || {};
            const name = user.name || 'Аноним';
            const letter = name.charAt(0).toUpperCase();
            const avatarHtml = user.avatarUrl ? 
                `<img src="${user.avatarUrl}">` : 
                letter;
            
            const item = document.createElement('span');
            item.className = 'stat-item';
            item.onclick = () => navigateToProfile(uid);
            item.innerHTML = `
                <span class="mini-avatar">${avatarHtml}</span>
                ${name}
            `;
            container.querySelector('.stat-list').appendChild(item);
            loaded++;
        });
    });
    
    container.innerHTML = html;
}

function updateCountersForUid(uid) {
    if (!uid) return;
    db.ref('sites/' + SITE + '/friends/' + uid).once('value', snap => {
        const data = snap.val() || {};
        const friends = Object.keys(data).filter(k => data[k] === 'friend');
        const el = document.getElementById('friendsCount');
        if (el) el.textContent = friends.length;
    });
    db.ref('sites/' + SITE + '/followers/' + uid).once('value', snap => {
        const data = snap.val() || {};
        const el = document.getElementById('followersCount');
        if (el) el.textContent = Object.keys(data).length;
    });
    db.ref('sites/' + SITE + '/followers').once('value', snap => {
        const allFollowers = snap.val() || {};
        let count = 0;
        for (const [targetUid, followers] of Object.entries(allFollowers)) {
            if (followers && followers[uid] === true) {
                count++;
            }
        }
        const el = document.getElementById('subscriptionsCount');
        if (el) el.textContent = count;
    });
}

function openProfileMenu(event) {
    if (menuState.isAnimating) return;
    event.stopPropagation();
    event.preventDefault();
    
    const menu = document.getElementById('contextMenu');
    const overlay = document.getElementById('contextOverlay');
    const avatar = document.getElementById('profileAvatar');
    if (!menu || !avatar) return;
    if (menu.classList.contains('open')) {
        closeContextMenu();
        return;
    }
    const rect = avatar.getBoundingClientRect();
    const menuWidth = 200;
    const leftPos = Math.max(10, rect.left + rect.width / 2 - menuWidth / 2);
    const topPos = Math.min(rect.bottom + 10, window.innerHeight - 250);
    menu.style.left = leftPos + 'px';
    menu.style.top = topPos + 'px';
    menuState.isAnimating = true;
    menu.classList.add('open');
    overlay.classList.add('active');
    setTimeout(() => {
        menuState.isAnimating = false;
        menuState.isOpen = true;
    }, 200);
}

function closeContextMenu() {
    if (menuState.isAnimating) return;
    const menu = document.getElementById('contextMenu');
    const overlay = document.getElementById('contextOverlay');
    menuState.isAnimating = true;
    if (menu) menu.classList.remove('open');
    if (overlay) overlay.classList.remove('active');
    setTimeout(() => {
        menuState.isAnimating = false;
        menuState.isOpen = false;
    }, 200);
}

document.addEventListener('click', function(e) {
    const menu = document.getElementById('contextMenu');
    const avatar = document.getElementById('profileAvatar');
    if (!menu || !menu.classList.contains('open')) return;
    const isClickInsideMenu = menu.contains(e.target);
    const isClickOnAvatar = avatar && (e.target === avatar || avatar.contains(e.target));
    if (!isClickInsideMenu && !isClickOnAvatar) {
        closeContextMenu();
    }
});

function updateFriendStatus(myUid, targetUid, status) {
    if (!myUid || !targetUid) {
        console.error('❌ Ошибка: отсутствуют UID');
        return;
    }
    
    const updates = {};
    const path1 = 'sites/' + SITE + '/friends/' + myUid + '/' + targetUid;
    const path2 = 'sites/' + SITE + '/friends/' + targetUid + '/' + myUid;
    
    if (status === 'friend') {
        updates[path1] = 'friend';
        updates[path2] = 'friend';
        updates['sites/' + SITE + '/followers/' + targetUid + '/' + myUid] = true;
    } else if (status === 'pending') {
        updates[path1] = 'pending';
        updates[path2] = 'pending';
        updates['sites/' + SITE + '/followers/' + targetUid + '/' + myUid] = true;
    } else if (status === null) {
        updates[path1] = null;
        updates[path2] = null;
        updates['sites/' + SITE + '/followers/' + targetUid + '/' + myUid] = null;
    }
    
    db.ref().update(updates)
        .then(() => {
            console.log(`✅ Статус "${status}" установлен для ${myUid} и ${targetUid}`);
        })
        .catch(err => {
            console.error('❌ Ошибка обновления статуса:', err);
        });
}

function sendFriendRequest(targetUid) {
    if (!USER_UID) { alert('Войдите!'); return; }
    if (targetUid === USER_UID) { alert('Нельзя добавить себя'); return; }
    
    db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid).once('value', snap => {
        const status = snap.val();
        
        if (status === 'friend') {
            alert('✅ Уже в друзьях');
            return;
        }
        
        if (status === 'pending') {
            updateFriendStatus(USER_UID, targetUid, null);
            if (viewingProfileUid) renderProfile(viewingProfileUid);
            return;
        }
        
        updateFriendStatus(USER_UID, targetUid, 'pending');
        
        sendNotification(targetUid, {
            type: 'friend_request',
            from: USER_UID,
            text: `${USER} отправил(а) запрос в друзья`,
            timestamp: Date.now()
        });
        
        if (viewingProfileUid) renderProfile(viewingProfileUid);
    });
}

function acceptFriendRequest(targetUid) {
    if (!USER_UID) { alert('Войдите!'); return; }
    updateFriendStatus(USER_UID, targetUid, 'friend');
    sendNotification(targetUid, {
        type: 'friend_accepted',
        from: USER_UID,
        text: `${USER} принял(а) ваш запрос в друзья`,
        timestamp: Date.now()
    });
    alert('✅ Дружба подтверждена!');
    if (viewingProfileUid) renderProfile(viewingProfileUid);
}

function removeFriend(targetUid) {
    if (!USER_UID) { alert('Войдите!'); return; }
    if (!confirm('Удалить из друзей?')) return;
    updateFriendStatus(USER_UID, targetUid, null);
    alert('❌ Пользователь удален из друзей');
    if (viewingProfileUid) renderProfile(viewingProfileUid);
}

function declineFriendRequest(targetUid) {
    if (!USER_UID) { alert('Войдите!'); return; }
    const updates = {};
    updates['sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid] = null;
    updates['sites/' + SITE + '/friends/' + targetUid + '/' + USER_UID] = null;
    db.ref().update(updates);
    alert('❌ Запрос отклонен');
    if (viewingProfileUid) renderProfile(viewingProfileUid);
}

function loadPeople() {
    if (!USER_UID) return;
    const el = document.getElementById('peopleList');
    if (!el) return;
    
    safeFirebaseQuery('loadPeople', db.ref('sites/' + SITE + '/all_users'), (snap) => {
        const users = snap.val() || {};
        const keys = Object.keys(users).filter(k => {
            if (k === USER_UID) return false;
            const u = users[k];
            if (!u || !u.name || u.name.trim() === '') return false;
            return true;
        });
        if (keys.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:30px;color:#65676b;">😕 Нет других пользователей</div>';
            return;
        }
        el.innerHTML = '';
        keys.forEach(k => {

            renderInlineUser(el, k, u);
        });
        keys.forEach(k => {
            listenFriendStatus(k);
        });
        
        if (isAdmin) {
            setTimeout(() => updateAdminUI(), 100);
        }
    });
}

function renderInlineUser(container, uid, userData) {
    if (!userData || !userData.name) {
        console.warn('⚠️ Пустые данные пользователя:', uid);
        return;
    }
    const name = userData.name.trim() || 'Аноним';
    const username = userData.username || '';
    const letter = name.charAt(0).toUpperCase();
    const avatarUrl = userData.avatarUrl || null;
    const itemDiv = document.createElement('div');
    itemDiv.className = 'user-item';
    itemDiv.id = 'user-item-' + uid;
    const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" alt="${esc(name)}">` : `<span>${letter}</span>`;
    
    // Ссылка на профиль
    const profileLink = username ? `/${username}` : `#`;
    const clickHandler = username ? `window.location.href='${profileLink}'` : `navigateToProfile('${uid}')`;
    
    itemDiv.innerHTML = `
        <div class="avatar" onclick="${clickHandler}">${avatarHtml}</div>
        <div class="info" onclick="${clickHandler}">
            <div class="name">${esc(name)}</div>
            ${username ? `<div class="username">@${esc(username)}</div>` : ''}
        </div>
        <div class="actions" onclick="event.stopPropagation();">
            <button class="btn-action btn-message" onclick="event.stopPropagation();openPrivateChat('${uid}')" title="Сообщение">
                <span class="icon">✉</span>
            </button>
            <button class="btn-action btn-friend add" id="friend-btn-${uid}" onclick="event.stopPropagation();sendFriendRequest('${uid}')">
                <span class="icon">➕</span> Добавить
            </button>
        </div>
    `;
    
    itemDiv.addEventListener('click', function(e) {
        if (!e.target.closest('.btn-action')) {
            if (username) {
                window.location.href = '/' + username;
            } else {
                navigateToProfile(uid);
            }
        }
    });
    
    container.appendChild(itemDiv);
    listenFriendStatus(uid);
}

function listenFriendStatus(targetUid) {
    if (!USER_UID || !targetUid) return;
    
    if (window.friendListeners && window.friendListeners[targetUid]) {
        window.friendListeners[targetUid]();
        delete window.friendListeners[targetUid];
    }
    
    if (!window.friendListeners) {
        window.friendListeners = {};
    }
    
    const ref = db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + targetUid);
    const onValue = snap => {
        const status = snap.val();
        updateFriendButtonInline(targetUid, status || 'none');
    };
    
    ref.on('value', onValue);
    
    window.friendListeners[targetUid] = () => {
        ref.off('value', onValue);
        delete window.friendListeners[targetUid];
    };
    
    return window.friendListeners[targetUid];
}

function updateFriendButtonInline(uid, status) {
    const btn = document.getElementById('friend-btn-' + uid);
    if (!btn) return;
    
    btn.className = 'btn-action btn-friend';
    btn.disabled = false;
    
    if (status === 'friend') {
        btn.innerHTML = `<span class="icon">✓</span> В друзьях`;
        btn.classList.add('friend');
        btn.title = 'В друзьях (нажмите чтобы удалить)';
        btn.onclick = (e) => { e.stopPropagation(); removeFriend(uid); };
    } else if (status === 'pending') {
        btn.innerHTML = `<span class="icon">⏳</span> Запрос`;
        btn.classList.add('pending');
        btn.title = 'Запрос отправлен (нажмите чтобы отменить)';
        btn.onclick = (e) => { e.stopPropagation(); sendFriendRequest(uid); };
    } else {
        btn.innerHTML = `<span class="icon">➕</span> Добавить`;
        btn.classList.add('add');
        btn.title = 'Добавить в друзья';
        btn.onclick = (e) => { e.stopPropagation(); sendFriendRequest(uid); };
    }
}

function loadRooms() {

            createDefaultRooms();

        let html = '';
        Object.keys(rooms).forEach(roomId => {
            const room = rooms[roomId];

                const users = snap.val() || {};

window.joinRoom = function(roomId) {

    });

function sendNotification(targetUid, data) {
    if (!USER_UID) return;
    if (!targetUid || targetUid === USER_UID) {
        console.warn('❌ Нельзя отправить уведомление себе');
        return;
    }
    const notifRef = db.ref('sites/' + SITE + '/notifications/' + targetUid).push();
    notifRef.set({
        ...data,
        read: false,
        fromName: USER,
        fromUid: USER_UID
    }).then(() => {
        console.log(`✅ Уведомление отправлено пользователю ${targetUid}`);
    }).catch(err => {
        console.error('❌ Ошибка отправки уведомления:', err);
    });
}

function loadNotifications() {
    if (!USER_UID) return;
    if (notifUnsub) { notifUnsub(); notifUnsub = null; }
    const ref = db.ref('sites/' + SITE + '/notifications/' + USER_UID).orderByChild('timestamp').limitToLast(20);
    notifUnsub = ref.on('value', snap => {
        const notifications = snap.val() || {};
        const keys = Object.keys(notifications).sort((a, b) => 
            (notifications[b].timestamp || 0) - (notifications[a].timestamp || 0)
        );
        const unread = keys.filter(k => !notifications[k].read);
        const badge = document.getElementById('notifBadge');
        if (badge) {
            if (unread.length > 0) {
                badge.style.display = 'inline';
                badge.textContent = unread.length;
            } else {
                badge.style.display = 'none';
            }
        }
        if (document.getElementById('notificationsModal').classList.contains('open')) {
            renderNotifications(notifications, keys);
        }
    });
}

function renderNotifications(notifications, keys) {
    const container = document.getElementById('notificationsList');
    if (!container) return;
    if (keys.length === 0) {
        container.innerHTML = '<div style="color:#65676b;text-align:center;padding:20px;">Нет уведомлений</div>';
        return;
    }
    let html = '';
    keys.slice(0, 20).forEach(k => {
        const n = notifications[k];
        const isUnread = !n.read;
        const time = n.timestamp ? new Date(n.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        let icon = '📩';
        if (n.type === 'friend_request') icon = '🤝';
        if (n.type === 'friend_accepted') icon = '✅';
        if (n.type === 'message') icon = '💬';
        html += `
            <div class="notif-item ${isUnread ? 'unread' : ''}" 
                 onclick="handleNotifClick('${k}', '${n.fromUid || n.from}', '${n.type}')"
                 data-type="${n.type}"
                 data-from="${n.fromUid || n.from}"
                 data-id="${k}">
                <span class="notif-icon">${icon}</span>
                <div class="notif-text">
                    <div style="font-weight:${isUnread ? '600' : '400'};font-size:14px;">${n.text || 'Уведомление'}</div>
                    <div class="notif-time">${time}</div>
                </div>
                ${isUnread ? '<span class="notif-dot"></span>' : ''}
            </div>
        `;
    });
    container.innerHTML = html;
}

function handleNotifClick(notifId, fromUid, type) {
    if (!USER_UID) return;
    if (!fromUid) return;
    db.ref('sites/' + SITE + '/notifications/' + USER_UID + '/' + notifId + '/read').set(true);
    
    if (type === 'message') {
        closeNotifications();
        openPrivateChat(fromUid);
        db.ref('sites/' + SITE + '/notifications/' + USER_UID + '/' + notifId).remove();
    } else if (type === 'friend_request') {
        closeNotifications();
        // Ищем username для перехода
        db.ref('sites/' + SITE + '/all_users/' + fromUid + '/username').once('value', snap => {
            const username = snap.val();
            if (username) {
                window.location.href = '/' + username;
            } else {
                navigateToProfile(fromUid);
            }
        });
    } else if (type === 'friend_accepted') {
        closeNotifications();
        db.ref('sites/' + SITE + '/all_users/' + fromUid + '/username').once('value', snap => {
            const username = snap.val();
            if (username) {
                window.location.href = '/' + username;
            } else {
                navigateToProfile(fromUid);
            }
        });
    }
}

function openNotifications() {
    document.getElementById('notificationsModal').classList.add('open');
    const ref = db.ref('sites/' + SITE + '/notifications/' + USER_UID).orderByChild('timestamp').limitToLast(20);
    ref.once('value', snap => {
        const notifications = snap.val() || {};
        const keys = Object.keys(notifications).sort((a, b) => 
            (notifications[b].timestamp || 0) - (notifications[a].timestamp || 0)
        );
        renderNotifications(notifications, keys);
    });
}

function closeNotifications() {
    document.getElementById('notificationsModal').classList.remove('open');
}

function openPrivateChat(targetUid) {
    if (!USER_UID) { alert('Войдите!'); return; }
    if (targetUid === USER_UID) { alert('Нельзя писать себе'); return; }
    const chatId = [USER_UID, targetUid].sort().join('_');
    const path = 'dms/' + SITE + '/' + chatId + '/messages';
    closeNotifications();
    closeContextMenu();
    closeProfileDropdown();
    CURRENT_ROOM = chatId;
    document.getElementById('chatWindow').classList.add('active');
    db.ref('sites/' + SITE + '/all_users/' + targetUid).once('value', snap => {
        const user = snap.val() || {};
        const name = user.name || 'Собеседник';
        document.getElementById('chatTitle').textContent = '💬 ' + name;
    });
    loadChat(path);
}

function loadChat(path) {
    if (chatUnsub) { 
        if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value');
        chatUnsub = null; 
    }
    const box = document.getElementById('chatMessages');
    box.innerHTML = '<div style="color:#65676b;text-align:center;padding:20px;">⏳ Загрузка...</div>';
    chatUnsub = path;
    db.ref(path).orderByChild('timestamp').on('value', snap => {
        box.innerHTML = '';
        if (!snap.exists()) { 
            box.innerHTML = '<div style="color:#65676b;text-align:center;padding:20px;">Сообщений нет</div>'; 
            return; 
        }
        snap.forEach(s => {
            const m = s.val();
            const isSelf = m.nick === USER;
            const div = document.createElement('div');
            div.className = 'msg' + (isSelf ? ' self' : '');
            div.innerHTML = `
                <span class="author">${esc(m.nick||'?')}</span>
                <span class="time">${m.time||''}</span>
                <div>${esc(m.text||'')}</div>
            `;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

window.sendChat = function() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !CURRENT_ROOM) return;
    const path = 'dms/' + SITE + '/' + CURRENT_ROOM + '/messages';
    const parts = CURRENT_ROOM.split('_');
    const targetUid = parts[0] === USER_UID ? parts[1] : parts[0];
    db.ref(path).push({
        nick: USER,
        text: text,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        timestamp: Date.now()
    });
    sendNotification(targetUid, {
        type: 'message',
        from: USER_UID,
        text: `${USER}: ${text}`,
        timestamp: Date.now()
    });
    input.value = '';
};

window.closeChat = function() {
    document.getElementById('chatWindow').classList.remove('active');
    if (chatUnsub) { 
        if (typeof chatUnsub === 'string') db.ref(chatUnsub).off('value');
        chatUnsub = null; 
    }
    CURRENT_ROOM = null;
};

window.uploadAvatar = function() {
    if (!USER_UID) { alert('Войдите!'); return; }
    closeContextMenu();
    closeProfileDropdown();
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { alert('Максимум 5 МБ'); return; }
        const ref = storage.ref('avatars/' + USER_UID + '/' + Date.now() + '_' + file.name);
        ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
            db.ref('sites/' + SITE + '/users/' + USER_UID + '/avatarUrl').set(url);
            db.ref('sites/' + SITE + '/all_users/' + USER_UID + '/avatarUrl').set(url);
            const profile = SAVED_PROFILES.find(p => p.uid === USER_UID);
            if (profile) {
                profile.avatarUrl = url;
                localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
            }
            refreshAvatarCache();
            if (viewingProfileUid) renderProfile(viewingProfileUid);
            alert('✅ Аватарка обновлена!');
        });
    };
    input.click();
};

// ================================================================
// РЕДАКТИРОВАНИЕ (С СОХРАНЕНИЕМ USERNAME)
// ================================================================

window.editProfile = function() {
    closeContextMenu();
    closeProfileDropdown();
    document.getElementById('editProfileModal').classList.add('open');
    document.getElementById('editName').value = USER || '';
    document.getElementById('editBio').value = '';
};

window.closeEditProfile = function() {
    document.getElementById('editProfileModal').classList.remove('open');
};

window.saveProfile = function() {
    const name = document.getElementById('editName').value.trim();
    const bio = document.getElementById('editBio').value.trim();
    if (!name) { alert('Введите имя'); return; }
    
    USER = name;
    localStorage.setItem('dc_u_' + SITE, USER);
    
    generateUsername(name).then(username => {
        const updates = { name: USER, bio: bio, username: username };
        
        db.ref('sites/' + SITE + '/users/' + USER_UID).update(updates);
        db.ref('sites/' + SITE + '/all_users/' + USER_UID).update(updates);
        saveUsername(USER_UID, username);
        
        const profile = SAVED_PROFILES.find(p => p.uid === USER_UID);
        if (profile) {
            profile.name = USER;
            localStorage.setItem('dc_profiles_' + SITE, JSON.stringify(SAVED_PROFILES));
        }
        
        closeEditProfile();
        if (viewingProfileUid) renderProfile(viewingProfileUid);
        updateUI();
        loadPeople();
        
        // Обновляем URL
        updateUrl(username);
        document.title = `${USER} | METAIMPERIYA`;
    });
};
