<head>

<body>

<div class="app" id="app">

    <!-- ===== КОНТЕЙНЕРЫ ДЛЯ ПОДГРУЗКИ ===== -->
    <div id="topbarContainer"></div>
    <div id="settingsContainer"></div>
    <div id="sidebarContainer"></div>
    <div id="playerContainer"></div>
    <div id="modalsContainer"></div>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <div class="container" id="mainContainer">

        <!-- ===== РУЧКА ПЛЕЕРА ===== -->

                    <div class="editor-toolbar">

                        <button onclick="formatText('strike')"><s>S</s></button>

                        <button onclick="formatText('h2')">H2</button>
                        <button onclick="formatText('quote')">"</button>

                    <div contenteditable="true" id="postEditor" class="post-editor" placeholder="Что у вас нового?"></div>

        </div>

        <!-- ===== ЛЮДИ ===== -->
        <div class="page" id="page-people">
            <div class="card"><h3>👤 Все пользователи</h3><div class="people-list" id="peopleList"></div></div>

        <!-- ===== ПРОФИЛЬ ===== -->

            <div class="profile-header">

                    <span>📌 <span data-i18n="subscriptions">Подписки</span>: <span id="subscriptionsCount" class="stat-clickable">0</span></span>
                </div>

            <div class="link-section" id="linkSection">

            <div class="friends-section" id="friendsSection" style="display:none;">

            <div class="card" style="margin-top:8px;">

                        <button onclick="formatText('underline')"><u>U</u></button>

                        <button onclick="formatText('h1')">H1</button>
                        <button onclick="formatText('h2')">H2</button>
                        <button onclick="formatText('quote')">"</button>
                        <button onclick="formatText('code')">&lt;/&gt;</button>

                    <div contenteditable="true" id="postEditorProfile" class="post-editor" placeholder="Что у вас нового в профиле?"></div>
                    <div class="post-actions" style="margin-top:6px;">
                        <label class="file-label" for="fileInputProfile">📎 <span data-i18n="photo">Фото</span></label>
                        <button class="btn-submit" onclick="submitProfilePost()">📤 <span data-i18n="publish">Опубликовать</span></button>

            <div class="container" style="padding-top:10px;">

                <p style="color:#888;font-size:0.8rem;margin-bottom:10px;">Публикуйте фото и смотрите новые посты</p>

                <!-- ===== ФОРМА ПОСТА ===== -->

                            <button onclick="formatText('bold')"><b>B</b></button>
                            <button onclick="formatText('italic')"><i>I</i></button>
                            <button onclick="formatText('underline')"><u>U</u></button>
                            <button onclick="formatText('strike')"><s>S</s></button>

        <!-- ===== СТРАНИЦА ПОСТА ===== -->

<script>
// ================================================================
// ФОТО-ЛЕНТА — САМОСТОЯТЕЛЬНЫЙ КОД
// ================================================================

var fotoFeedListener = null;
var pendingFotoImage = null;
var pendingFotoImageFile = null;

function getFotoEditorText() {
    var editor = document.getElementById('postEditorFoto');
    if (!editor) return '';
    return editor.innerHTML;
}

function clearFotoPostForm() {
    var editor = document.getElementById('postEditorFoto');
    if (editor) editor.innerHTML = '';
    pendingFotoImage = null;
    pendingFotoImageFile = null;
    var preview = document.getElementById('previewBoxFoto');
    if (preview) preview.classList.remove('visible');
    var input = document.getElementById('fileInputFoto');
    if (input) input.value = '';
}

function removeFotoImage() {
    pendingFotoImage = null;
    pendingFotoImageFile = null;
    var preview = document.getElementById('previewBoxFoto');
    if (preview) preview.classList.remove('visible');
    var input = document.getElementById('fileInputFoto');
    if (input) input.value = '';
}

function extractHashtags(text) {
    if (!text) return [];
    var matches = text.match(/#[\wа-яё]+/gi) || [];
    return matches.slice(0, 8);
}

function renderFotoPost(p) {
    var div = document.createElement('div');
    div.className = 'post';
    div.dataset.id = p.id;

    var letter = (p.author || '?').charAt(0).toUpperCase();
    
    var avatarHtml = '';
    if (p.authorAvatar) {
        avatarHtml = '<span class="avatar-wrap"><img src="' + p.authorAvatar + '" /></span>';
    } else {
        avatarHtml = '<span class="avatar-wrap"><span class="letter">' + letter + '</span></span>';
    }

    var textHtml = p.text || '';
    var imgHtml = p.img ? '<img src="' + p.img + '" class="post-img" onclick="event.stopPropagation();window.open(this.src)">' : '';

    // 👇 КНОПКА УДАЛЕНИЯ
    var isAuthor = (p.authorUid === USER_UID);
    var canDelete = isAuthor || isAdmin;
    var deleteBtn = '';
    if (canDelete) {
        deleteBtn = '<button onclick="deleteFotoPost(\'' + p.id + '\')" style="background:var(--danger);color:#fff;border:none;border-radius:12px;padding:2px 10px;cursor:pointer;font-size:0.6rem;margin-left:4px;">🗑 Удалить</button>';
    }

    // 👇 КНОПКА РЕПОСТА
    var repostBtn = '';
    if (USER && USER_UID) {
        repostBtn = '<button onclick="repostFotoToFeed(\'' + p.id + '\')" style="background:var(--link-color);color:#fff;border:none;border-radius:12px;padding:2px 10px;cursor:pointer;font-size:0.6rem;margin-left:4px;">🔁 Репост</button>';
    }

    div.innerHTML = 
        '<div class="author">' + avatarHtml + 
        '<span class="name">' + esc(p.author || 'Аноним') + '</span>' +
        '<span class="time">' + (p.time || '') + '</span>' +
        '</div>' +
        '<div class="post-content">' + textHtml + imgHtml + '</div>' +
        '<div class="stats" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">' +
        '<button onclick="toggleFotoLike(\'' + p.id + '\')">👍 <span id="fotoLikeCount_' + p.id + '">' + (p.likes || 0) + '</span></button>' +
        repostBtn + deleteBtn +
        '</div>';

    return div;
}

// ===== ЛАЙКИ В ФОТО-ЛЕНТЕ =====

window.toggleFotoLike = function(postId) {
    if (!USER || !USER_UID) {
        alert('Войдите, чтобы поставить лайк!');
        return;
    }

    var key = 'foto_lk_' + postId + '_' + USER_UID;
    var liked = localStorage.getItem(key) === '1';
    var ref = db.ref('sites/' + SITE + '/foto_posts/' + postId + '/likes');
    var countEl = document.getElementById('fotoLikeCount_' + postId);

    if (liked) {
        ref.transaction(function(v) { return Math.max(0, (v || 0) - 1); });
        localStorage.removeItem(key);
        if (countEl) {
            var current = parseInt(countEl.textContent) || 0;
            countEl.textContent = Math.max(0, current - 1);
        }
    } else {
        ref.transaction(function(v) { return (v || 0) + 1; });
        localStorage.setItem(key, '1');
        if (countEl) {
            var current = parseInt(countEl.textContent) || 0;
            countEl.textContent = current + 1;
        }
    }
};

// ===== УДАЛЕНИЕ ПОСТА ИЗ ФОТО-ЛЕНТЫ =====

window.deleteFotoPost = function(postId) {
    if (!confirm('🗑 Удалить пост?')) return;
    
    db.ref('sites/' + SITE + '/foto_posts/' + postId).remove();
    
    var postEl = document.querySelector('.post[data-id="' + postId + '"]');
    if (postEl && postEl.parentNode) {
        postEl.parentNode.removeChild(postEl);
    }
    
    setTimeout(loadFotoFeed, 300);
};

// ===== РЕПОСТ ИЗ ФОТО-ЛЕНТЫ В ГЛАВНУЮ =====

window.repostFotoToFeed = function(postId) {
    if (!USER || !USER_UID) {
        alert('Войдите, чтобы сделать репост!');
        return;
    }
    
    db.ref('sites/' + SITE + '/foto_posts/' + postId).once('value', function(snap) {
        var original = snap.val();
        if (!original) {
            alert('Пост не найден');
            return;
        }
        
        db.ref('sites/' + SITE + '/users/' + USER_UID + '/avatarUrl').once('value', function(avatarSnap) {
            var avatarUrl = avatarSnap.val() || null;
            
            var repostData = {
                author: USER,
                authorUid: USER_UID,
                authorAvatar: avatarUrl,
                text: '🔁 Репост из фото-ленты: ' + (original.text || ''),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                timestamp: Date.now(),
                likes: 0,
                commentCount: 0,
                reposts: 0,
                hashtags: original.hashtags || [],
                img: original.img || null,
                link: original.link || null,
                marquee: null,
                buttons: [],
                frameSize: 'small',
                edited: false,
                repost: null,
                deleted: null,
                deletedAt: null
            };
            
            db.ref('sites/' + SITE + '/feed_posts').push(repostData);
            db.ref('sites/' + SITE + '/user_posts/' + USER_UID).push(repostData);
            
            alert('✅ Репост в главную ленту создан!');
            
            // Обновляем счётчик репостов в фото-ленте
            db.ref('sites/' + SITE + '/foto_posts/' + postId + '/reposts').transaction(function(current) {
                return (current || 0) + 1;
            });
            
            setTimeout(loadFotoFeed, 300);
            if (typeof loadFeed === 'function') loadFeed();
        });
    });
};

function loadFotoFeed() {
    var el = document.getElementById('fotoFeed');
    if (!el) return;

    if (!USER || !USER_UID) {
        el.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">Войдите, чтобы видеть ленту</div>';
        return;
    }

    if (fotoFeedListener) {
        db.ref('sites/' + SITE + '/foto_posts').off('value', fotoFeedListener);
        fotoFeedListener = null;
    }

    fotoFeedListener = function(snap) {
        var data = snap.val() || {};
        var keys = Object.keys(data).sort(function(a, b) {
            return (data[b].timestamp || 0) - (data[a].timestamp || 0);
        });

        if (!keys.length) {
            el.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">Пока нет фото-постов. Будьте первым!</div>';
            return;
        }

        el.innerHTML = '';

        keys.forEach(function(k) {
            var p = data[k];
            p.id = k;
            var postEl = renderFotoPost(p);
            if (postEl) {
                el.appendChild(postEl);
            }
        });
    };

    db.ref('sites/' + SITE + '/foto_posts').orderByChild('timestamp').on('value', fotoFeedListener);
}

window.submitFotoPost = function() {
    if (!USER || !USER_UID) {
        alert('Войдите, чтобы опубликовать пост!');
        var loginModal = document.getElementById('loginModal');
        if (loginModal) loginModal.classList.add('open');
        return;
    }

    var text = getFotoEditorText().trim();
    if (!text && !pendingFotoImageFile) {
        alert('Введите текст или добавьте фото');
        return;
    }

    var hashtags = extractHashtags(text);
    
    db.ref('sites/' + SITE + '/users/' + USER_UID + '/avatarUrl').once('value', function(avatarSnap) {
        var avatarUrl = avatarSnap.val() || null;
        
        var postData = {
            author: USER,
            authorUid: USER_UID,
            authorAvatar: avatarUrl,
            text: text || '📷',
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            timestamp: Date.now(),
            likes: 0,
            commentCount: 0,
            reposts: 0,
            hashtags: hashtags,
            img: null,
            deleted: null,
            deletedAt: null
        };

        var savePost = function(imgData) {
            if (imgData) postData.img = imgData;
            
            db.ref('sites/' + SITE + '/foto_posts').push(postData);
            clearFotoPostForm();
            
            setTimeout(function() {
                loadFotoFeed();
            }, 300);
        };

        if (pendingFotoImageFile) {
            var reader = new FileReader();
            reader.onload = function(e) {
                savePost(e.target.result);
            };
            reader.readAsDataURL(pendingFotoImageFile);
        } else {
            savePost(null);
        }
    });
};

// ================================================================
// ЗАГРУЗКА КОМПОНЕНТОВ
// ================================================================

(function() {
    const components = [
        { id: 'topbarContainer', url: 'topbar.html' },
        { id: 'settingsContainer', url: 'settings.html' },
        { id: 'sidebarContainer', url: 'sidebar.html' },
        { id: 'modalsContainer', url: 'modals.html' },
        { id: 'playerContainer', url: 'player.html' }
    ];

    let loaded = 0;
    const total = components.length;

    components.forEach(function(comp) {
        const container = document.getElementById(comp.id);
        if (!container) return;

        fetch(comp.url)
            .then(response => {
                if (!response.ok) throw new Error('Не удалось загрузить ' + comp.url);
                return response.text();
            })
            .then(html => {
                container.innerHTML = html;
                loaded++;
                if (loaded === total) {
                    console.log('✅ Все компоненты загружены!');
                    setTimeout(function() {
                        if (typeof translatePage === 'function') translatePage();
                        var urlParams = new URLSearchParams(window.location.search);
                        var page = urlParams.get('page');
                        if (page) {
                            openPage(page);
                        }
                        if (typeof updateUI === 'function') updateUI();
                        if (typeof loadNotifications === 'function') loadNotifications();
                        if (typeof updateNotifBadge === 'function') updateNotifBadge();
                        if (typeof initAudio === 'function') initAudio();
                    }, 500);
                }
            })
            .catch(err => {
                console.warn('❌ Ошибка загрузки ' + comp.url + ':', err);
                container.innerHTML = `<div style="display:none;"></div>`;
                loaded++;
                if (loaded === total) {
                    console.log('✅ Все компоненты загружены (с ошибками)');
                    setTimeout(function() {
                        if (typeof translatePage === 'function') translatePage();
                        var urlParams = new URLSearchParams(window.location.search);
                        var page = urlParams.get('page');
                        if (page) {
                            openPage(page);
                        }
                        if (typeof updateUI === 'function') updateUI();
                        if (typeof loadNotifications === 'function') loadNotifications();
                        if (typeof updateNotifBadge === 'function') updateNotifBadge();
                        if (typeof initAudio === 'function') initAudio();
                    }, 500);
                }
            });
    });
})();

// ================================================================
// АВТО-СКРЫТИЕ ШАПКИ
// ================================================================

(function() {
    var lastScrollY = 0;
    var topbar = document.getElementById('topbar');
    var playerHandle = document.getElementById('playerHandle');
    var playerDrawer = document.getElementById('playerDrawer');
    var isPlayerOpen = false;
    var ticking = false;

    function waitForTopbar() {
        topbar = document.getElementById('topbar');
        if (!topbar) {
            setTimeout(waitForTopbar, 200);
            return;
        }
        console.log('✅ Топбар найден, авто-скрытие работает');
    }
    waitForTopbar();

    function checkPlayerState() {
        if (playerDrawer) {
            isPlayerOpen = playerDrawer.classList.contains('open');
        }
    }

    function updateHeader() {
        var currentScrollY = window.scrollY;
        checkPlayerState();

        if (isPlayerOpen) {
            showAll();
            lastScrollY = currentScrollY;
            return;
        }

        if (currentScrollY < lastScrollY || currentScrollY < 30) {
            showAll();
        } else if (currentScrollY > lastScrollY && currentScrollY > 50) {
            hideAll();
        }

        lastScrollY = currentScrollY;
    }

    function showAll() {
        if (topbar) {
            topbar.style.transform = 'translateY(0)';
            topbar.style.opacity = '1';
        }
        if (playerHandle) {
            playerHandle.style.transform = 'translateY(0)';
            playerHandle.style.opacity = '1';
        }
    }

    function hideAll() {
        if (topbar) {
            topbar.style.transform = 'translateY(-100%)';
            topbar.style.opacity = '0';
            topbar.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
        }
        if (playerHandle) {
            playerHandle.style.transform = 'translateY(-100%)';
            playerHandle.style.opacity = '0';
            playerHandle.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
        }
    }

    window.addEventListener('scroll', function() {
        if (!ticking) {
            window.requestAnimationFrame(function() {
                updateHeader();
                ticking = false;
            });
            ticking = true;
        }
    }, { passive: true });

    if (playerDrawer) {
        var observer = new MutationObserver(function() {
            checkPlayerState();
            if (isPlayerOpen) {
                showAll();
            }
        });
        observer.observe(playerDrawer, { attributes: true, attributeFilter: ['class'] });
    }

    if (playerHandle) {
        playerHandle.addEventListener('click', function() {
            setTimeout(function() {
                checkPlayerState();
                if (isPlayerOpen) {
                    showAll();
                }
            }, 150);
        });
    }

    console.log('✅ Авто-скрытие шапки включено!');
})();
</script>

</body>
</html>
