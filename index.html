<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepChat · Простой</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        /* ===== МИНИМАЛИЗМ ===== */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#fff;color:#222;font-family:system-ui,sans-serif;padding:10px;max-width:800px;margin:0 auto;}
        
        /* Шапка простая */
        .header{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:2px solid #ccc;flex-wrap:wrap;}
        .logo{font-size:1.3rem;font-weight:700;color:#222;}
        .logo span{color:#e67e22;}
        .spacer{flex:1;}
        .user-btn{background:#f0f0f0;border:1px solid #ccc;border-radius:30px;padding:4px 12px;font-size:0.75rem;cursor:pointer;}
        .user-btn:hover{background:#e0e0e0;}

        /* Навигация */
        .nav{display:flex;gap:0;margin:10px 0;border-bottom:2px solid #ccc;}
        .nav-item{padding:8px 18px;cursor:pointer;color:#666;border-bottom:3px solid transparent;font-size:0.9rem;}
        .nav-item.active{color:#222;border-bottom-color:#e67e22;font-weight:600;}
        .hidden{display:none!important;}

        /* Карточки простые */
        .card{background:#fff;border:1px solid #ccc;border-radius:8px;padding:12px;margin-top:10px;}
        .card-title{font-weight:700;font-size:0.9rem;margin-bottom:6px;color:#222;}

        /* Авторизация */
        .auth-panel{text-align:center;padding:40px 20px;border:1px solid #ccc;border-radius:8px;margin-top:20px;}
        .auth-panel h2{color:#222;}
        .auth-panel p{color:#666;margin:8px 0 16px;}
        .google-btn{background:#fff;border:1px solid #ccc;border-radius:30px;padding:10px 24px;font-size:0.95rem;font-weight:600;color:#333;cursor:pointer;display:inline-flex;align-items:center;gap:10px;}
        .google-btn:hover{background:#f5f5f5;}

        /* Посты */
        .post{background:#fff;border:1px solid #ddd;border-radius:6px;padding:10px;margin-bottom:10px;}
        .post-author{color:#e67e22;font-weight:700;}
        .post-time{color:#999;font-size:0.6rem;margin-left:6px;}
        .post-text{color:#222;margin:4px 0;}
        .post-marquee{background:#f5f5f5;padding:3px 10px;border-radius:4px;color:#e67e22;font-weight:600;margin-bottom:4px;overflow:hidden;white-space:nowrap;}
        .post-marquee span{display:inline-block;animation:scroll 10s linear infinite;padding-left:100%;}
        @keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
        .post-btn{display:inline-block;background:#e67e22;color:#fff;padding:3px 12px;border-radius:30px;text-decoration:none;font-size:0.7rem;font-weight:600;margin:2px 2px 0 0;}
        .post-tag{color:#2980b9;font-size:0.6rem;background:#f0f0f0;padding:0 8px;border-radius:12px;border:1px solid #ddd;display:inline-block;margin:2px;}
        .post-actions{display:flex;gap:4px;margin-top:4px;}
        .post-actions button{background:#f0f0f0;border:1px solid #ddd;color:#555;padding:0 10px;border-radius:30px;font-size:0.55rem;cursor:pointer;}
        .post-actions button:hover{background:#e0e0e0;}
        .post-discuss{background:#f0f0f0;border:1px solid #ddd;color:#2980b9;padding:2px 12px;border-radius:30px;font-size:0.6rem;cursor:pointer;}
        .post-discuss:hover{background:#e0e0e0;}

        /* Форма поста */
        .post-form{background:#fafafa;border:1px solid #ddd;border-radius:6px;padding:10px;margin-bottom:10px;}
        .post-form input,.post-form textarea{width:100%;padding:6px 10px;background:#fff;border:1px solid #ddd;border-radius:4px;color:#222;font-size:0.85rem;margin-bottom:4px;font-family:inherit;}
        .post-form textarea{min-height:40px;resize:vertical;}
        .btn-row{display:flex;gap:4px;margin-bottom:4px;}
        .btn-row input{flex:1;margin-bottom:0;}
        .btn-row button{background:#f0f0f0;border:1px solid #ddd;color:#e74c3c;border-radius:4px;padding:0 8px;cursor:pointer;}
        .btn-add{background:transparent;border:1px solid #ddd;color:#e67e22;padding:2px 12px;border-radius:20px;cursor:pointer;font-size:0.7rem;}
        .form-actions{display:flex;gap:6px;margin-top:6px;}
        .form-actions button{padding:5px 16px;border-radius:30px;border:none;font-weight:600;cursor:pointer;}
        .form-submit{background:#e67e22;color:#fff;}
        .form-submit:hover{background:#d35400;}
        .form-cancel{background:#f0f0f0;color:#888;}
        .form-cancel:hover{background:#e0e0e0;}

        /* Комнаты */
        .room-item{display:flex;justify-content:space-between;padding:5px 10px;border-radius:4px;cursor:pointer;color:#555;border:1px solid transparent;}
        .room-item:hover{background:#f0f0f0;border-color:#ddd;color:#222;}
        .room-item.active{background:#f0f0f0;border-color:#e67e22;color:#222;font-weight:600;}
        .room-cnt{color:#999;font-size:0.6rem;}
        .create-room-btn{display:none;width:100%;background:#2980b9;border:none;color:#fff;padding:5px;border-radius:30px;margin-top:6px;cursor:pointer;font-weight:600;}
        .create-room-btn.show{display:block;}
        .create-room-btn:hover{background:#1a6d95;}

        /* Чат */
        .chat-panel{background:#fff;border:1px solid #ccc;border-radius:6px;height:50vh;display:flex;flex-direction:column;}
        .chat-messages{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px;}
        .chat-msg{background:#f8f8f8;border:1px solid #eee;border-radius:6px;padding:6px 8px;}
        .chat-author{color:#e67e22;font-weight:700;font-size:0.75rem;}
        .chat-time{color:#999;font-size:0.45rem;margin-left:4px;}
        .chat-text{color:#222;font-size:0.8rem;}
        .chat-actions{display:flex;gap:4px;margin-top:3px;}
        .chat-actions button{background:#f0f0f0;border:1px solid #ddd;color:#555;padding:0 8px;border-radius:30px;font-size:0.45rem;cursor:pointer;}
        .chat-actions button:hover{background:#e0e0e0;}
        .chat-edit-btn{background:#fef9e7!important;border-color:#f39c12!important;color:#d35400!important;}
        .chat-del-btn{background:#fdedec!important;border-color:#e74c3c!important;color:#c0392b!important;}

        .chat-input-wrap{padding:6px 8px;background:#fafafa;border-top:1px solid #ddd;border-radius:0 0 6px 6px;}
        .chat-input-row{display:flex;gap:4px;}
        .chat-input-row input{flex:1;padding:6px 12px;background:#fff;border:1px solid #ddd;border-radius:30px;color:#222;font-size:0.78rem;outline:none;}
        .chat-input-row input:focus{border-color:#e67e22;}
        .chat-input-row button{background:#e67e22;border:none;border-radius:30px;padding:0 14px;font-weight:700;color:#fff;cursor:pointer;}
        .chat-input-row button:hover{background:#d35400;}

        /* Админ-панель в чате */
        .chat-admin-bar{display:none;padding:6px 8px;background:#fafafa;border-top:1px solid #ddd;flex-direction:column;gap:4px;}
        .chat-admin-bar.show{display:flex;}
        .chat-admin-title{color:#e67e22;font-weight:700;font-size:0.65rem;display:flex;justify-content:space-between;}
        .chat-admin-title button{background:transparent;border:1px solid #ddd;color:#888;border-radius:20px;padding:0 8px;cursor:pointer;font-size:0.5rem;}
        .chat-admin-form{display:none;flex-direction:column;gap:4px;}
        .chat-admin-form.open{display:flex;}
        .chat-admin-form input,.chat-admin-form textarea{width:100%;padding:4px 8px;background:#fff;border:1px solid #ddd;border-radius:4px;color:#222;font-size:0.7rem;font-family:inherit;}
        .chat-admin-form textarea{min-height:28px;resize:vertical;}
        .chat-abtn-row{display:flex;gap:4px;}
        .chat-abtn-row input{flex:1;}
        .chat-aadd{background:transparent;border:1px solid #ddd;color:#e67e22;padding:0 10px;border-radius:20px;cursor:pointer;font-size:0.6rem;}
        .chat-apublish{background:#e67e22;border:none;border-radius:20px;padding:3px;font-weight:700;color:#fff;cursor:pointer;font-size:0.65rem;}

        /* Точки админа */
        .admin-dots{position:fixed;bottom:10px;right:10px;display:flex;gap:5px;z-index:999;}
        .admin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #ccc;cursor:pointer;background:#f0f0f0;}
        .admin-dot.active{background:#e67e22;border-color:#e67e22;}
        .admin-dot.room-dot.active{background:#e74c3c;border-color:#e74c3c;}

        /* Модалки */
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999;justify-content:center;align-items:center;padding:16px;}
        .modal.open{display:flex;}
        .modal-box{background:#fff;border:1px solid #ccc;border-radius:10px;padding:16px;max-width:400px;width:100%;}
        .modal-box h3{color:#222;}
        .modal-box input{width:100%;padding:6px 10px;background:#fff;border:1px solid #ddd;border-radius:4px;color:#222;font-size:0.9rem;margin:6px 0;}
        .modal-btns{display:flex;gap:6px;justify-content:flex-end;}
        .modal-btns button{padding:5px 14px;border-radius:30px;border:none;font-weight:600;cursor:pointer;}
        .btn-cancel{background:#f0f0f0;color:#888;}
        .btn-cancel:hover{background:#e0e0e0;}
        .btn-save{background:#e67e22;color:#fff;}
        .btn-save:hover{background:#d35400;}

        /* Редактирование */
        .edit-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999;justify-content:center;align-items:center;padding:12px;}
        .edit-overlay.open{display:flex;}
        .edit-box{background:#fff;border:1px solid #ccc;border-radius:10px;padding:12px;max-width:400px;width:100%;}
        .edit-box h2{color:#e67e22;font-size:0.85rem;}
        .edit-box input,.edit-box textarea{width:100%;padding:5px 8px;background:#fff;border:1px solid #ddd;border-radius:4px;color:#222;font-size:0.75rem;margin-bottom:3px;font-family:inherit;}
        .edit-box textarea{min-height:30px;resize:vertical;}
        .edit-btn-row{display:flex;gap:3px;margin-bottom:3px;}
        .edit-btn-row input{flex:1;margin-bottom:0;}
        .edit-action-row{display:flex;gap:4px;margin-top:4px;}
        .edit-save{background:#e67e22;color:#fff;border:none;border-radius:30px;padding:5px;font-weight:600;flex:1;cursor:pointer;}
        .edit-close{background:#f0f0f0;color:#888;border:none;border-radius:30px;padding:5px;font-weight:600;flex:1;cursor:pointer;}
        .edit-delete{background:#fdedec;color:#c0392b;border:1px solid #e74c3c;border-radius:30px;padding:5px;font-weight:600;width:100%;margin-top:4px;cursor:pointer;}
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">Deep<span>Chat</span></div>
    <div class="spacer"></div>
    <span class="user-btn" id="headerUser" onclick="openChangeName()">👤 Гость</span>
</div>

<!-- NAVIGATION -->
<div class="nav">
    <div class="nav-item active" id="navFeed" onclick="switchTab('feed')">📰 Лента</div>
    <div class="nav-item" id="navRooms" onclick="switchTab('rooms')">💬 Комнаты</div>
</div>

<!-- AUTH -->
<div id="authPanel" class="auth-panel">
    <h2>🚀 Добро пожаловать</h2>
    <p>Войдите через Google</p>
    <button class="google-btn" id="googleLoginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18" />
        Войти через Google
    </button>
</div>

<!-- CONTENT -->
<div id="appContent" class="hidden">

    <!-- FEED -->
    <div id="feedSection">
        <div class="card">
            <div class="card-title">📰 Лента</div>
            <div id="feedForm" class="post-form hidden">
                <div class="card-title" style="color:#e67e22;">✏️ Новый пост</div>
                <input type="text" id="fMarquee" placeholder="Бегущая строка">
                <textarea id="fText" placeholder="Текст поста..."></textarea>
                <input type="url" id="fLink" placeholder="Ссылка (iframe)">
                <input type="text" id="fHashtags" placeholder="#хештеги через пробел">
                <div style="color:#888;font-size:0.6rem;">Кнопки</div>
                <div id="fBtns"></div>
                <button class="btn-add" onclick="fAddBtn()">➕ Кнопку</button>
                <div class="form-actions">
                    <button class="form-submit" id="fSubmitBtn" onclick="fSubmit()">📤 Опубликовать</button>
                    <button class="form-cancel" onclick="fCancel()">✕ Отмена</button>
                </div>
            </div>
            <div id="feedPosts"></div>
        </div>
    </div>

    <!-- ROOMS LIST -->
    <div id="roomsSection" class="hidden">
        <div class="card">
            <div class="card-title">💬 Комнаты</div>
            <div id="roomList"><div style="color:#999;">Нет комнат</div></div>
            <button class="create-room-btn" id="createRoomBtn" onclick="openCreateRoom()">➕ Создать комнату</button>
        </div>
    </div>

    <!-- CHAT -->
    <div id="chatSection" class="hidden">
        <div class="card">
            <div class="card-title">💬 <span id="chatRoomLabel">Комната</span></div>
            <div class="chat-panel">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-admin-bar" id="chatAdminBar">
                    <div class="chat-admin-title">
                        ✏️ Опубликовать пост
                        <button onclick="toggleAdminForm()">▼ Открыть</button>
                    </div>
                    <div class="chat-admin-form" id="chatAdminForm">
                        <input type="text" id="apMarquee" placeholder="Бегущая строка">
                        <textarea id="apText" placeholder="Текст поста..."></textarea>
                        <input type="url" id="apLink" placeholder="Ссылка (iframe)">
                        <input type="text" id="apHashtags" placeholder="#хештеги">
                        <div style="color:#888;font-size:0.6rem;">Кнопки</div>
                        <div class="chat-abtns" id="apBtns"></div>
                        <button class="chat-aadd" onclick="apAddBtn()">➕ Кнопку</button>
                        <button class="chat-apublish" onclick="apPublish()">📤 Опубликовать</button>
                    </div>
                </div>
                <div class="chat-input-wrap">
                    <div class="chat-input-row">
                        <input type="text" id="chatInput" placeholder="Сообщение...">
                        <button onclick="chatSend()">→</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ADMIN DOTS -->
<div class="admin-dots">
    <div class="admin-dot" id="feedDot" onclick="openFeedLogin()" title="Админ ленты"></div>
    <div class="admin-dot room-dot" id="roomDot" onclick="openRoomLogin()" title="Админ комнат"></div>
</div>

<!-- MODALS -->
<div class="modal" id="feedLoginModal">
    <div class="modal-box">
        <h3>📰 Админ ленты</h3>
        <input type="password" id="feedPass" placeholder="Пароль">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal('feedLoginModal')">Отмена</button>
            <button class="btn-save" onclick="checkFeedPass()">Войти</button>
        </div>
    </div>
</div>

<div class="modal" id="roomLoginModal">
    <div class="modal-box">
        <h3>💬 Админ комнат</h3>
        <input type="password" id="roomPass" placeholder="Пароль">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal('roomLoginModal')">Отмена</button>
            <button class="btn-save" onclick="checkRoomPass()">Войти</button>
        </div>
    </div>
</div>

<div class="modal" id="createRoomModal">
    <div class="modal-box">
        <h3>📝 Новая комната</h3>
        <input type="text" id="roomNameInput" placeholder="Название">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal('createRoomModal')">Отмена</button>
            <button class="btn-save" onclick="doCreateRoom()">Создать</button>
        </div>
    </div>
</div>

<div class="modal" id="changeNameModal">
    <div class="modal-box">
        <h3>✏️ Сменить имя</h3>
        <input type="text" id="changeNameInput" placeholder="Новое имя" maxlength="24">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal('changeNameModal')">Отмена</button>
            <button class="btn-save" onclick="doChangeName()">Сохранить</button>
        </div>
    </div>
</div>

<!-- EDIT -->
<div class="edit-overlay" id="editOverlay">
    <div class="edit-box">
        <h2>✏️ Редактировать</h2>
        <input type="text" id="editMarquee" placeholder="Бегущая строка">
        <textarea id="editText" placeholder="Текст..."></textarea>
        <input type="url" id="editLink" placeholder="Ссылка (iframe)">
        <input type="text" id="editHashtags" placeholder="#хештеги">
        <div style="color:#888;font-size:0.6rem;">Кнопки</div>
        <div id="editBtns"></div>
        <button onclick="editAddBtn()" style="background:transparent;border:1px solid #ddd;color:#e67e22;padding:2px 10px;border-radius:20px;cursor:pointer;font-size:0.6rem;margin-bottom:4px;">➕ Кнопку</button>
        <div class="edit-action-row">
            <button class="edit-save" onclick="doSaveEdit()">💾 Сохранить</button>
            <button class="edit-close" onclick="closeEdit()">✕ Отмена</button>
        </div>
        <button class="edit-delete" onclick="doDeleteEdit()">🗑 Удалить</button>
    </div>
</div>

<script>
(function(){
// ===== FIREBASE =====
const FB_CONFIG = {
    apiKey: "AIzaSyDCx2wLK2EZJOrUNoXEdWDlYY0e8cOHhtY",
    authDomain: "myecosystem-e6414.firebaseapp.com",
    databaseURL: "https://myecosystem-e6414-default-rtdb.firebaseio.com",
    projectId: "myecosystem-e6414",
    storageBucket: "myecosystem-e6414.firebasestorage.app",
    messagingSenderId: "426302111033",
    appId: "1:426302111033:web:7b39e7026e94f528a13ce8"
};
firebase.initializeApp(FB_CONFIG);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const SITE = (window.location.hostname || 'local').replace(/\./g, '_');
let USER = null, USER_UID = null;
let IS_FEED_ADMIN = localStorage.getItem('dc_fa_'+SITE) === '1';
let IS_ROOM_ADMIN = localStorage.getItem('dc_ra_'+SITE) === '1';
let CUR_ROOM = '', FEED_EDIT_ID = null, CHAT_EDIT_ID = null, chatUnsub = null;

// ===== AUTH =====
document.getElementById('googleLoginBtn').addEventListener('click', () => {
    auth.signInWithPopup(provider).catch(e => alert('Ошибка: '+e.message));
});

auth.onAuthStateChanged(user => {
    const authPanel = document.getElementById('authPanel');
    const appContent = document.getElementById('appContent');
    const headerUser = document.getElementById('headerUser');

    if (user) {
        USER_UID = user.uid;
        let saved = localStorage.getItem('dc_u_'+SITE);
        USER = saved || user.displayName || user.email || user.uid.slice(0,8);
        if (!saved) localStorage.setItem('dc_u_'+SITE, USER);
        db.ref('sites/'+SITE+'/users/'+USER_UID).set({ name: USER, email: user.email });

        authPanel.style.display = 'none';
        appContent.classList.remove('hidden');
        headerUser.textContent = '👤 ' + USER;
        applyAdminUI();
        loadFeed();
        loadRooms();
        if (CUR_ROOM) loadChat(CUR_ROOM);
    } else {
        USER = null; USER_UID = null;
        authPanel.style.display = 'block';
        appContent.classList.add('hidden');
        headerUser.textContent = '👤 Гость';
        if (chatUnsub) { db.ref(chatUnsub).off('value'); chatUnsub = null; }
    }
});

// ===== ИМЯ =====
window.openChangeName = function() {
    if (!USER) { alert('Сначала войдите!'); return; }
    document.getElementById('changeNameInput').value = USER;
    document.getElementById('changeNameModal').classList.add('open');
};
window.doChangeName = function() {
    const n = document.getElementById('changeNameInput').value.trim();
    if (!n) return;
    USER = n.slice(0,24);
    localStorage.setItem('dc_u_'+SITE, USER);
    document.getElementById('headerUser').textContent = '👤 ' + USER;
    if (USER_UID) db.ref('sites/'+SITE+'/users/'+USER_UID).update({ name: USER });
    closeModal('changeNameModal');
};

// ===== АДМИН =====
function applyAdminUI() {
    const f = document.getElementById('feedForm');
    const fd = document.getElementById('feedDot');
    const rd = document.getElementById('roomDot');
    const cb = document.getElementById('createRoomBtn');
    const ab = document.getElementById('chatAdminBar');
    if (IS_FEED_ADMIN) { f.classList.remove('hidden'); fd.classList.add('active'); } else { f.classList.add('hidden'); fd.classList.remove('active'); }
    if (IS_ROOM_ADMIN) { rd.classList.add('active'); cb.classList.add('show'); ab.classList.add('show'); } else { rd.classList.remove('active'); cb.classList.remove('show'); ab.classList.remove('show'); }
}

window.openFeedLogin = function() {
    if (!USER) { alert('Войдите!'); return; }
    document.getElementById('feedLoginModal').classList.add('open');
};
window.openRoomLogin = function() {
    if (!USER) { alert('Войдите!'); return; }
    document.getElementById('roomLoginModal').classList.add('open');
};
window.checkFeedPass = function() {
    if (document.getElementById('feedPass').value.trim() === '12345') {
        IS_FEED_ADMIN = true; localStorage.setItem('dc_fa_'+SITE,'1');
        applyAdminUI(); closeModal('feedLoginModal'); loadFeed();
    } else alert('❌ Неверный пароль');
};
window.checkRoomPass = function() {
    if (document.getElementById('roomPass').value.trim() === '12345') {
        IS_ROOM_ADMIN = true; localStorage.setItem('dc_ra_'+SITE,'1');
        applyAdminUI(); closeModal('roomLoginModal');
    } else alert('❌ Неверный пароль');
};
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };

// ===== ТАБЫ =====
window.switchTab = function(tab) {
    document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
    if (tab === 'feed') {
        document.getElementById('navFeed').classList.add('active');
        document.getElementById('feedSection').style.display = 'block';
        document.getElementById('roomsSection').style.display = 'none';
        document.getElementById('chatSection').style.display = 'none';
    } else {
        document.getElementById('navRooms').classList.add('active');
        document.getElementById('feedSection').style.display = 'none';
        document.getElementById('roomsSection').style.display = 'block';
        document.getElementById('chatSection').style.display = 'none';
    }
};

// ===== УТИЛИТЫ =====
const esc = s => s ? String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) : '';
const now = () => new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

// ===== КОМНАТЫ =====
function loadRooms() {
    db.ref('sites/'+SITE+'/rooms').orderByChild('createdAt').on('value', snap => {
        const data = snap.val() || {};
        const keys = Object.keys(data).sort((a,b) => (data[a].createdAt||0) - (data[b].createdAt||0));
        const list = document.getElementById('roomList');
        if (!keys.length) { list.innerHTML = '<div style="color:#999;">Нет комнат</div>'; return; }
        list.innerHTML = keys.map(k => {
            const r = data[k];
            const ac = k === CUR_ROOM ? 'active' : '';
            return `<div class="room-item ${ac}" onclick="openRoom('${k}','${esc(r.name||'Комната')}')">
                <span># ${esc(r.name||'?')}</span>
                <span class="room-cnt">${r.count||0}</span>
            </div>`;
        }).join('');
    });
}

window.openRoom = function(roomId, roomName) {
    if (!USER) { alert('Войдите!'); return; }
    CUR_ROOM = roomId;
    document.getElementById('chatSection').classList.remove('hidden');
    document.getElementById('roomsSection').style.display = 'none';
    document.getElementById('feedSection').style.display = 'none';
    document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
    document.getElementById('navRooms').classList.add('active');
    document.getElementById('chatRoomLabel').textContent = roomName || 'Комната';
    loadChat(roomId);
};

window.openCreateRoom = function() {
    if (!IS_ROOM_ADMIN) { alert('⛔ Только админ'); return; }
    document.getElementById('createRoomModal').classList.add('open');
};
window.doCreateRoom = function() {
    const name = document.getElementById('roomNameInput').value.trim();
    if (!name || name.length < 2) { alert('Минимум 2 символа'); return; }
    db.ref('sites/'+SITE+'/rooms').push({ name, createdAt: Date.now(), count: 0 })
        .then(() => closeModal('createRoomModal'))
        .catch(e => alert('❌ '+e.message));
};

// ===== ЛЕНТА =====
function loadFeed() {
    db.ref('sites/'+SITE+'/feed_posts').orderByChild('timestamp').on('value', snap => {
        const c = document.getElementById('feedPosts');
        c.innerHTML = '';
        const data = snap.val() || {};
        const keys = Object.keys(data).sort((a,b) => (data[b].timestamp||0) - (data[a].timestamp||0));
        if (!keys.length) { c.innerHTML = '<div style="text-align:center;padding:30px;color:#999;">Пока пусто</div>'; return; }
        keys.forEach(k => { const p = data[k]; p.id = k; c.appendChild(renderPost(p)); });
    });
}

function renderPost(p) {
    const d = document.createElement('div'); d.className = 'post';
    const mq = p.marquee ? `<div class="post-marquee"><span>${esc(p.marquee)}</span></div>` : '';
    const fr = p.link ? `<iframe src="${esc(p.link)}" style="width:100%;height:180px;border:1px solid #ddd;border-radius:4px;margin:4px 0;"></iframe>` : '';
    let btns = '';
    if (p.buttons && p.buttons.length) btns = p.buttons.filter(b=>b.url).map(b => `<a href="${esc(b.url)}" target="_blank" class="post-btn">${esc(b.label||'🔗')}</a>`).join('');
    let tags = '';
    if (p.hashtags && p.hashtags.length) tags = p.hashtags.map(t => `<span class="post-tag">${esc(t)}</span>`).join(' ');
    let acts = '';
    if (IS_FEED_ADMIN) acts = `<div class="post-actions"><button onclick="feedOpenEdit('${p.id}')">✏️ Ред.</button><button onclick="feedDel('${p.id}')">🗑</button></div>`;
    d.innerHTML = `${mq}<div><span class="post-author">${esc(p.author||'Аноним')}</span><span class="post-time">${p.time||''}${p.edited?' (ред.)':''}</span></div>
        <div class="post-text">${esc(p.text||'')}</div>${btns}${fr}<div>${tags}</div>${acts}
        <button class="post-discuss" onclick="openRoom('post_${p.id}','${esc((p.text||'Пост').slice(0,28))}')">💬 Обсудить</button>`;
    return d;
}

window.fAddBtn = function(l='', u='') {
    const c = document.getElementById('fBtns');
    const d = document.createElement('div'); d.className = 'btn-row';
    d.innerHTML = `<input placeholder="Текст" value="${esc(l)}"><input placeholder="Ссылка" value="${esc(u)}"><button onclick="this.parentElement.remove()">✕</button>`;
    c.appendChild(d);
};
window.fSubmit = function() {
    if (!USER) { alert('Войдите!'); return; }
    const marquee = document.getElementById('fMarquee').value.trim();
    const text = document.getElementById('fText').value.trim();
    const link = document.getElementById('fLink').value.trim();
    const hr = document.getElementById('fHashtags').value.trim();
    const hashtags = hr ? hr.split(/\s+/).filter(t=>t.startsWith('#')).slice(0,5) : [];
    if (!text && !link) { alert('Введите текст или ссылку'); return; }
    const buttons = [];
    document.querySelectorAll('#fBtns .btn-row').forEach(g => {
        const [li, ui] = g.querySelectorAll('input');
        if (ui.value.trim()) buttons.push({label: li.value.trim()||'🔗', url: ui.value.trim()});
    });
    const post = { author: USER, text: text||'📝', time: now(), timestamp: Date.now(), marquee: marquee||null, link: link||null, buttons, hashtags, img: null, edited: false };
    const ref = db.ref('sites/'+SITE+'/feed_posts');
    if (FEED_EDIT_ID) ref.child(FEED_EDIT_ID).update({...post, edited: true, editedAt: Date.now()}).then(fCancel);
    else ref.push(post).then(fCancel);
};
window.fCancel = function() {
    ['fMarquee','fText','fLink','fHashtags'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fBtns').innerHTML = '';
    document.getElementById('fSubmitBtn').textContent = '📤 Опубликовать';
    FEED_EDIT_ID = null;
};
window.feedOpenEdit = function(id) {
    FEED_EDIT_ID = id;
    db.ref('sites/'+SITE+'/feed_posts/'+id).once('value', snap => {
        const p = snap.val(); if (!p) return;
        document.getElementById('fMarquee').value = p.marquee||'';
        document.getElementById('fText').value = p.text||'';
        document.getElementById('fLink').value = p.link||'';
        document.getElementById('fHashtags').value = (p.hashtags||[]).join(' ');
        document.getElementById('fBtns').innerHTML = '';
        (p.buttons||[]).forEach(b => fAddBtn(b.label, b.url));
        document.getElementById('fSubmitBtn').textContent = '💾 Обновить';
        document.getElementById('feedForm').classList.remove('hidden');
        document.getElementById('feedForm').scrollIntoView({behavior:'smooth'});
    });
};
window.feedDel = function(id) {
    if (!confirm('Удалить?')) return;
    db.ref('sites/'+SITE+'/feed_posts/'+id).remove();
};

// ===== ЧАТ =====
function chatPath(roomId) { return 'rooms/'+SITE+'_'+roomId+'/messages'; }

function loadChat(roomId) {
    if (chatUnsub) { db.ref(chatUnsub).off('value'); chatUnsub = null; }
    const box = document.getElementById('chatMessages');
    box.innerHTML = '<div style="color:#999;text-align:center;padding:20px;">⏳ Загрузка...</div>';
    const path = chatPath(roomId);
    chatUnsub = path;
    db.ref(path).orderByChild('timestamp').on('value', snap => {
        box.innerHTML = '';
        if (!snap.exists()) { box.innerHTML = '<div style="color:#999;text-align:center;padding:30px;">Сообщений нет 👋</div>'; return; }
        snap.forEach(s => { const m = s.val(); m.id = s.key; box.appendChild(renderChatMsg(m, roomId)); });
        box.scrollTop = box.scrollHeight;
    });
}

function renderChatMsg(m, roomId) {
    const d = document.createElement('div'); d.className = 'chat-msg';
    const isPost = m.isPost || m.marquee || (m.buttons && m.buttons.length);
    const mq = isPost && m.marquee ? `<div class="post-marquee"><span>${esc(m.marquee)}</span></div>` : '';
    const fr = isPost && m.link ? `<iframe src="${esc(m.link)}" style="width:100%;height:140px;border:1px solid #ddd;border-radius:4px;margin:3px 0;"></iframe>` : '';
    let btns = '';
    if (isPost && m.buttons && m.buttons.length) btns = m.buttons.filter(b=>b.url).map(b => `<a href="${esc(b.url)}" target="_blank" class="post-btn" style="font-size:0.65rem;padding:2px 10px;">${esc(b.label||'🔗')}</a>`).join('');
    let tags = '';
    if (isPost && m.hashtags && m.hashtags.length) tags = m.hashtags.map(t => `<span class="post-tag">${esc(t)}</span>`).join(' ');
    let acts = `<button onclick="chatLike('${m.id}','${roomId}')">👍 ${m.likes||0}</button>
                <button onclick="chatReply('${esc(m.nick)}')">💬</button>`;
    if ((m.nick === USER) || IS_ROOM_ADMIN) acts += `<button class="chat-edit-btn" onclick="openChatEdit('${m.id}','${roomId}')">✏️</button><button class="chat-del-btn" onclick="chatDel('${m.id}','${roomId}')">🗑</button>`;
    d.innerHTML = `${mq}<div><span class="chat-author">${esc(m.nick||'?')}</span><span class="chat-time">${m.time||''}${m.edited?' (ред.)':''}</span></div>
        <div class="chat-text">${esc(m.text||'')}</div>${btns}${fr}<div>${tags}</div><div class="chat-actions">${acts}</div>`;
    return d;
}

window.chatSend = function() {
    if (!CUR_ROOM || !USER) { alert('Выберите комнату'); return; }
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    db.ref(chatPath(CUR_ROOM)).push({ nick: USER, text, time: now(), timestamp: Date.now(), likes: 0, img: null, edited: false, isPost: false });
    input.value = '';
};
document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') chatSend(); });

window.chatLike = function(id, roomId) {
    if (!USER) return;
    const key = 'lk_'+id+'_'+USER_UID;
    if (localStorage.getItem(key)) return;
    db.ref(chatPath(roomId)+'/'+id+'/likes').transaction(v => (v||0)+1);
    localStorage.setItem(key, '1');
};
window.chatReply = function(nick) {
    document.getElementById('chatInput').value = '@'+nick+' ';
    document.getElementById('chatInput').focus();
};
window.chatDel = function(id, roomId) {
    if (!confirm('Удалить?')) return;
    db.ref(chatPath(roomId)+'/'+id).remove();
};

// Admin publish
window.toggleAdminForm = function() {
    const f = document.getElementById('chatAdminForm');
    const btn = document.querySelector('.chat-admin-title button');
    const open = f.classList.toggle('open');
    btn.textContent = open ? '▲ Закрыть' : '▼ Открыть';
};
window.apAddBtn = function(l='', u='') {
    const c = document.getElementById('apBtns');
    const d = document.createElement('div'); d.className = 'chat-abtn-row';
    d.innerHTML = `<input placeholder="Текст" value="${esc(l)}"><input placeholder="Ссылка" value="${esc(u)}"><button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:#e74c3c;cursor:pointer;">✕</button>`;
    c.appendChild(d);
};
window.apPublish = function() {
    if (!CUR_ROOM || !USER) { alert('Войдите'); return; }
    const marquee = document.getElementById('apMarquee').value.trim();
    const text = document.getElementById('apText').value.trim();
    const link = document.getElementById('apLink').value.trim();
    const hr = document.getElementById('apHashtags').value.trim();
    const hashtags = hr ? hr.split(/\s+/).filter(t=>t.startsWith('#')).slice(0,5) : [];
    if (!marquee && !text && !link) { alert('Заполните поле'); return; }
    const buttons = [];
    document.querySelectorAll('#apBtns .chat-abtn-row').forEach(g => {
        const [li, ui] = g.querySelectorAll('input');
        if (ui.value.trim()) buttons.push({label: li.value.trim()||'🔗', url: ui.value.trim()});
    });
    db.ref(chatPath(CUR_ROOM)).push({
        nick: USER, text: text || marquee || '📋', time: now(), timestamp: Date.now(),
        likes: 0, marquee: marquee||null, link: link||null, buttons, hashtags, img: null, isPost: true, edited: false
    }).then(() => {
        ['apMarquee','apText','apLink','apHashtags'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('apBtns').innerHTML = '';
        document.getElementById('chatAdminForm').classList.remove('open');
        document.querySelector('.chat-admin-title button').textContent = '▼ Открыть';
    });
};

// Edit modal
window.openChatEdit = function(msgId, roomId) {
    CHAT_EDIT_ID = { msgId, roomId };
    db.ref(chatPath(roomId)+'/'+msgId).once('value', snap => {
        const m = snap.val(); if (!m) return;
        document.getElementById('editMarquee').value = m.marquee||'';
        document.getElementById('editText').value = m.text||'';
        document.getElementById('editLink').value = m.link||'';
        document.getElementById('editHashtags').value = (m.hashtags||[]).join(' ');
        document.getElementById('editBtns').innerHTML = '';
        (m.buttons||[]).forEach(b => editAddBtn(b.label, b.url));
        document.getElementById('editOverlay').classList.add('open');
    });
};
window.closeEdit = function() { document.getElementById('editOverlay').classList.remove('open'); CHAT_EDIT_ID = null; };
window.editAddBtn = function(l='', u='') {
    const c = document.getElementById('editBtns');
    const d = document.createElement('div'); d.className = 'edit-btn-row';
    d.innerHTML = `<input placeholder="Текст" value="${esc(l)}"><input placeholder="Ссылка" value="${esc(u)}"><button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:#e74c3c;cursor:pointer;">✕</button>`;
    c.appendChild(d);
};
window.doSaveEdit = function() {
    if (!CHAT_EDIT_ID) return;
    const { msgId, roomId } = CHAT_EDIT_ID;
    const marquee = document.getElementById('editMarquee').value.trim();
    const text = document.getElementById('editText').value.trim();
    const link = document.getElementById('editLink').value.trim();
    const hr = document.getElementById('editHashtags').value.trim();
    const hashtags = hr ? hr.split(/\s+/).filter(t=>t.startsWith('#')).slice(0,5) : [];
    const buttons = [];
    document.querySelectorAll('#editBtns .edit-btn-row').forEach(g => {
        const [li, ui] = g.querySelectorAll('input');
        if (ui.value.trim()) buttons.push({label: li.value.trim()||'🔗', url: ui.value.trim()});
    });
    db.ref(chatPath(roomId)+'/'+msgId).update({
        marquee: marquee||null, text: text||'📝', link: link||null, hashtags, buttons,
        edited: true, editedAt: Date.now(), isPost: !!(marquee || link || buttons.length)
    }).then(closeEdit);
};
window.doDeleteEdit = function() {
    if (!CHAT_EDIT_ID || !confirm('Удалить?')) return;
    const { msgId, roomId } = CHAT_EDIT_ID;
    db.ref(chatPath(roomId)+'/'+msgId).remove();
    closeEdit();
};
