<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAIMPERIYA · Лента</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a12; color:#eee; font-family:system-ui; padding:12px; }
        .container { max-width:720px; margin:0 auto; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #222; }
        .header h1 { color:#ff8c00; cursor:pointer; }
        .chat-panel { background:#10101a; border-radius:20px; border:1px solid #262633; overflow:hidden; display:flex; flex-direction:column; height:80vh; margin-top:12px; }
        #messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:14px; }
        
        .post { background:#14141f; border-radius:16px; padding:14px 16px; border:1px solid #2a2a3a; }
        .post .marquee { background:#0f0f1a; padding:6px 0; overflow:hidden; white-space:nowrap; border-radius:8px; margin-bottom:8px; border:1px solid #222; }
        .post .marquee span { display:inline-block; animation:scroll 12s linear infinite; color:#ff8c00; font-weight:600; font-size:0.95rem; padding-left:20px; }
        @keyframes scroll { 0% { transform:translateX(100%); } 100% { transform:translateX(-100%); } }
        
        .post .name { color:#ffaa44; font-weight:700; }
        .post .time { color:#666; font-size:0.65rem; margin-left:10px; }
        .post .text { margin:6px 0; word-break:break-word; font-size:0.95rem; line-height:1.5; }
        .post .text .link-hidden { color:#555; font-size:0.8rem; }
        .post img { max-width:100%; max-height:300px; border-radius:12px; margin:6px 0; border:1px solid #333; cursor:pointer; }
        
        .post .link-preview { margin:8px 0 4px 0; border:1px solid #333; border-radius:12px; overflow:hidden; background:#0f0f1a; width:100%; }
        .post .link-preview iframe { width:100%; height:350px; border:none; display:block; }
        
        .post .buttons { display:flex; flex-direction:column; gap:6px; margin:8px 0; }
        .post .buttons .btn-item { display:block; background:#ff8c00; border:none; border-radius:12px; padding:12px 18px; text-align:center; text-decoration:none; color:#0b0b0f; font-weight:700; font-size:0.95rem; transition:0.2s; cursor:pointer; }
        .post .buttons .btn-item:hover { background:#ffa033; transform:scale(1.01); }
        
        .post .hashtags { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0 4px 0; padding-top:8px; border-top:1px solid #222; }
        .post .hashtags .tag { color:#66aaff; font-size:0.75rem; background:#0f0f1a; padding:2px 12px; border-radius:20px; border:1px solid #222; }
        
        .post .actions { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
        .post .actions button { background:#222233; border:1px solid #333349; color:#ccc; padding:2px 14px; border-radius:40px; font-size:0.7rem; cursor:pointer; }
        .post .actions button.edit-btn { background:#2a2a3a; border-color:#ff8c00; color:#ff8c00; }
        .post .actions button.del-btn { background:#4a1a1a; border-color:#6a1a1a; color:#ff6666; }
        
        .input-area { padding:12px 14px; background:#0e0e18; border-top:1px solid #262633; }
        .input-row { display:flex; gap:10px; }
        .input-row input { flex:1; padding:12px 18px; background:#181825; border:1px solid #323245; border-radius:60px; color:white; font-size:0.9rem; outline:none; }
        .input-row input:focus { border-color:#ff8c00; }
        .input-row button { background:#ff8c00; border:none; border-radius:60px; padding:0 24px; font-weight:700; color:#0b0b0f; cursor:pointer; }
        .file-label { background:#222235; padding:4px 16px; border-radius:40px; font-size:0.75rem; border:1px solid #3e3e55; cursor:pointer; display:inline-block; margin-top:6px; }
        .hidden { display:none; }
        .preview-box { display:none; align-items:center; gap:10px; background:#181825; padding:4px 14px 4px 4px; border-radius:40px; margin-top:6px; border:1px solid #3a3a50; }
        .preview-box.visible { display:flex; }
        .preview-box img { width:40px; height:40px; border-radius:30px; object-fit:cover; }
        .remove-pic { background:#6a1a1a; color:white; border:none; border-radius:30px; padding:2px 12px; cursor:pointer; }
        
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:999; justify-content:center; align-items:center; padding:20px; }
        .modal.active { display:flex; }
        .modal-content { background:#1a1a2a; border-radius:20px; padding:24px; max-width:560px; width:100%; border:1px solid #333; max-height:90vh; overflow-y:auto; }
        .modal-content h2 { color:#ff8c00; margin-bottom:12px; }
        .modal-content input, .modal-content textarea { width:100%; padding:12px; background:#0f0f1a; border:1px solid #333; border-radius:12px; color:white; margin-bottom:10px; font-size:0.9rem; }
        .modal-content textarea { min-height:60px; resize:vertical; }
        .modal-content .btn-primary { background:#ff8c00; color:#0b0b0f; border:none; padding:12px; border-radius:60px; font-weight:700; width:100%; cursor:pointer; }
        .modal-content .btn-danger { background:#6a1a1a; color:#ff8888; border:none; padding:8px; border-radius:40px; margin-top:8px; cursor:pointer; width:100%; }
        .modal-content .row { display:flex; gap:10px; }
        .modal-content .btn-group { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
        .modal-content .btn-group input { margin-bottom:0; }
        .modal-content .btn-group .btn-label-input { flex:2; }
        .modal-content .btn-group .btn-url-input { flex:3; }
        .modal-content .btn-group .btn-remove { background:#4a1a1a; color:#ff6666; border:none; border-radius:30px; padding:8px 12px; cursor:pointer; font-size:0.8rem; }
        
        #adminBtn { position:fixed; bottom:10px; right:10px; width:30px; height:30px; background:transparent; border:none; color:transparent; cursor:pointer; z-index:999; }
        #adminBtn:hover { background:rgba(255,140,0,0.1); border-radius:50%; border:1px solid rgba(255,140,0,0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 id="brandTitle">🌀 METAIMPERIYA</h1>
        <span style="font-size:0.7rem;color:#666;">📸 лента с фото</span>
    </div>

    <div class="chat-panel">
        <div id="messages"></div>
        <div class="input-area">
            <div class="input-row">
                <input type="text" id="msgInput" placeholder="Напиши пост или вставь ссылку...">
                <button onclick="sendMessage()">→</button>
            </div>
            <label class="file-label" for="fileInput">📎 фото</label>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
            <div id="previewBox" class="preview-box">
                <img id="previewImg">
                <span id="previewName" style="font-size:0.75rem;max-width:80px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;"></span>
                <button class="remove-pic" onclick="removeImage()">✕</button>
            </div>
        </div>
    </div>
</div>

<button id="adminBtn" onclick="adminLogin()">🔑</button>

<!-- МОДАЛКА РЕДАКТИРОВАНИЯ -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>✏️ Редактировать пост</h2>
        <input type="text" id="editMarquee" placeholder="Бегущая строка (заголовок)">
        <textarea id="editText" placeholder="Текст поста"></textarea>
        <input type="url" id="editLink" placeholder="Ссылка для превью (iframe)">
        <input type="text" id="editHashtags" placeholder="Хэштеги: #chat #smm #dating">
        
        <div style="margin:8px 0 4px 0;color:#888;font-size:0.8rem;">🔘 Кнопки (до 5 штук)</div>
        <div id="editButtonsContainer"></div>
        <button onclick="addButtonField()" style="background:#222;color:#ff8c00;border:1px solid #333;border-radius:30px;padding:6px 16px;cursor:pointer;font-size:0.8rem;margin-top:4px;">➕ Добавить кнопку</button>
        
        <div class="row" style="margin-top:12px;">
            <button class="btn-primary" onclick="saveEdit()">💾 Сохранить</button>
            <button class="btn-danger" onclick="closeEdit()">✕ Отмена</button>
        </div>
        <button class="btn-danger" onclick="deletePost()" style="margin-top:10px;">🗑 Удалить пост</button>
    </div>
</div>

<script>
// ================================================================
// FIREBASE (2 ПРОЕКТА)
// ================================================================

// 1. ОСНОВНОЙ ПРОЕКТ (база данных)
const MAIN_CONFIG = {
    apiKey: "AIzaSyC5L2GQ-2CYj-GNYsHENASdvKVF68rsEb0",
    databaseURL: "https://mychatapp-2c141-default-rtdb.firebaseio.com",
};
firebase.initializeApp(MAIN_CONFIG);
const db = firebase.database();

// 2. СТОРАДЖ (фото)
const STORAGE_CONFIG = {
    apiKey: "AIzaSyC5L2GQ-2CYj-GNYsHENASdvKVF68rsEb0",
    databaseURL: "https://mychatapp-2c141-default-rtdb.firebaseio.com",
    storageBucket: "mychatapp-2c141.appspot.com"
};
const storageApp = firebase.initializeApp(STORAGE_CONFIG, 'storage');
const storage = firebase.storage(storageApp);

// ================================================================
// СОСТОЯНИЕ
// ================================================================
let currentUser = localStorage.getItem('deepchat_user') || 'anon';
let pendingImage = null;
let pendingImageFile = null;
let roomId = 'room_001';
let editingId = null;

// ================================================================
// АДМИНКА
// ================================================================
function adminLogin() {
    const pwd = prompt('🔐 Введите пароль админа:');
    if (pwd === '12345') {
        localStorage.setItem('deepchat_admin', 'true');
        alert('✅ Админ-режим ВКЛЮЧЕН!');
        location.reload();
    } else {
        alert('❌ Неверный пароль');
    }
}
const isAdmin = localStorage.getItem('deepchat_admin') === 'true';

// ================================================================
// DOM
// ================================================================
const messagesDiv = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');

// ================================================================
// ПОДПИСКА
// ================================================================
const msgRef = db.ref(`rooms/${roomId}/messages`);
msgRef.orderByChild('timestamp').on('value', snap => {
    messagesDiv.innerHTML = '';
    snap.forEach(s => {
        const m = s.val();
        m.id = s.key;
        renderPost(m);
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

// ================================================================
// ОТРИСОВКА ПОСТА
// ================================================================
function renderPost(m) {
    const div = document.createElement('div');
    div.className = 'post';
    
    let marqueeHtml = m.marquee ? `<div class="marquee"><span>${escapeHtml(m.marquee)}</span></div>` : '';
    
    let textHtml = escapeHtml(m.text || '');
    const linkMatch = (m.text || '').match(/(https?:\/\/[^\s]+)/);
    if (linkMatch && m.link) {
        textHtml = textHtml.replace(linkMatch[1], `<span class="link-hidden">${linkMatch[1]}</span>`);
    }
    
    let imgHtml = m.img ? `<img src="${m.img}" onclick="window.open(this.src)">` : '';
    
    let buttonsHtml = '';
    if (m.buttons && m.buttons.length > 0) {
        buttonsHtml = '<div class="buttons">';
        m.buttons.forEach(btn => {
            if (btn.url) {
                buttonsHtml += `<a href="${escapeHtml(btn.url)}" target="_blank" class="btn-item">${escapeHtml(btn.label || '🔗 Перейти')}</a>`;
            }
        });
        buttonsHtml += '</div>';
    }
    
    let previewHtml = m.link ? `<div class="link-preview"><iframe src="${m.link}" sandbox="allow-scripts allow-same-origin allow-popups"></iframe></div>` : '';
    
    let hashtagsHtml = '';
    if (m.hashtags && m.hashtags.length > 0) {
        hashtagsHtml = '<div class="hashtags">';
        m.hashtags.forEach(tag => { hashtagsHtml += `<span class="tag">${escapeHtml(tag)}</span>`; });
        hashtagsHtml += '</div>';
    }
    
    let actionsHtml = `
        <button onclick="likeMsg('${m.id}')">👍 ${m.likes || 0}</button>
        <button onclick="replyMsg('${m.id}','${escapeHtml(m.nick)}')">💬 ответ</button>
    `;
    if (m.nick === currentUser) actionsHtml += `<button class="edit-btn" onclick="openEdit('${m.id}')">✏️ ред.</button>`;
    if (m.nick === currentUser || isAdmin) actionsHtml += `<button class="del-btn" onclick="deleteMsg('${m.id}')">🗑</button>`;
    
    div.innerHTML = `
        ${marqueeHtml}
        <div><span class="name">${escapeHtml(m.nick)}</span><span class="time">${m.time || ''}</span>${m.edited ? ' <span style="color:#666;font-size:0.6rem;">(ред.)</span>' : ''}</div>
        <div class="text">${textHtml}</div>
        ${imgHtml}
        ${buttonsHtml}
        ${previewHtml}
        ${hashtagsHtml}
        <div class="actions">${actionsHtml}</div>
    `;
    messagesDiv.appendChild(div);
}

// ================================================================
// ОТПРАВКА
// ================================================================
function sendMessage() {
    const text = msgInput.value.trim();
    if (!text && !pendingImageFile) return;
    
    // Если есть фото — загружаем в Storage
    if (pendingImageFile) {
        const file = pendingImageFile;
        const path = 'images/' + Date.now() + '_' + file.name;
        const ref = storage.ref(path);
        
        const uploadTask = ref.put(file);
        uploadTask.on('state_changed',
            function(snapshot) {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                document.getElementById('previewName').textContent = '⏳ ' + Math.round(progress) + '%';
            },
            function(error) {
                console.error('Ошибка загрузки фото:', error);
                alert('Ошибка загрузки фото: ' + error.message);
            },
            function() {
                ref.getDownloadURL().then(function(url) {
                    sendPostData(text, url);
                });
            }
        );
    } else {
        sendPostData(text, null);
    }
}

function sendPostData(text, imgUrl) {
    const data = {
        nick: currentUser,
        text: text || '📷',
        time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
        timestamp: Date.now(),
        likes: 0,
        img: imgUrl || null,
        link: null,
        marquee: null,
        buttons: [],
        hashtags: [],
        edited: false
    };
    
    const linkMatch = (text || '').match(/(https?:\/\/[^\s]+)/);
    if (linkMatch) data.link = linkMatch[1];
    
    msgRef.push(data);
    msgInput.value = '';
    pendingImage = null;
    pendingImageFile = null;
    document.getElementById('previewBox').classList.remove('visible');
}

// ================================================================
// ФОТО
// ================================================================
document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file && file.type.startsWith('image/')) {
        if (file.size > 5 * 1024 * 1024) {
            alert('Максимум 5 МБ');
            return;
        }
        pendingImageFile = file;
        const reader = new FileReader();
        reader.onload = ev => {
            pendingImage = ev.target.result;
            document.getElementById('previewImg').src = pendingImage;
            document.getElementById('previewName').textContent = file.name.slice(0, 18);
            document.getElementById('previewBox').classList.add('visible');
        };
        reader.readAsDataURL(file);
    }
});

function removeImage() {
    pendingImage = null;
    pendingImageFile = null;
    document.getElementById('previewBox').classList.remove('visible');
    document.getElementById('fileInput').value = '';
}

// ================================================================
// ОСТАЛЬНОЕ
// ================================================================
function deleteMsg(id) {
    if (!confirm('Удалить этот пост?')) return;
    db.ref(`rooms/${roomId}/messages/${id}`).remove();
}

function openEdit(id) {
    editingId = id;
    document.getElementById('editModal').classList.add('active');
    db.ref(`rooms/${roomId}/messages/${id}`).once('value', snap => {
        const m = snap.val();
        if (!m) return;
        document.getElementById('editMarquee').value = m.marquee || '';
        document.getElementById('editText').value = m.text || '';
        document.getElementById('editLink').value = m.link || '';
        document.getElementById('editHashtags').value = (m.hashtags || []).join(' ');
        document.getElementById('editButtonsContainer').innerHTML = '';
        (m.buttons || []).forEach(btn => addButtonField(btn.label, btn.url));
        if ((m.buttons || []).length === 0) addButtonField('', '');
    });
}

function addButtonField(label = '', url = '') {
    const container = document.getElementById('editButtonsContainer');
    const div = document.createElement('div');
    div.className = 'btn-group';
    div.innerHTML = `
        <input class="btn-label-input" placeholder="Текст" value="${escapeHtml(label)}">
        <input class="btn-url-input" placeholder="Ссылка" value="${escapeHtml(url)}">
        <button class="btn-remove" onclick="removeButtonField(this)">✕</button>
    `;
    container.appendChild(div);
}

function removeButtonField(btn) {
    const group = btn.parentElement;
    if (document.getElementById('editButtonsContainer').children.length > 1) {
        group.remove();
    } else {
        group.querySelector('.btn-label-input').value = '';
        group.querySelector('.btn-url-input').value = '';
    }
}

function saveEdit() {
    if (!editingId) return;
    const marquee = document.getElementById('editMarquee').value.trim();
    const text = document.getElementById('editText').value.trim();
    const link = document.getElementById('editLink').value.trim();
    const hashtagsRaw = document.getElementById('editHashtags').value.trim();
    const hashtags = hashtagsRaw ? hashtagsRaw.split(/\s+/).filter(t => t.startsWith('#')) : [];
    const buttons = [];
    document.querySelectorAll('#editButtonsContainer .btn-group').forEach(g => {
        const label = g.querySelector('.btn-label-input').value.trim();
        const url = g.querySelector('.btn-url-input').value.trim();
        if (url) buttons.push({ label: label || '🔗 Перейти', url });
    });
    const updates = { marquee: marquee || null, text: text || '📝', link: link || null, buttons, hashtags, edited: true, editedAt: Date.now() };
    db.ref(`rooms/${roomId}/messages/${editingId}`).update(updates);
    closeEdit();
}

function deletePost() {
    if (!editingId) return;
    if (confirm('Удалить пост навсегда?')) {
        db.ref(`rooms/${roomId}/messages/${editingId}`).remove();
        closeEdit();
    }
}

function closeEdit() {
    document.getElementById('editModal').classList.remove('active');
    editingId = null;
}

function likeMsg(id) {
    const key = `liked_${id}_${currentUser}`;
    if (localStorage.getItem(key)) return;
    db.ref(`rooms/${roomId}/messages/${id}/likes`).transaction(v => (v || 0) + 1);
    localStorage.setItem(key, 'true');
}

function replyMsg(id, nick) {
    msgInput.value = `@${nick} `;
    msgInput.focus();
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

// ================================================================
// НИК
// ================================================================
if (currentUser === 'anon') {
    const nick = prompt('Введите ваш ник:');
    if (nick) {
        currentUser = nick;
        localStorage.setItem('deepchat_user', nick);
    }
}
</script>
</body>
</html>
