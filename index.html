<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAIMPERIYA - Социальная сеть</title>
    <meta name="description" content="Социальная сеть нового поколения для общения и знакомств">
    <meta name="keywords" content="социальная сеть, общение, друзья, сообщества">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">🏠 METAIMPERIYA</a>
            <div class="header-right">
                <a href="/admin/" class="admin-link">⚙️ Админ</a>
                <div class="avatar-small" id="headerAvatar">?</div>
            </div>
        </div>
    </header>

    <!-- ===== NAV ===== -->
    <nav class="tab-bar">
        <a href="/" class="tab active">👥 Группы</a>
        <a href="/people.html" class="tab">👤 Люди</a>
    </nav>

    <!-- ===== CONTENT ===== -->
    <main class="container">
        <div class="card">
            <h3>👥 Группы</h3>
            <div class="group-grid">
                <a href="/group/general/" class="group-card">
                    <div class="icon">🌍</div>
                    <div class="name">Общий</div>
                    <div class="count">💬 0</div>
                </a>
                <a href="/group/sport/" class="group-card">
                    <div class="icon">⚽</div>
                    <div class="name">Спорт</div>
                    <div class="count">💬 0</div>
                </a>
                <a href="/group/games/" class="group-card">
                    <div class="icon">🎮</div>
                    <div class="name">Игры</div>
                    <div class="count">💬 0</div>
                </a>
                <a href="/group/music/" class="group-card">
                    <div class="icon">🎵</div>
                    <div class="name">Музыка</div>
                    <div class="count">💬 0</div>
                </a>
            </div>
        </div>

        <div class="card">
            <h3>👤 Пользователи</h3>
            <div class="user-list">
                <a href="/user/playerlikee/" class="user-item">
                    <div class="avatar">P</div>
                    <div class="info">
                        <div class="name">PLAYER Likee</div>
                        <div class="username">@playerlikee</div>
                    </div>
                </a>
                <a href="/user/jobsmoscowru/" class="user-item">
                    <div class="avatar">J</div>
                    <div class="info">
                        <div class="name">Jobs Moscow ru</div>
                        <div class="username">@jobsmoscowru</div>
                    </div>
                </a>
                <a href="/user/allrabotniki/" class="user-item">
                    <div class="avatar">В</div>
                    <div class="info">
                        <div class="name">Все Работники</div>
                        <div class="username">@allrabotniki</div>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <script src="/script.js"></script>
</body>
</html>
