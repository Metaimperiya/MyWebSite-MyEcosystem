<div id="player" style="background:#000; color:#0f0; border:2px solid #0f0; padding:20px; width:300px; border-radius:10px; font-family:monospace; text-align:center;">
    <h3 style="margin-top:0;">ONE IN BILLION</h3>
    <button id="btn" onclick="playMusic()" style="background:#0f0; border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">PLAY</button>
</div>

<script>
    // Ссылка на твой файл из репозитория
    const music = new Audio("https://raw.githubusercontent.com/Metaimperiya/MyWebSite-MyEcosystem/main/ONE-IN-BILLION.mp3");
    
    function playMusic() {
        if (music.paused) {
            music.play();
            document.getElementById('btn').innerText = "PAUSE";
        } else {
            music.pause();
            document.getElementById('btn').innerText = "PLAY";
        }
    }
</script>
