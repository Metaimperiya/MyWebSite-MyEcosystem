<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAIMPERIYA - Профили</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            background: #1877f2;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin: 5px 0;
        }
        
        .btn:hover { background: #4a9eff; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #219a52; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        
        .user-item:hover { background: #f5f5f5; }
        
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #1877f2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .name { font-weight: 600; }
        .status { color: #888; font-size: 14px; }
        
        .profile-header {
            text-align: center;
            padding: 20px;
        }
        
        .profile-header .avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            font-size: 40px;
            cursor: pointer;
        }
        
        .friends-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px 0;
        }
        
        .friend-tag {
            background: #e8f0fe;
            color: #1877f2;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .hidden { display: none; }
        
        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .tab.active {
            background: #1877f2;
            color: white;
            border-color: #1877f2;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        
        .modal.open { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            width: 90%;
        }
        
        .modal-content input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 8px 0;
        }
        
        .modal-content .btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .modal-content .btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .google-btn:hover { background: #f5f5f5; }
        .google-btn img { width: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h2>👥 METAIMPERIYA</h2>
    <div id="userInfo" style="margin-top:10px;font-size:14px;">
        <span id="userName">Не авторизован</span>
    </div>
</div>

<!-- Вкладки -->
<div class="tab-bar">
    <div class="tab active" onclick="showTab('people')">👤 Люди</div>
    <div class="tab" onclick="showTab('profile')">👤 Мой профиль</div>
    <div class="tab" onclick="showTab('friends')">🤝 Друзья</div>
</div>

<!-- Список людей -->
<div id="peopleTab">
    <div class="card">
        <h3>👤 Все пользователи</h3>
        <div id="peopleList"></div>
    </div>
</div>

<!-- Профиль -->
<div id="profileTab" class="hidden">
    <div class="card profile-header">
        <div class="avatar" id="profileAvatar" onclick="uploadAvatar()">
            <span>?</span>
        </div>
        <div class="name" id="profileName">Имя</div>
        <div class="status" id="profileBio">О себе</div>
        <button class="btn" onclick="editProfile()">✏️ Редактировать</button>
    </div>
</div>

<!-- Друзья -->
<div id="friendsTab" class="hidden">
    <div class="card">
        <h3>🤝 Мои друзья</h3>
        <div id="friendsList"></div>
    </div>
</div>

<!-- Модалка входа -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h3>👤 Вход</h3>
        <button class="google-btn" id="googleBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
            Войти через Google
        </button>
        <div style="text-align:center;margin:10px 0;">или</div>
        <input type="text" id="nameInput" placeholder="Введите имя">
        <div class="btns">
            <button class="btn-success" onclick="loginName()">Войти</button>
        </div>
    </div>
</div>

<!-- Модалка редактирования профиля -->
<div class="modal" id="editProfileModal">
    <div class="modal-content">
        <h3>✏️ Редактировать</h3>
        <input type="text" id="editName" placeholder="Имя">
        <input type="text" id="editBio" placeholder="О себе">
        <div class="btns">
            <button class="btn-danger" onclick="closeEditProfile()">Отмена</button>
            <button class="btn-success" onclick="saveProfile()">Сохранить</button>
        </div>
    </div>
</div>

<script>
// ================================================================
// FIREBASE
// ================================================================
const FB_CONFIG = {
    apiKey: "AIzaSyDCx2wLK2EZJOrUNoXEdWDlYY0e8cOHhtY",
    authDomain: "myecosystem-e6414.firebaseapp.com",
    databaseURL: "https://myecosystem-e6414-default-rtdb.firebaseio.com",
    projectId: "myecosystem-e6414",
    storageBucket: "myecosystem-e6414.firebasestorage.app",
    messagingSenderId: "426302111033",
    appId: "1:426302111033:web:7b39e7026e94f528a13ce8"
};

firebase.initializeApp(FB_CONFIG);
const db = firebase.database();
const auth = firebase.auth();
const storage = firebase.storage();
const provider = new firebase.auth.GoogleAuthProvider();

// ================================================================
// СОСТОЯНИЕ
// ================================================================
const SITE = (window.location.hostname || 'local').replace(/\./g, '_');
let USER = null;
let USER_UID = null;
let VIEWING_USER = null;

// ================================================================
// AUTH - ВХОД
// ================================================================
auth.onAuthStateChanged(user => {
    if (user) {
        USER_UID = user.uid;
        USER = user.displayName || user.email || user.uid.slice(0, 8);
        localStorage.setItem('dc_u_' + SITE, USER);
        
        // СОХРАНЯЕМ ЮЗЕРА
        const data = {
            name: USER,
            email: user.email || 'anon',
            uid: USER_UID,
            lastLogin: Date.now(),
            avatarUrl: user.photoURL || null
        };
        
        db.ref('sites/' + SITE + '/users/' + USER_UID).update(data);
        db.ref('sites/' + SITE + '/all_users/' + USER_UID).set(data);
        
        document.getElementById('userName').textContent = '👋 ' + USER;
        document.getElementById('loginModal').classList.remove('open');
        
        loadPeople();
        loadProfile();
        loadFriends();
        
    } else {
        USER = null;
        USER_UID = null;
        document.getElementById('loginModal').classList.add('open');
        document.getElementById('userName').textContent = '❌ Не авторизован';
    }
});

// Вход через Google
document.getElementById('googleBtn').addEventListener('click', () => {
    auth.signInWithPopup(provider).catch(err => {
        if (err.code === 'auth/popup-blocked') {
            auth.signInWithRedirect(provider);
        } else {
            alert('Ошибка: ' + err.message);
        }
    });
});

// Анонимный вход
window.loginName = function() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) { alert('Введите имя'); return; }
    
    auth.signInAnonymously().then(() => {
        USER = name;
        localStorage.setItem('dc_u_' + SITE, USER);
        
        const data = {
            name: USER,
            email: 'anon_' + Date.now() + '@anon.com',
            uid: USER_UID,
            lastLogin: Date.now()
        };
        
        db.ref('sites/' + SITE + '/users/' + USER_UID).update(data);
        db.ref('sites/' + SITE + '/all_users/' + USER_UID).set(data);
        
        document.getElementById('userName').textContent = '👋 ' + USER;
        document.getElementById('loginModal').classList.remove('open');
        
        loadPeople();
        loadProfile();
        loadFriends();
    }).catch(e => alert('Ошибка: ' + e.message));
};

// ================================================================
// ЗАГРУЗКА ЛЮДЕЙ
// ================================================================
function loadPeople() {
    if (!USER_UID) return;
    
    db.ref('sites/' + SITE + '/all_users').once('value', snap => {
        const users = snap.val() || {};
        const keys = Object.keys(users).filter(k => k !== USER_UID);
        const el = document.getElementById('peopleList');
        
        if (keys.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:20px;color:#888;">Нет пользователей</div>';
            return;
        }
        
        let html = '';
        keys.forEach(k => {
            const u = users[k];
            const name = u.name || 'Аноним';
            const letter = name.charAt(0).toUpperCase();
            const avatarHtml = u.avatarUrl ? 
                `<img src="${u.avatarUrl}">` : 
                `<span>${letter}</span>`;
            
            html += `
                <div class="user-item" onclick="viewUser('${k}')">
                    <div class="avatar">${avatarHtml}</div>
                    <div>
                        <div class="name">${name}</div>
                        <div class="status">Нажми для просмотра</div>
                    </div>
                </div>
            `;
        });
        el.innerHTML = html;
    });
}

// ================================================================
// ЗАГРУЗКА ПРОФИЛЯ
// ================================================================
function loadProfile() {
    const uid = VIEWING_USER || USER_UID;
    if (!uid) return;
    
    db.ref('sites/' + SITE + '/users/' + uid).once('value', snap => {
        const u = snap.val() || {};
        const name = u.name || 'Гость';
        const bio = u.bio || 'Привет!';
        const avatar = document.getElementById('profileAvatar');
        
        document.getElementById('profileName').textContent = name;
        document.getElementById('profileBio').textContent = bio;
        
        if (u.avatarUrl) {
            avatar.innerHTML = `<img src="${u.avatarUrl}">`;
        } else {
            avatar.innerHTML = `<span>${name.charAt(0).toUpperCase()}</span>`;
        }
    });
}

// ================================================================
// ЗАГРУЗКА ДРУЗЕЙ
// ================================================================
function loadFriends() {
    if (!USER_UID) return;
    
    db.ref('sites/' + SITE + '/friends/' + USER_UID).on('value', snap => {
        const data = snap.val() || {};
        const keys = Object.keys(data);
        const el = document.getElementById('friendsList');
        
        if (keys.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:20px;color:#888;">Нет друзей</div>';
            return;
        }
        
        let html = '<div class="friends-list">';
        keys.forEach(k => {
            db.ref('sites/' + SITE + '/users/' + k).once('value', usnap => {
                const u = usnap.val() || {};
                const name = u.name || 'Аноним';
                html += `<span class="friend-tag" onclick="viewUser('${k}')">${name}</span>`;
                document.querySelector('#friendsList .friends-list').innerHTML = html + '</div>';
            });
        });
    });
}

// ================================================================
// ДОБАВЛЕНИЕ В ДРУЗЬЯ
// ================================================================
function addFriend(uid) {
    if (!USER_UID || uid === USER_UID) return;
    
    db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + uid).set(true);
    db.ref('sites/' + SITE + '/friends/' + uid + '/' + USER_UID).set(true);
    
    alert('✅ Пользователь добавлен в друзья!');
    loadFriends();
}

function removeFriend(uid) {
    if (!confirm('Удалить из друзей?')) return;
    
    db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + uid).remove();
    db.ref('sites/' + SITE + '/friends/' + uid + '/' + USER_UID).remove();
    
    alert('❌ Пользователь удален из друзей');
    loadFriends();
}

// ================================================================
// ПРОСМОТР ПОЛЬЗОВАТЕЛЯ
// ================================================================
window.viewUser = function(uid) {
    if (uid === USER_UID) {
        VIEWING_USER = null;
        showTab('profile');
        loadProfile();
        return;
    }
    
    VIEWING_USER = uid;
    showTab('profile');
    loadProfile();
    
    // Проверяем, есть ли в друзьях
    db.ref('sites/' + SITE + '/friends/' + USER_UID + '/' + uid).once('value', snap => {
        const isFriend = snap.val() === true;
        const actions = document.getElementById('profileActions');
        if (actions) {
            actions.innerHTML = isFriend ?
                `<button class="btn btn-danger" onclick="removeFriend('${uid}')">❌ Удалить из друзей</button>` :
                `<button class="btn btn-success" onclick="addFriend('${uid}')">➕ Добавить в друзья</button>`;
        }
    });
};

// ================================================================
// ЗАГРУЗКА АВАТАРКИ
// ================================================================
window.uploadAvatar = function() {
    if (!USER_UID) { alert('Войдите!'); return; }
    
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { alert('Максимум 5 МБ'); return; }
        
        const ref = storage.ref('avatars/' + USER_UID + '/' + Date.now() + '_' + file.name);
        ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
            db.ref('sites/' + SITE + '/users/' + USER_UID + '/avatarUrl').set(url);
            db.ref('sites/' + SITE + '/all_users/' + USER_UID + '/avatarUrl').set(url);
            loadProfile();
            loadPeople();
            alert('✅ Аватарка обновлена!');
        });
    };
    input.click();
};

// ================================================================
// РЕДАКТИРОВАНИЕ ПРОФИЛЯ
// ================================================================
window.editProfile = function() {
    document.getElementById('editProfileModal').classList.add('open');
    document.getElementById('editName').value = USER || '';
    document.getElementById('editBio').value = '';
};

window.closeEditProfile = function() {
    document.getElementById('editProfileModal').classList.remove('open');
};

window.saveProfile = function() {
    const name = document.getElementById('editName').value.trim();
    const bio = document.getElementById('editBio').value.trim();
    if (!name) { alert('Введите имя'); return; }
    
    USER = name;
    localStorage.setItem('dc_u_' + SITE, USER);
    
    const updates = { name: USER, bio: bio };
    db.ref('sites/' + SITE + '/users/' + USER_UID).update(updates);
    db.ref('sites/' + SITE + '/all_users/' + USER_UID).update(updates);
    
    document.getElementById('userName').textContent = '👋 ' + USER;
    closeEditProfile();
    loadProfile();
    loadPeople();
};

// ================================================================
// ВКЛАДКИ
// ================================================================
window.showTab = function(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-bar .tab').forEach(t => {
        if (t.textContent.includes(tab === 'people' ? 'Люди' : tab === 'profile' ? 'Мой профиль' : 'Друзья')) {
            t.classList.add('active');
        }
    });
    
    document.getElementById('peopleTab').classList.toggle('hidden', tab !== 'people');
    document.getElementById('profileTab').classList.toggle('hidden', tab !== 'profile');
    document.getElementById('friendsTab').classList.toggle('hidden', tab !== 'friends');
    
    if (tab === 'people') loadPeople();
    if (tab === 'profile') loadProfile();
    if (tab === 'friends') loadFriends();
};

// ================================================================
// ЗАПУСК
// ================================================================
document.getElementById('profileTab').innerHTML += `
    <div class="card" id="profileActions">
        <button class="btn" onclick="editProfile()">✏️ Редактировать профиль</button>
        <button class="btn" onclick="uploadAvatar()">📷 Загрузить аватарку</button>
    </div>
`;

// Показываем людей по умолчанию
showTab('people');

console.log('✅ METAIMPERIYA - Профили и люди работают!');
console.log('👥 Все пользователи сохраняются в all_users');
console.log('🤝 Друзья работают через Firebase');
</script>

</body>
</html>
