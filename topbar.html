<!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
<header class="topbar" id="topbar">
    <div class="left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <span class="logo" onclick="goToFeed()">
            METAIMPERIYA 🏴‍☠️
        </span>
    </div>
    <div class="center"></div>
    <div class="right">
        <button class="chat-btn" onclick="openChatList()" title="Сообщения">💬 <span id="chatBadge"></span></button>
        <button class="notif-btn" onclick="openNotifications()">🔔 <span id="notifBadge"></span></button>
        <!-- ===== ИСПРАВЛЕНО: ОТКРЫВАЕТ /player-likee ===== -->
        <div class="avatar-wrap" id="topAvatar" onclick="window.location.href='/player-likee'"><span class="letter">?</span></div>
        <span class="username" id="topName" onclick="window.location.href='/player-likee'" style="color:#1877f2;font-weight:600;cursor:pointer;">Гость</span>
        <button class="menu-dots" onclick="toggleSettingsMenu()">⋮</button>
    </div>
</header>
