<!-- ===== ВЕРХНЯЯ ПАНЕЛЬ ===== -->
<header class="topbar" id="topbar">
    <div class="left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <span class="logo" onclick="goToFeed()">
            METAIMPERIYA 🏴‍☠️
        </span>
    </div>
    <div class="center"></div>
    <div class="right">
        <button class="chat-btn" onclick="openChatList()" title="Сообщения">💬 <span id="chatBadge" class="badge"></span></button>
        <button class="notif-btn" onclick="openNotifications()" title="Уведомления">🔔 <span id="notifBadge" class="badge"></span></button>
        <div class="avatar-wrap" id="topAvatar" onclick="window.location.href='/player-likee'">
            <span class="letter" id="topAvatarLetter">?</span>
        </div>
        <span class="username" id="topName" onclick="window.location.href='/player-likee'">Гость</span>
        <span id="adminDot" class="admin-dot" style="display:none;"></span>
        <button class="menu-dots" onclick="toggleSettingsMenu()">⋮</button>
        
        <!-- ВЫПАДАЮЩЕЕ МЕНЮ -->
        <div id="settingsMenu" class="settings-dropdown">
            <div class="settings-item" onclick="toggleTheme()">🌓 Тема</div>
            <div class="settings-item" onclick="toggleLanguage()" id="langDisplay">Русский</div>
            <div class="settings-divider"></div>
            <div class="settings-item" onclick="openAdminChats()" id="adminChatsMenuItem" style="display:none;">👑 Админ-чаты</div>
            <div class="settings-item danger" onclick="logoutUser()">🚪 Выйти</div>
        </div>
    </div>
</header>

<!-- ===== СКРИПТ ДЛЯ ПРИНУДИТЕЛЬНОГО ОБНОВЛЕНИЯ ШАПКИ ===== -->
<script>
(function() {
    console.log('🔥 ТОПБАР ЗАГРУЖЕН - ОБНОВЛЯЕМ ИМЯ');
    
    function updateTopbar() {
        // Берем имя из localStorage или из глобальной переменной
        var name = localStorage.getItem('dc_u_default') || 
                   localStorage.getItem('dc_u_') || 
                   window.USER || 
                   null;
        
        var uid = localStorage.getItem('dc_uid_default') || 
                  localStorage.getItem('dc_uid_') || 
                  window.USER_UID || 
                  null;
        
        console.log('📦 Найдено имя:', name, 'UID:', uid);
        
        // Обновляем имя в шапке
        var topName = document.getElementById('topName');
        if (topName) {
            if (name) {
                topName.textContent = name;
                console.log('✅ Имя установлено:', name);
            } else {
                topName.textContent = 'Гость';
                console.log('✅ Имя: Гость');
            }
        }
        
        // Обновляем аватар
        var topAvatar = document.getElementById('topAvatar');
        var topAvatarLetter = document.getElementById('topAvatarLetter');
        if (topAvatar && topAvatarLetter) {
            if (name) {
                var letter = name.charAt(0).toUpperCase();
                topAvatarLetter.textContent = letter;
                console.log('✅ Буква аватара:', letter);
            } else {
                topAvatarLetter.textContent = '?';
            }
        }
        
        // Обновляем админ-точку
        var adminDot = document.getElementById('adminDot');
        if (adminDot) {
            var isAdmin = localStorage.getItem('dc_admin_default') === 'true' || 
                         localStorage.getItem('dc_admin_') === 'true' ||
                         window.isAdmin === true;
            
            if (isAdmin) {
                adminDot.classList.add('active');
                adminDot.style.display = 'inline-block';
            } else {
                adminDot.classList.remove('active');
                adminDot.style.display = 'none';
            }
        }
    }
    
    // Запускаем обновление много раз с задержками
    setTimeout(updateTopbar, 50);
    setTimeout(updateTopbar, 200);
    setTimeout(updateTopbar, 500);
    setTimeout(updateTopbar, 1000);
    setTimeout(updateTopbar, 2000);
    
    // Каждые 2 секунды проверяем - если "Гость" - меняем
    setInterval(function() {
        var topName = document.getElementById('topName');
        var name = localStorage.getItem('dc_u_default') || 
                   localStorage.getItem('dc_u_') || 
                   window.USER || 
                   null;
        
        if (topName && name && topName.textContent === 'Гость') {
            console.log('🔄 Обнаружен Гость, меняем на:', name);
            topName.textContent = name;
            
            var topAvatarLetter = document.getElementById('topAvatarLetter');
            if (topAvatarLetter) {
                topAvatarLetter.textContent = name.charAt(0).toUpperCase();
            }
        }
    }, 2000);
    
    console.log('✅ Топбар инициализирован');
})();
</script>
