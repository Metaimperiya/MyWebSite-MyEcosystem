<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | METAIMPERIYA</title>
    <meta name="description" content="Профиль пользователя в METAIMPERIYA.">
    <meta property="og:title" content="Профиль | METAIMPERIYA">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dark-theme.css">
    
    <style>
        .profile-page {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 16px;
        }
        .profile-page .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .profile-page .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 3px solid var(--link-color);
        }
        .profile-page .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-page .profile-avatar .letter {
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .profile-page .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }
        .profile-page .profile-bio {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 4px 0 0 0;
        }
        .profile-page .profile-stats {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        .profile-page .profile-stats span {
            cursor: pointer;
            color: var(--link-color);
        }
        .feed-container {
            max-width: 800px;
            margin: 20px auto;
        }
        .feed-container .feed-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        @media (max-width: 600px) {
            .profile-page .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .profile-page .profile-stats {
                justify-content: center;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="topbarContainer"></div>
        <div id="sidebarContainer"></div>
        <div id="settingsContainer"></div>

        <main>
            <div class="profile-page" id="userProfile">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar"><span class="letter">?</span></div>
                    <div>
                        <h1 class="profile-name" id="profileName">Загрузка...</h1>
                        <p class="profile-bio" id="profileBio">Привет!</p>
                    </div>
                </div>
                <div class="profile-stats">
                    <span id="friendsCount">👥 0</span>
                    <span id="subscribersCount">👀 0</span>
                    <span id="subscriptionsCount">📌 0</span>
                </div>
            </div>
            <div class="feed-container">
                <h2 class="feed-title">🌐 Лента</h2>
                <div id="feed"><div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div></div>
            </div>
        </main>

        <div id="playerContainer"></div>
        <div id="modalsContainer"></div>
    </div>

    <!-- ===== ВСЕ СКРИПТЫ ===== -->
    <script src="/js/firebase.js"></script>
    <script src="/js/lang.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/player.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/feed.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/friends.js"></script>
    <script src="/js/groups.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/admin.js"></script>
    <script src="/js/page.js"></script>
    <script src="/js/load-components.js"></script>

    <script>
        function getProfileIdentifier() {
            var path = window.location.pathname.replace(/^\/|\/$/g, '');
            var segments = path.split('/');
            
            if (segments[0] === 'user' && segments[1]) {
                return { type: 'uid', value: segments[1] };
            }
            
            if (segments[0] && segments[0] !== 'index.html') {
                return { type: 'slug', value: segments[0] };
            }
            
            return null;
        }
        
        var CURRENT_UID = null;
        
        function initProfilePage() {
            var ident = getProfileIdentifier();
            console.log('🔵 Определен идентификатор:', ident);
            
            if (!ident) {
                document.getElementById('profileName').textContent = 'Ошибка';
                document.getElementById('profileBio').textContent = 'Профиль не указан';
                return;
            }
            
            if (ident.type === 'uid') {
                loadProfileDataByUid(ident.value);
            } else if (ident.type === 'slug') {
                db.ref('sites/' + SITE + '/users').orderByChild('slug').equalTo(ident.value).once('value', function(snap) {
                    var users = snap.val() || {};
                    var keys = Object.keys(users);
                    if (keys.length > 0) {
                        var uid = keys[0];
                        loadProfileDataByUid(uid);
                    } else {
                        console.error('❌ Пользователь с slug ' + ident.value + ' не найден');
                        document.getElementById('profileName').textContent = 'Не найден';
                        document.getElementById('profileBio').textContent = 'Пользователь не существует';
                    }
                });
            }
        }
        
        function loadProfileDataByUid(uid) {
            CURRENT_UID = uid;
            console.log('🔵 Загружаем данные для UID:', uid);
            
            db.ref('sites/' + SITE + '/users/' + uid).once('value', function(snap) {
                var userData = snap.val() || {};
                if (!userData.name) {
                    document.getElementById('profileName').textContent = 'Не найден';
                    document.getElementById('profileBio').textContent = 'Пользователь не существует';
                    return;
                }
                
                document.title = userData.name + ' | METAIMPERIYA';
                document.getElementById('profileName').textContent = userData.name || 'Пользователь';
                document.getElementById('profileBio').textContent = userData.bio || 'Привет!';
                
                var avatar = document.getElementById('profileAvatar');
                renderAvatar(uid, avatar, (userData.name || '?').charAt(0).toUpperCase());
                
                loadStats();
                loadFeed();
            });
        }
        
        function loadStats() {
            db.ref('sites/' + SITE + '/friends/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                var count = Object.keys(data).filter(function(k) { return data[k] === true; }).length;
                document.getElementById('friendsCount').textContent = '👥 ' + count;
            });
            db.ref('sites/' + SITE + '/subscribers/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                document.getElementById('subscribersCount').textContent = '👀 ' + Object.keys(data).length;
            });
            db.ref('sites/' + SITE + '/subscriptions/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                document.getElementById('subscriptionsCount').textContent = '📌 ' + Object.keys(data).length;
            });
        }
        
        function loadFeed() {
            var container = document.getElementById('feed');
            if (!container || !CURRENT_UID) return;
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div>';
            db.ref('sites/' + SITE + '/user_posts/' + CURRENT_UID).orderByChild('timestamp').on('value', function(snap) {
                container.innerHTML = '';
                var data = snap.val() || {};
                var keys = Object.keys(data).sort(function(a, b) {
                    return (data[b].timestamp || 0) - (data[a].timestamp || 0);
                });
                if (!keys.length) {
                    container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">📝 Нет постов</div>';
                    return;
                }
                keys.forEach(function(k) {
                    var post = data[k];
                    post.id = k;
                    var postEl = renderPost(post, 'feed');
                    if (postEl) container.appendChild(postEl);
                });
            });
        }
        
        window.goToUserPage = function() {
            if (!USER_UID) {
                var loginModal = document.getElementById('loginModal');
                if (loginModal) loginModal.classList.add('open');
                return;
            }
            db.ref('sites/' + SITE + '/users/' + USER_UID + '/slug').once('value', function(snap) {
                var slug = snap.val();
                if (slug) {
                    window.location.href = '/' + slug + '/';
                } else {
                    window.location.href = '/user/' + USER_UID + '/';
                }
            });
        };

        // ===== ЗАГРУЗКА КОМПОНЕНТОВ =====
        (function() {
            const components = [
                { id: 'topbarContainer', url: '/topbar.html' },
                { id: 'settingsContainer', url: '/settings.html' },
                { id: 'sidebarContainer', url: '/sidebar.html' },
                { id: 'modalsContainer', url: '/modals.html' },
                { id: 'playerContainer', url: '/player.html' }
            ];

            let loaded = 0;
            const total = components.length;

            components.forEach(function(comp) {
                const container = document.getElementById(comp.id);
                if (!container) return;

                fetch(comp.url)
                    .then(response => {
                        if (!response.ok) throw new Error('Не удалось загрузить ' + comp.url);
                        return response.text();
                    })
                    .then(html => {
                        container.innerHTML = html;
                        loaded++;
                        if (loaded === total) {
                            console.log('✅ Все компоненты загружены!');
                            setTimeout(function() {
                                if (typeof translatePage === 'function') translatePage();
                                if (typeof updateUI === 'function') updateUI();
                                if (typeof loadNotifications === 'function') loadNotifications();
                                if (typeof updateNotifBadge === 'function') updateNotifBadge();
                                if (typeof initAudio === 'function') initAudio();
                                initProfilePage();
                            }, 500);
                        }
                    })
                    .catch(err => {
                        console.warn('❌ Ошибка загрузки ' + comp.url + ':', err);
                        container.innerHTML = `<div style="display:none;"></div>`;
                        loaded++;
                        if (loaded === total) {
                            console.log('✅ Все компоненты загружены (с ошибками)');
                            setTimeout(function() {
                                if (typeof translatePage === 'function') translatePage();
                                if (typeof updateUI === 'function') updateUI();
                                if (typeof loadNotifications === 'function') loadNotifications();
                                if (typeof updateNotifBadge === 'function') updateNotifBadge();
                                if (typeof initAudio === 'function') initAudio();
                                initProfilePage();
                            }, 500);
                        }
                    });
            });
        })();
    </script>
</body>
</html>
