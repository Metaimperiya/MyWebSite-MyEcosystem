<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs Moscow | METAIMPERIYA</title>
    <meta name="description" content="Jobs Moscow — вакансии и работа в Москве.">
    <meta property="og:title" content="Jobs Moscow | METAIMPERIYA">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/dark-theme.css">
    
    <style>
        .jobs-header {
            background: linear-gradient(135deg, #0c2340, #1a4a7a, #2a6bb0);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #00d4ff;
        }
        .jobs-header .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 12px;
            border: 3px solid #00d4ff;
        }
        .jobs-header .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .jobs-header .profile-avatar .letter {
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #1a4a7a;
            color: #00d4ff;
        }
        .jobs-header h1 {
            font-size: 32px;
            margin: 0;
        }
        .jobs-header p {
            font-size: 18px;
            opacity: 0.8;
            margin: 4px 0 0 0;
        }
        .jobs-header .jobs-badge {
            display: inline-block;
            background: #00d4ff;
            color: #0c2340;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
        }
        .jobs-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 12px 0;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }
        .jobs-stats span {
            cursor: pointer;
            color: var(--link-color);
            font-size: 14px;
        }
        .jobs-stats span:hover {
            text-decoration: underline;
        }
        .jobs-content {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .jobs-card {
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #00d4ff;
        }
        .jobs-card h3 {
            margin: 0 0 4px 0;
            color: var(--text-primary);
        }
        .jobs-card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .jobs-card a {
            color: var(--link-color);
            text-decoration: none;
        }
        .jobs-card a:hover {
            text-decoration: underline;
        }
        .feed-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .feed-container .feed-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .post-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        @media (max-width: 600px) {
            .jobs-header h1 { font-size: 24px; }
            .jobs-stats { gap: 16px; flex-wrap: wrap; }
            .jobs-stats span { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="topbarContainer"></div>
        <div id="sidebarContainer"></div>
        <div id="settingsContainer"></div>

        <main>
            <div class="jobs-header" id="profileHeader">
                <div class="profile-avatar" id="profileAvatar"><span class="letter">J</span></div>
                <h1 id="profileName">Jobs Moscow</h1>
                <p id="profileBio">Вакансии и работа в Москве</p>
                <span class="jobs-badge">💼 Работа в Москве</span>
            </div>

            <div class="jobs-stats">
                <span id="friendsCount">👥 0</span>
                <span id="subscribersCount">👀 0</span>
                <span id="subscriptionsCount">📌 0</span>
            </div>

            <div class="jobs-content">
                <div class="jobs-card">
                    <h3>🔥 Свежие вакансии</h3>
                    <p>Здесь будут твои посты и объявления о работе.</p>
                </div>
                <div class="jobs-card">
                    <h3>📊 Статистика</h3>
                    <p>Подписчики: <span id="subCount">0</span> | Просмотры: <span id="viewCount">0</span></p>
                </div>
                <div class="jobs-card">
                    <h3>📍 Город</h3>
                    <p>Москва, Россия</p>
                </div>
            </div>

            <div class="feed-container">
                <h2 class="feed-title">🌐 Лента вакансий</h2>
                <div id="feed"><div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div></div>
            </div>
        </main>

        <div id="playerContainer"></div>
        <div id="modalsContainer"></div>
    </div>

    <script src="/firebase.js"></script>
    <script src="/auth.js"></script>
    <script src="/app.js"></script>
    <script src="/profile.js"></script>
    <script src="/notifications.js"></script>
    <script src="/lang.js"></script>
    <script src="/load-components.js"></script>

    <script>
        var SLUG = 'jobs-moscow-ru';
        var CURRENT_UID = null;

        function loadProfile() {
            console.log('🔵 Загружаем профиль Jobs Moscow...');
            db.ref('sites/' + SITE + '/users').orderByChild('slug').equalTo(SLUG).once('value', function(snap) {
                var users = snap.val() || {};
                var keys = Object.keys(users);
                if (keys.length > 0) {
                    CURRENT_UID = keys[0];
                    var userData = users[CURRENT_UID];
                    console.log('✅ Найден пользователь:', userData);
                    
                    document.getElementById('profileName').textContent = userData.name || 'Jobs Moscow';
                    document.getElementById('profileBio').textContent = userData.bio || 'Вакансии и работа в Москве';
                    
                    var avatar = document.getElementById('profileAvatar');
                    renderAvatar(CURRENT_UID, avatar, (userData.name || 'J').charAt(0).toUpperCase());
                    
                    var topName = document.getElementById('topName');
                    var topAvatar = document.getElementById('topAvatar');
                    if (topName) topName.textContent = userData.name;
                    if (topAvatar) renderAvatar(CURRENT_UID, topAvatar, userData.name.charAt(0).toUpperCase());
                    
                    var sName = document.getElementById('sName');
                    var sAvatar = document.getElementById('sAvatar');
                    if (sName) sName.textContent = userData.name;
                    if (sAvatar) renderAvatar(CURRENT_UID, sAvatar, userData.name.charAt(0).toUpperCase());
                    
                    loadStats();
                    loadFeed();
                } else {
                    console.error('❌ Пользователь с slug ' + SLUG + ' не найден');
                }
            });
        }

        function loadStats() {
            db.ref('sites/' + SITE + '/friends/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                var count = Object.keys(data).filter(function(k) { return data[k] === true; }).length;
                document.getElementById('friendsCount').textContent = '👥 ' + count;
            });
            db.ref('sites/' + SITE + '/subscribers/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                var count = Object.keys(data).length;
                document.getElementById('subscribersCount').textContent = '👀 ' + count;
                document.getElementById('subCount').textContent = count;
            });
            db.ref('sites/' + SITE + '/subscriptions/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                document.getElementById('subscriptionsCount').textContent = '📌 ' + Object.keys(data).length;
            });
        }

        function loadFeed() {
            var container = document.getElementById('feed');
            if (!container || !CURRENT_UID) return;
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div>';
            db.ref('sites/' + SITE + '/user_posts/' + CURRENT_UID).orderByChild('timestamp').on('value', function(snap) {
                container.innerHTML = '';
                var data = snap.val() || {};
                var keys = Object.keys(data).sort(function(a, b) {
                    return (data[b].timestamp || 0) - (data[a].timestamp || 0);
                });
                if (!keys.length) {
                    container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">📝 Нет вакансий. Создайте первую!</div>';
                    return;
                }
                keys.forEach(function(k) {
                    var post = data[k];
                    post.id = k;
                    var postEl = renderPost(post, 'feed');
                    if (postEl) container.appendChild(postEl);
                });
            });
        }

        window.goToUserPage = function() {
            if (!USER_UID) {
                var loginModal = document.getElementById('loginModal');
                if (loginModal) loginModal.classList.add('open');
                return;
            }
            db.ref('sites/' + SITE + '/users/' + USER_UID + '/slug').once('value', function(snap) {
                var slug = snap.val();
                if (slug) {
                    window.location.href = '/' + slug + '/';
                } else {
                    window.location.href = '/user/' + USER_UID + '/';
                }
            });
        };

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(loadProfile, 500);
        });
    </script>
</body>
</html>
