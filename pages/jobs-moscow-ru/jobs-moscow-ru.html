<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs Moscow | METAIMPERIYA</title>
    
    <!-- ===== ЭТО ДЛЯ ПОИСКОВИКОВ (СНИЗУ БУДЕТ ДУБЛИРОВАТЬСЯ) ===== -->
    <meta name="description" content="Jobs Moscow — вакансии и работа в Москве. Социальная платформа METAIMPERIYA.">
    <meta property="og:title" content="Jobs Moscow | METAIMPERIYA">
    <meta property="og:description" content="Вакансии и работа в Москве">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/dark-theme.css">
    
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        .jobs-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .jobs-header h1 {
            font-size: 36px;
            margin: 0;
        }
        .jobs-header p {
            font-size: 18px;
            opacity: 0.8;
        }
        .jobs-content {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .jobs-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .jobs-card h3 {
            margin: 0 0 8px 0;
            color: var(--text-primary);
        }
        .jobs-card p {
            margin: 0;
            color: var(--text-secondary);
        }
        .feed-container {
            max-width: 800px;
            margin: 20px auto;
        }
        .feed-container .feed-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        /* ===== СТИЛИ ДЛЯ ЛЕНТЫ ===== */
        .post-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .post-card .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .post-card .post-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }
        .post-card .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post-card .post-avatar .letter {
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .post-card .post-name {
            font-weight: 600;
            font-size: 14px;
        }
        .post-card .post-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: auto;
        }
        .post-card .post-text {
            font-size: 14px;
            line-height: 1.5;
            margin: 8px 0;
            word-wrap: break-word;
        }
        .post-card .post-image {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0;
        }
        @media (max-width: 600px) {
            .jobs-header h1 {
                font-size: 24px;
            }
            .jobs-header p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
         ВЕРХНЯЯ ЧАСТЬ — ЛЕНТА И КОНТЕНТ (ВИДИМАЯ ЧАСТЬ)
         ============================================================ -->

    <div id="app">
        <!-- ТОПБАР -->
        <div id="topbarContainer"></div>
        
        <!-- САЙДБАР -->
        <div id="sidebarContainer"></div>
        
        <!-- НАСТРОЙКИ -->
        <div id="settingsContainer"></div>

        <!-- ===== ОСНОВНОЙ КОНТЕНТ (ЛЕНТА СВЕРХУ) ===== -->
        <main>
            <!-- УНИКАЛЬНЫЙ ХЕДЕР JOBS MOSCOW -->
            <div class="jobs-header">
                <h1>💼 Jobs Moscow</h1>
                <p>Вакансии и работа в Москве</p>
            </div>

            <!-- КОНТЕНТ -->
            <div class="jobs-content">
                <div class="jobs-card">
                    <h3>🔥 Свежие вакансии</h3>
                    <p>Здесь будут твои посты и объявления</p>
                </div>
                <div class="jobs-card">
                    <h3>📊 Статистика</h3>
                    <p>Подписчики: 0 | Просмотры: 0</p>
                </div>
            </div>

            <!-- ===== ЛЕНТА ИЗ FIREBASE (СВЕРХУ!) ===== -->
            <div class="feed-container">
                <h2 class="feed-title">🌐 Лента</h2>
                <div id="feed"></div>
            </div>
        </main>

        <!-- ПЛЕЕР -->
        <div id="playerContainer"></div>
        
        <!-- МОДАЛКИ -->
        <div id="modalsContainer"></div>
    </div>

    <!-- ============================================================
         НИЖНЯЯ ЧАСТЬ — СКРИПТЫ (ДЛЯ ПОИСКОВИКОВ И РАБОТЫ)
         ============================================================ -->

    <!-- ПОДКЛЮЧАЕМ СКРИПТЫ -->
    <script src="/firebase.js"></script>
    <script src="/auth.js"></script>
    <script src="/app.js"></script>
    <script src="/profile.js"></script>
    <script src="/notifications.js"></script>
    <script src="/lang.js"></script>
    <script src="/load-components.js"></script>

    <script>
        // ================================================================
        // JOBS MOSCOW — УНИКАЛЬНЫЙ КОД
        // ================================================================
        
        var SLUG = 'jobs-moscow-ru';
        var CURRENT_UID = null;

        // ===== ЗАГРУЗКА ПРОФИЛЯ =====
        function loadJobsProfile() {
            console.log('🔵 Загружаем профиль Jobs Moscow...');
            
            db.ref('sites/' + SITE + '/users').orderByChild('slug').equalTo(SLUG).once('value', function(snap) {
                var users = snap.val() || {};
                var keys = Object.keys(users);
                
                if (keys.length > 0) {
                    CURRENT_UID = keys[0];
                    var userData = users[CURRENT_UID];
                    console.log('✅ Найден пользователь:', userData);
                    
                    // ОБНОВЛЯЕМ ХЕДЕР
                    var headerH1 = document.querySelector('.jobs-header h1');
                    var headerP = document.querySelector('.jobs-header p');
                    if (headerH1) headerH1.textContent = '💼 ' + (userData.name || 'Jobs Moscow');
                    if (headerP) headerP.textContent = userData.bio || 'Вакансии и работа в Москве';
                    
                    // ОБНОВЛЯЕМ ТОПБАР
                    var topName = document.getElementById('topName');
                    var topAvatar = document.getElementById('topAvatar');
                    if (topName) topName.textContent = userData.name;
                    if (topAvatar) renderAvatar(CURRENT_UID, topAvatar, userData.name.charAt(0).toUpperCase());
                    
                    // ОБНОВЛЯЕМ САЙДБАР
                    var sName = document.getElementById('sName');
                    var sAvatar = document.getElementById('sAvatar');
                    if (sName) sName.textContent = userData.name;
                    if (sAvatar) renderAvatar(CURRENT_UID, sAvatar, userData.name.charAt(0).toUpperCase());
                    
                    // ЗАГРУЖАЕМ ЛЕНТУ
                    loadJobsFeed();
                } else {
                    console.error('❌ Пользователь с slug ' + SLUG + ' не найден');
                }
            });
        }

        // ===== ЗАГРУЗКА ЛЕНТЫ =====
        function loadJobsFeed() {
            var container = document.getElementById('feed');
            if (!container || !CURRENT_UID) return;
            
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div>';
            
            db.ref('sites/' + SITE + '/user_posts/' + CURRENT_UID).orderByChild('timestamp').on('value', function(snap) {
                container.innerHTML = '';
                var data = snap.val() || {};
                var keys = Object.keys(data).sort(function(a, b) {
                    return (data[b].timestamp || 0) - (data[a].timestamp || 0);
                });
                
                if (!keys.length) {
                    container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">📝 Нет постов</div>';
                    return;
                }
                
                keys.forEach(function(k) {
                    var post = data[k];
                    post.id = k;
                    var postEl = renderPost(post, 'feed');
                    if (postEl) container.appendChild(postEl);
                });
            });
        }

        // ===== ПЕРЕХОД НА СВОЮ СТРАНИЦУ =====
        window.goToUserPage = function() {
            if (!USER_UID) {
                var loginModal = document.getElementById('loginModal');
                if (loginModal) loginModal.classList.add('open');
                return;
            }
            db.ref('sites/' + SITE + '/users/' + USER_UID + '/slug').once('value', function(snap) {
                var slug = snap.val();
                if (slug) {
                    window.location.href = '/' + slug + '/';
                } else {
                    window.location.href = '/user/' + USER_UID + '/';
                }
            });
        };

        // ===== СТАРТ =====
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(loadJobsProfile, 500);
        });
    </script>

    <!-- ===== ДУБЛИРУЕМ СОДЕРЖИМОЕ ДЛЯ ПОИСКОВИКОВ ===== -->
    <noscript>
        <div style="display:none;">
            <h1>Jobs Moscow — вакансии и работа в Москве</h1>
            <p>Социальная платформа METAIMPERIYA</p>
            <p>Вакансии, работа, Москва, трудоустройство</p>
        </div>
    </noscript>
</body>
</html>
