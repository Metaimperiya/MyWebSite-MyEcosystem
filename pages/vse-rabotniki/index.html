<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все Работники | METAIMPERIYA</title>
    <meta name="description" content="Все Работники — профиль в METAIMPERIYA.">
    <meta property="og:title" content="Все Работники | METAIMPERIYA">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dark-theme.css">
    
    <style>
        .profile-header {
            background: linear-gradient(135deg, #1a3a2a, #2d7a4a, #3a9a5a);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #ffcc00;
        }
        .profile-header .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 12px;
            border: 3px solid #ffcc00;
        }
        .profile-header .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-header .profile-avatar .letter {
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #2d7a4a;
            color: #ffcc00;
        }
        .profile-header h1 {
            font-size: 32px;
            margin: 0;
        }
        .profile-header .badge {
            display: inline-block;
            background: #ffcc00;
            color: #1a3a2a;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
        }
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 12px 0;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }
        .profile-stats span {
            cursor: pointer;
            color: var(--link-color);
            font-size: 14px;
        }
        .profile-content {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .profile-card {
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #ffcc00;
        }
        .profile-card h3 {
            margin: 0 0 4px 0;
            color: var(--text-primary);
        }
        .profile-card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .feed-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .feed-container .feed-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        @media (max-width: 600px) {
            .profile-header h1 { font-size: 24px; }
            .profile-stats { gap: 16px; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="topbarContainer"></div>
        <div id="sidebarContainer"></div>
        <div id="settingsContainer"></div>

        <main>
            <div class="profile-header" id="profileHeader">
                <div class="profile-avatar" id="profileAvatar"><span class="letter">В</span></div>
                <h1 id="profileName">Все Работники</h1>
                <p id="profileBio">Работа для всех!</p>
                <span class="badge">💪 Команда профессионалов</span>
            </div>

            <div class="profile-stats">
                <span id="friendsCount">👥 0</span>
                <span id="subscribersCount">👀 0</span>
                <span id="subscriptionsCount">📌 0</span>
            </div>

            <div class="profile-content">
                <div class="profile-card">
                    <h3>🎯 О нас</h3>
                    <p>Команда профессионалов, помогающая найти работу.</p>
                </div>
                <div class="profile-card">
                    <h3>💼 Направления</h3>
                    <p>IT, строительство, логистика, финансы.</p>
                </div>
            </div>

            <div class="feed-container">
                <h2 class="feed-title">🌐 Наша лента</h2>
                <div id="feed"><div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div></div>
            </div>
        </main>

        <div id="playerContainer"></div>
        <div id="modalsContainer"></div>
    </div>

    <!-- ===== ВСЕ СКРИПТЫ ===== -->
    <script src="/js/firebase.js"></script>
    <script src="/js/lang.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/player.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/feed.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/friends.js"></script>
    <script src="/js/groups.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/admin.js"></script>
    <script src="/js/page.js"></script>
    <script src="/js/load-components.js"></script>

    <script>
        var SLUG = 'vse-rabotniki';
        var CURRENT_UID = null;

        function loadProfile() {
            console.log('🔵 Загружаем профиль Все Работники...');
            db.ref('sites/' + SITE + '/users').orderByChild('slug').equalTo(SLUG).once('value', function(snap) {
                var users = snap.val() || {};
                var keys = Object.keys(users);
                if (keys.length > 0) {
                    CURRENT_UID = keys[0];
                    var userData = users[CURRENT_UID];
                    console.log('✅ Найден пользователь:', userData);
                    
                    document.getElementById('profileName').textContent = userData.name || 'Все Работники';
                    document.getElementById('profileBio').textContent = userData.bio || 'Работа для всех!';
                    
                    var avatar = document.getElementById('profileAvatar');
                    renderAvatar(CURRENT_UID, avatar, (userData.name || 'В').charAt(0).toUpperCase());
                    
                    loadStats();
                    loadFeed();
                } else {
                    console.error('❌ Пользователь с slug ' + SLUG + ' не найден');
                }
            });
        }

        function loadStats() {
            db.ref('sites/' + SITE + '/friends/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                var count = Object.keys(data).filter(function(k) { return data[k] === true; }).length;
                document.getElementById('friendsCount').textContent = '👥 ' + count;
            });
            db.ref('sites/' + SITE + '/subscribers/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                document.getElementById('subscribersCount').textContent = '👀 ' + Object.keys(data).length;
            });
            db.ref('sites/' + SITE + '/subscriptions/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                document.getElementById('subscriptionsCount').textContent = '📌 ' + Object.keys(data).length;
            });
        }

        function loadFeed() {
            var container = document.getElementById('feed');
            if (!container || !CURRENT_UID) return;
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div>';
            db.ref('sites/' + SITE + '/user_posts/' + CURRENT_UID).orderByChild('timestamp').on('value', function(snap) {
                container.innerHTML = '';
                var data = snap.val() || {};
                var keys = Object.keys(data).sort(function(a, b) {
                    return (data[b].timestamp || 0) - (data[a].timestamp || 0);
                });
                if (!keys.length) {
                    container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">📝 Нет постов. Напишите что-нибудь!</div>';
                    return;
                }
                keys.forEach(function(k) {
                    var post = data[k];
                    post.id = k;
                    var postEl = renderPost(post, 'feed');
                    if (postEl) container.appendChild(postEl);
                });
            });
        }

        window.goToUserPage = function() {
            if (!USER_UID) {
                var loginModal = document.getElementById('loginModal');
                if (loginModal) loginModal.classList.add('open');
                return;
            }
            db.ref('sites/' + SITE + '/users/' + USER_UID + '/slug').once('value', function(snap) {
                var slug = snap.val();
                if (slug) {
                    window.location.href = '/' + slug + '/';
                } else {
                    window.location.href = '/user/' + USER_UID + '/';
                }
            });
        };

        // ===== ЗАГРУЗКА КОМПОНЕНТОВ =====
        (function() {
            const components = [
                { id: 'topbarContainer', url: '/topbar.html' },
                { id: 'settingsContainer', url: '/settings.html' },
                { id: 'sidebarContainer', url: '/sidebar.html' },
                { id: 'modalsContainer', url: '/modals.html' },
                { id: 'playerContainer', url: '/player.html' }
            ];

            let loaded = 0;
            const total = components.length;

            components.forEach(function(comp) {
                const container = document.getElementById(comp.id);
                if (!container) return;

                fetch(comp.url)
                    .then(response => {
                        if (!response.ok) throw new Error('Не удалось загрузить ' + comp.url);
                        return response.text();
                    })
                    .then(html => {
                        container.innerHTML = html;
                        loaded++;
                        if (loaded === total) {
                            console.log('✅ Все компоненты загружены!');
                            setTimeout(function() {
                                if (typeof translatePage === 'function') translatePage();
                                if (typeof updateUI === 'function') updateUI();
                                if (typeof loadNotifications === 'function') loadNotifications();
                                if (typeof updateNotifBadge === 'function') updateNotifBadge();
                                if (typeof initAudio === 'function') initAudio();
                                loadProfile();
                            }, 500);
                        }
                    })
                    .catch(err => {
                        console.warn('❌ Ошибка загрузки ' + comp.url + ':', err);
                        container.innerHTML = `<div style="display:none;"></div>`;
                        loaded++;
                        if (loaded === total) {
                            console.log('✅ Все компоненты загружены (с ошибками)');
                            setTimeout(function() {
                                if (typeof translatePage === 'function') translatePage();
                                if (typeof updateUI === 'function') updateUI();
                                if (typeof loadNotifications === 'function') loadNotifications();
                                if (typeof updateNotifBadge === 'function') updateNotifBadge();
                                if (typeof initAudio === 'function') initAudio();
                                loadProfile();
                            }, 500);
                        }
                    });
            });
        })();
    </script>
</body>
</html>
