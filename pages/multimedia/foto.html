<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото — METAIMPERIYA</title>
    <meta name="description" content="Всё о фотографии: советы, техника, вдохновение">
    <meta name="keywords" content="фото, фотография, снимки, камера">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f2f5;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

<!-- ===== IFRAME — ЗАГРУЖАЕТ ГЛАВНУЮ СТРАНИЦУ ===== -->
<iframe src="/?page=foto" id="mainFrame"></iframe>

<script>
document.getElementById('mainFrame').addEventListener('load', function() {
    console.log('✅ Iframe загружен!');
});
</script>

</body>
</html>
