<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYER Likee | METAIMPERIYA</title>
    <meta name="description" content="PLAYER Likee — администратор METAIMPERIYA.">
    <meta property="og:title" content="PLAYER Likee | METAIMPERIYA">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dark-theme.css">
    
    <style>
        .player-header {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #ffcc00;
        }
        .player-header .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 12px;
            border: 3px solid #ffcc00;
        }
        .player-header .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-header .profile-avatar .letter {
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #302b63;
            color: #ffcc00;
        }
        .player-header h1 {
            font-size: 32px;
            margin: 0;
        }
        .player-header .player-badge {
            display: inline-block;
            background: #ffcc00;
            color: #0f0c29;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
        }
        .player-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 12px 0;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }
        .player-stats span {
            cursor: pointer;
            color: var(--link-color);
            font-size: 14px;
        }
        .player-content {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .player-card {
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #ffcc00;
        }
        .player-card h3 {
            margin: 0 0 4px 0;
            color: var(--text-primary);
        }
        .player-card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .feed-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .feed-container .feed-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .post-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        @media (max-width: 600px) {
            .player-header h1 { font-size: 24px; }
            .player-stats { gap: 16px; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="topbarContainer"></div>
        <div id="sidebarContainer"></div>
        <div id="settingsContainer"></div>

        <main>
            <div class="player-header" id="profileHeader">
                <div class="profile-avatar" id="profileAvatar"><span class="letter">P</span></div>
                <h1 id="profileName">PLAYER Likee</h1>
                <p id="profileBio">Администратор METAIMPERIYA</p>
                <span class="player-badge">⭐ Владелец платформы</span>
            </div>

            <div class="player-stats">
                <span id="friendsCount">👥 0</span>
                <span id="subscribersCount">👀 0</span>
                <span id="subscriptionsCount">📌 0</span>
            </div>

            <div class="player-content">
                <div class="player-card">
                    <h3>🎯 Обо мне</h3>
                    <p>Администратор и основатель социальной платформы METAIMPERIYA.</p>
                </div>
                <div class="player-card">
                    <h3>💻 Проекты</h3>
                    <p>🌐 <a href="https://dominate-google-maps.vercel.app/" target="_blank">dominate-google-maps.vercel.app</a></p>
                </div>
            </div>

            <div class="feed-container">
                <h2 class="feed-title">🌐 Моя лента</h2>
                <div id="feed"><div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div></div>
            </div>
        </main>

        <div id="playerContainer"></div>
        <div id="modalsContainer"></div>
    </div>

    <script src="/js/firebase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/lang.js"></script>
    <script src="/js/load-components.js"></script>

    <script>
        var SLUG = 'player-likee';
        var CURRENT_UID = null;

        function loadProfile() {
            console.log('🔵 Загружаем профиль PLAYER Likee...');
            db.ref('sites/' + SITE + '/users').orderByChild('slug').equalTo(SLUG).once('value', function(snap) {
                var users = snap.val() || {};
                var keys = Object.keys(users);
                if (keys.length > 0) {
                    CURRENT_UID = keys[0];
                    var userData = users[CURRENT_UID];
                    console.log('✅ Найден пользователь:', userData);
                    
                    document.getElementById('profileName').textContent = userData.name || 'PLAYER Likee';
                    document.getElementById('profileBio').textContent = userData.bio || 'Администратор METAIMPERIYA';
                    
                    var avatar = document.getElementById('profileAvatar');
                    renderAvatar(CURRENT_UID, avatar, (userData.name || 'P').charAt(0).toUpperCase());
                    
                    var topName = document.getElementById('topName');
                    var topAvatar = document.getElementById('topAvatar');
                    if (topName) topName.textContent = userData.name;
                    if (topAvatar) renderAvatar(CURRENT_UID, topAvatar, userData.name.charAt(0).toUpperCase());
                    
                    var sName = document.getElementById('sName');
                    var sAvatar = document.getElementById('sAvatar');
                    if (sName) sName.textContent = userData.name;
                    if (sAvatar) renderAvatar(CURRENT_UID, sAvatar, userData.name.charAt(0).toUpperCase());
                    
                    loadStats();
                    loadFeed();
                } else {
                    console.error('❌ Пользователь с slug ' + SLUG + ' не найден');
                }
            });
        }

        function loadStats() {
            db.ref('sites/' + SITE + '/friends/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                var count = Object.keys(data).filter(function(k) { return data[k] === true; }).length;
                document.getElementById('friendsCount').textContent = '👥 ' + count;
            });
            db.ref('sites/' + SITE + '/subscribers/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                document.getElementById('subscribersCount').textContent = '👀 ' + Object.keys(data).length;
            });
            db.ref('sites/' + SITE + '/subscriptions/' + CURRENT_UID).once('value', function(snap) {
                var data = snap.val() || {};
                document.getElementById('subscriptionsCount').textContent = '📌 ' + Object.keys(data).length;
            });
        }

        function loadFeed() {
            var container = document.getElementById('feed');
            if (!container || !CURRENT_UID) return;
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div>';
            db.ref('sites/' + SITE + '/user_posts/' + CURRENT_UID).orderByChild('timestamp').on('value', function(snap) {
                container.innerHTML = '';
                var data = snap.val() || {};
                var keys = Object.keys(data).sort(function(a, b) {
                    return (data[b].timestamp || 0) - (data[a].timestamp || 0);
                });
                if (!keys.length) {
                    container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">📝 Нет постов. Напишите что-нибудь!</div>';
                    return;
                }
                keys.forEach(function(k) {
                    var post = data[k];
                    post.id = k;
                    var postEl = renderPost(post, 'feed');
                    if (postEl) container.appendChild(postEl);
                });
            });
        }

        window.goToUserPage = function() {
            if (!USER_UID) {
                var loginModal = document.getElementById('loginModal');
                if (loginModal) loginModal.classList.add('open');
                return;
            }
            db.ref('sites/' + SITE + '/users/' + USER_UID + '/slug').once('value', function(snap) {
                var slug = snap.val();
                if (slug) {
                    window.location.href = '/' + slug + '/';
                } else {
                    window.location.href = '/user/' + USER_UID + '/';
                }
            });
        };

        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(loadProfile, 500);
        });
    </script>
</body>
</html>
