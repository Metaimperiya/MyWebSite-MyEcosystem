<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>PLAYER Likee — METAIMPERIYA</title>
    <meta name="description" content="PLAYER Likee — персональная страница на METAIMPERIYA">
    <link rel="canonical" href="https://www.metaimperiya.com/player-likee/">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/mobile.css">
</head>
<body>

<div class="app">

    <div id="topbarContainer"></div>
    <div id="settingsContainer"></div>
    <div id="sidebarContainer"></div>
    <div id="modalsContainer"></div>

    <div class="container" id="mainContainer">

        <div class="player-handle" id="playerHandle">
            <div class="handle-bar"></div>
            <div class="handle-label">🎵 ПЛЕЕР</div>
        </div>

        <div class="page active" id="page-page">
            <div style="padding:6px 0;">
                <button class="back-btn" onclick="window.location.href='/'">← Назад</button>
            </div>
            
            <div class="profile-header">
                <div class="avatar-wrap" id="profileAvatar"><span class="letter">P</span></div>
                <div class="name" id="profileName">PLAYER Likee</div>
                <div class="bio" id="profileBio">Администратор METAIMPERIYA</div>
                <div class="profile-stats">
                    <span>🤝 Друзья: <span id="friendsCount">0</span></span>
                    <span>👀 Подписчики: <span id="subscribersCount">0</span></span>
                    <span>📌 Подписки: <span id="subscriptionsCount">0</span></span>
                </div>
                <div id="profileActions"></div>
            </div>

            <div class="link-section" id="linkSection">
                <div class="link-input-wrap">
                    <input type="text" id="profileLinkInput" placeholder="Вставьте ссылку для встраивания...">
                    <button onclick="saveProfileLink()">➡️</button>
                </div>
                <div class="profile-iframe-wrap" id="profileIframeWrap" style="display:none;">
                    <div class="iframe-header">
                        <span>📄 Встроенная страница</span>
                        <button onclick="toggleIframe()">🔼 Свернуть</button>
                    </div>
                    <iframe id="profileIframe" src="" class="profile-iframe"></iframe>
                </div>
            </div>

            <div class="friends-section" id="friendsSection" style="display:none;">
                <h4>🤝 Друзья <button onclick="toggleFriendsList()" style="float:right;background:none;border:none;color:var(--link-color);cursor:pointer;">✕</button></h4>
                <div class="friend-list" id="friendList"></div>
            </div>

            <h4 style="margin:10px 0 6px;">📰 Мои посты</h4>
            <div id="profilePosts"></div>
        </div>

        <div class="chat-view" id="chatView">
            <button class="back-btn" onclick="closeChat()">← Назад</button>
            <div class="chat-messages" id="chatMessages"></div>
            <div id="typingIndicator" style="display:none;">✍️ Печатает...</div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Сообщение...">
                <button onclick="sendChatMessage()">→</button>
            </div>
        </div>

    </div>

    <div class="admin-dot" id="adminDot" onclick="adminLogin()"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<script src="/js/firebase.js"></script>
<script src="/js/lang.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/player.js"></script>
<script src="/js/app.js"></script>
<script src="/js/feed.js"></script>
<script src="/js/profile.js"></script>
<script src="/js/friends.js"></script>
<script src="/js/groups.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/page.js"></script>

<script>
// ================================================================
// ЗАГРУЗКА КОМПОНЕНТОВ
// ================================================================

(function() {
    const components = [
        { id: 'topbarContainer', url: '/topbar.html' },
        { id: 'settingsContainer', url: '/settings.html' },
        { id: 'sidebarContainer', url: '/sidebar.html' },
        { id: 'modalsContainer', url: '/modals.html' }
    ];

    let loaded = 0;
    const total = components.length;

    components.forEach(function(comp) {
        const container = document.getElementById(comp.id);
        if (!container) return;

        fetch(comp.url)
            .then(response => {
                if (!response.ok) throw new Error('Не удалось загрузить ' + comp.url);
                return response.text();
            })
            .then(html => {
                container.innerHTML = html;
                loaded++;
                if (loaded === total) {
                    console.log('✅ Все компоненты загружены!');
                    setTimeout(function() {
                        if (typeof translatePage === 'function') translatePage();
                        if (typeof updateUI === 'function') updateUI();
                        if (typeof loadNotifications === 'function') loadNotifications();
                        if (typeof updateNotifBadge === 'function') updateNotifBadge();
                        if (typeof initAudio === 'function') initAudio();
                        
                        // Загружаем профиль ТОЛЬКО ПОСЛЕ авторизации
                        if (USER_UID && typeof loadProfile === 'function') {
                            VIEWING_USER = USER_UID;
                            loadProfile();
                        }
                    }, 500);
                }
            })
            .catch(err => {
                console.warn('❌ Ошибка загрузки ' + comp.url + ':', err);
                container.innerHTML = `<div style="display:none;"></div>`;
                loaded++;
                if (loaded === total) {
                    console.log('✅ Все компоненты загружены (с ошибками)');
                    setTimeout(function() {
                        if (typeof translatePage === 'function') translatePage();
                        if (typeof updateUI === 'function') updateUI();
                        if (typeof loadNotifications === 'function') loadNotifications();
                        if (typeof updateNotifBadge === 'function') updateNotifBadge();
                        if (typeof initAudio === 'function') initAudio();
                        
                        if (USER_UID && typeof loadProfile === 'function') {
                            VIEWING_USER = USER_UID;
                            loadProfile();
                        }
                    }, 500);
                }
            });
    });
})();

// ================================================================
// АВТОРИЗАЦИЯ — ГЛАВНЫЙ ИСТОЧНИК ИСТИНЫ
// ================================================================

// Слушаем изменения авторизации
auth.onAuthStateChanged(function(user) {
    if (user) {
        USER_UID = user.uid;
        USER = user.displayName || user.email || 'User';
        localStorage.setItem('dc_u_' + SITE, USER);
        
        var avatarUrl = user.photoURL || null;
        if (!avatarCache) avatarCache = {};
        avatarCache[USER_UID] = avatarUrl;
        
        // Обновляем UI
        if (typeof updateUI === 'function') updateUI();
        
        // Загружаем профиль ТЕКУЩЕГО пользователя
        VIEWING_USER = USER_UID;
        if (typeof loadProfile === 'function') {
            setTimeout(function() {
                loadProfile();
            }, 300);
        }
        
        console.log('✅ Авторизован как:', USER);
    } else {
        console.log('⏳ Не авторизован');
        // Показываем гостя
        var nameEl = document.getElementById('profileName');
        var bioEl = document.getElementById('profileBio');
        if (nameEl) nameEl.textContent = 'Гость';
        if (bioEl) bioEl.textContent = 'Войдите, чтобы увидеть профиль';
        if (typeof updateUI === 'function') updateUI();
    }
});

// ================================================================
// ЗАГРУЗКА ПРИ ОБНОВЛЕНИИ СТРАНИЦЫ
// ================================================================

window.addEventListener('load', function() {
    // Если пользователь уже авторизован — загружаем профиль
    if (USER_UID && typeof loadProfile === 'function') {
        VIEWING_USER = USER_UID;
        setTimeout(function() {
            loadProfile();
        }, 500);
    }
});
</script>

</body>
</html>
