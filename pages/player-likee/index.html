<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYER Likee — METAIMPERIYA</title>
    <meta name="description" content="PLAYER Likee — персональная страница на METAIMPERIYA. Посты, фото, общение.">
    <meta name="keywords" content="PLAYER Likee, METAIMPERIYA, персональная страница">
    <meta property="og:title" content="PLAYER Likee — METAIMPERIYA">
    <meta property="og:description" content="Персональная страница PLAYER Likee на METAIMPERIYA">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.metaimperiya.com/player-likee/">
    <link rel="canonical" href="https://www.metaimperiya.com/player-likee/">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/mobile.css">
</head>
<body>

<div class="app">

    <div id="topbarContainer"></div>
    <div id="settingsContainer"></div>
    <div id="sidebarContainer"></div>
    <div id="modalsContainer"></div>

    <div class="container" id="mainContainer">

        <div class="player-handle" id="playerHandle">
            <div class="handle-bar"></div>
            <div class="handle-label">🎵 ПЛЕЕР</div>
        </div>

        <!-- ===== СТРАНИЦА С РЕАЛЬНЫМ КОНТЕНТОМ ===== -->
        <div class="page active" id="page-page">
            <div style="padding:6px 0;">
                <button class="back-btn" onclick="window.location.href='/'">← Назад</button>
            </div>
            
            <!-- ===== ПРОФИЛЬ ===== -->
            <div class="profile-header">
                <div class="avatar-wrap" id="profileAvatar"><span class="letter">P</span></div>
                <div class="name">PLAYER Likee</div>
                <div class="bio">Администратор METAIMPERIYA</div>
                <div class="profile-stats">
                    <span>🤝 Друзья: <span id="friendsCount">0</span></span>
                    <span>👀 Подписчики: <span id="subscribersCount">0</span></span>
                    <span>📌 Подписки: <span id="subscriptionsCount">0</span></span>
                </div>
            </div>

            <!-- ===== ПОСТЫ ===== -->
            <h4 style="margin:10px 0 6px;">📰 Мои посты</h4>
            <div id="profilePosts"></div>
        </div>

        <div class="chat-view" id="chatView">
            <button class="back-btn" onclick="closeChat()">← Назад</button>
            <div class="chat-messages" id="chatMessages"></div>
            <div id="typingIndicator" style="display:none;">✍️ Печатает...</div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Сообщение...">
                <button onclick="sendChatMessage()">→</button>
            </div>
        </div>

    </div>

    <div class="admin-dot" id="adminDot" onclick="adminLogin()"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<script src="/js/firebase.js"></script>
<script src="/js/lang.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/player.js"></script>
<script src="/js/app.js"></script>
<script src="/js/feed.js"></script>
<script src="/js/profile.js"></script>
<script src="/js/friends.js"></script>
<script src="/js/groups.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/page.js"></script>

<script>
// ================================================================
// ЗАГРУЗКА КОМПОНЕНТОВ
// ================================================================

(function() {
    const components = [
        { id: 'topbarContainer', url: '/topbar.html' },
        { id: 'settingsContainer', url: '/settings.html' },
        { id: 'sidebarContainer', url: '/sidebar.html' },
        { id: 'modalsContainer', url: '/modals.html' }
    ];

    let loaded = 0;
    const total = components.length;

    components.forEach(function(comp) {
        const container = document.getElementById(comp.id);
        if (!container) return;

        fetch(comp.url)
            .then(response => {
                if (!response.ok) throw new Error('Не удалось загрузить ' + comp.url);
                return response.text();
            })
            .then(html => {
                container.innerHTML = html;
                loaded++;
                if (loaded === total) {
                    console.log('✅ Все компоненты загружены!');
                    setTimeout(function() {
                        if (typeof translatePage === 'function') translatePage();
                        if (typeof updateUI === 'function') updateUI();
                        if (typeof loadNotifications === 'function') loadNotifications();
                        if (typeof updateNotifBadge === 'function') updateNotifBadge();
                        if (typeof initAudio === 'function') initAudio();
                        
                        // Загружаем посты
                        var MY_UID = 'ANR62p3qcjOe2ALsdVvJHUNCCV42';
                        VIEWING_USER = MY_UID;
                        if (typeof loadProfile === 'function') {
                            loadProfile();
                        }
                    }, 500);
                }
            })
            .catch(err => {
                console.warn('❌ Ошибка загрузки ' + comp.url + ':', err);
                container.innerHTML = `<div style="display:none;"></div>`;
                loaded++;
                if (loaded === total) {
                    console.log('✅ Все компоненты загружены (с ошибками)');
                    setTimeout(function() {
                        if (typeof translatePage === 'function') translatePage();
                        if (typeof updateUI === 'function') updateUI();
                        if (typeof loadNotifications === 'function') loadNotifications();
                        if (typeof updateNotifBadge === 'function') updateNotifBadge();
                        if (typeof initAudio === 'function') initAudio();
                        
                        var MY_UID = 'ANR62p3qcjOe2ALsdVvJHUNCCV42';
                        VIEWING_USER = MY_UID;
                        if (typeof loadProfile === 'function') {
                            loadProfile();
                        }
                    }, 500);
                }
            });
    });
})();

// ================================================================
// АВТОРИЗАЦИЯ
// ================================================================

auth.onAuthStateChanged(function(user) {
    if (user) {
        USER_UID = user.uid;
        USER = user.displayName || user.email || 'User';
        localStorage.setItem('dc_u_' + SITE, USER);
        var avatarUrl = user.photoURL || null;
        if (!avatarCache) avatarCache = {};
        avatarCache[USER_UID] = avatarUrl;
        if (typeof updateUI === 'function') updateUI();
        console.log('✅ Авторизован как:', USER);
    } else {
        console.log('⏳ Не авторизован');
    }
});
</script>

</body>
</html>
