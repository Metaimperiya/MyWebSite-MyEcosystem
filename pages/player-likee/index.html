<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYER Likee | METAIMPERIYA</title>
    <meta name="description" content="PLAYER Likee — администратор METAIMPERIYA.">
    <meta property="og:title" content="PLAYER Likee | METAIMPERIYA">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/mobile.css">
    
    <style>
        .player-header {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #ffcc00;
        }
        .player-header .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 12px;
            border: 3px solid #ffcc00;
        }
        .player-header .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-header .profile-avatar .letter {
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #302b63;
            color: #ffcc00;
        }
        .player-header h1 {
            font-size: 32px;
            margin: 0;
        }
        .player-header .player-badge {
            display: inline-block;
            background: #ffcc00;
            color: #0f0c29;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
        }
        .player-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 12px 0;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }
        .player-stats span {
            cursor: pointer;
            color: var(--link-color);
            font-size: 14px;
        }
        .player-content {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .player-card {
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #ffcc00;
        }
        .player-card h3 {
            margin: 0 0 4px 0;
            color: var(--text-primary);
        }
        .player-card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .feed-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .feed-container .feed-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .post-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        /* Стили для постов */
        .post {
            background: var(--post-bg);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }
        .post .author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .post .author .avatar-wrap {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .post .author .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post .author .avatar-wrap .letter {
            color: var(--avatar-text);
            font-weight: 700;
            font-size: 0.7rem;
        }
        .post .author .name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--link-color);
            cursor: pointer;
        }
        .post .author .time {
            color: var(--muted-text);
            font-size: 0.5rem;
            margin-left: auto;
        }
        .post .text {
            margin: 4px 0;
            word-break: break-word;
            font-size: 0.85rem;
            line-height: 1.4;
            color: var(--text-color);
        }
        .post .post-img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            border-radius: 8px;
            margin: 4px 0;
            border: 1px solid var(--border-color);
            cursor: pointer;
            background: var(--input-bg);
        }
        .post .stats {
            display: flex;
            gap: 12px;
            font-size: 0.65rem;
            color: var(--muted-text);
            border-top: 1px solid var(--border-color);
            padding-top: 6px;
            margin-top: 4px;
        }
        .post .stats button {
            background: none;
            border: none;
            color: var(--muted-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 16px;
            transition: 0.2s;
        }
        .post .stats button:hover {
            background: var(--input-bg);
            color: var(--link-color);
        }
        .post .stats button.liked {
            color: var(--link-color);
        }
        @media (max-width: 600px) {
            .player-header h1 { font-size: 24px; }
            .player-stats { gap: 16px; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- КОНТЕЙНЕРЫ ДЛЯ КОМПОНЕНТОВ -->
    <div id="topbarContainer"></div>
    <div id="settingsContainer"></div>
    <div id="sidebarContainer"></div>
    <div id="modalsContainer"></div>
    <div id="playerContainer"></div>

    <main>
        <div class="player-header" id="profileHeader">
            <div class="profile-avatar" id="profileAvatar"><span class="letter">P</span></div>
            <h1 id="profileName">PLAYER Likee</h1>
            <p id="profileBio">Администратор METAIMPERIYA</p>
            <span class="player-badge">⭐ Владелец платформы</span>
        </div>

        <div class="player-stats">
            <span id="friendsCount">👥 0</span>
            <span id="subscribersCount">👀 0</span>
            <span id="subscriptionsCount">📌 0</span>
        </div>

        <div class="player-content">
            <div class="player-card">
                <h3>🎯 Обо мне</h3>
                <p>Администратор и основатель социальной платформы METAIMPERIYA.</p>
            </div>
            <div class="player-card">
                <h3>💻 Проекты</h3>
                <p>🌐 <a href="https://dominate-google-maps.vercel.app/" target="_blank">dominate-google-maps.vercel.app</a></p>
            </div>
        </div>

        <div class="feed-container">
            <h2 class="feed-title">🌐 Моя лента</h2>
            <div id="feed"><div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div></div>
        </div>
    </main>
</div>

<!-- ===== ВСЕ СКРИПТЫ ===== -->
<script src="/js/firebase.js"></script>
<script src="/js/lang.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/player.js"></script>
<script src="/js/app.js"></script>
<script src="/js/feed.js"></script>
<script src="/js/profile.js"></script>
<script src="/js/friends.js"></script>
<script src="/js/groups.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/page.js"></script>

<script>
    var SLUG = 'player-likee';
    var CURRENT_UID = null;

    function loadProfile() {
        console.log('🔵 Загружаем профиль PLAYER Likee...');
        
        db.ref('sites/' + SITE + '/users').orderByChild('slug').equalTo(SLUG).once('value', function(snap) {
            var users = snap.val() || {};
            var keys = Object.keys(users);
            
            if (keys.length > 0) {
                CURRENT_UID = keys[0];
                var userData = users[CURRENT_UID];
                console.log('✅ Найден пользователь:', userData);
                
                document.getElementById('profileName').textContent = userData.name || 'PLAYER Likee';
                document.getElementById('profileBio').textContent = userData.bio || 'Администратор METAIMPERIYA';
                
                var avatar = document.getElementById('profileAvatar');
                renderAvatar(CURRENT_UID, avatar, (userData.name || 'P').charAt(0).toUpperCase());
                
                loadStats();
                loadFeed();
            } else {
                console.error('❌ Пользователь с slug ' + SLUG + ' не найден');
                // СОЗДАЁМ АВТОМАТИЧЕСКИ
                var uid = 'player-likee-' + Date.now();
                var newUser = {
                    name: 'PLAYER Likee',
                    bio: 'Администратор METAIMPERIYA',
                    slug: 'player-likee',
                    avatarUrl: null,
                    createdAt: Date.now()
                };
                db.ref('sites/' + SITE + '/users/' + uid).set(newUser);
                db.ref('sites/' + SITE + '/all_users/' + uid).set(newUser);
                console.log('✅ Создан пользователь:', uid);
                setTimeout(loadProfile, 500);
            }
        });
    }

    function loadStats() {
        if (!CURRENT_UID) return;
        db.ref('sites/' + SITE + '/friends/' + CURRENT_UID).once('value', function(snap) {
            var data = snap.val() || {};
            var count = Object.keys(data).filter(function(k) { return data[k] === true; }).length;
            document.getElementById('friendsCount').textContent = '👥 ' + count;
        });
        db.ref('sites/' + SITE + '/subscribers/' + CURRENT_UID).once('value', function(snap) {
            var data = snap.val() || {};
            document.getElementById('subscribersCount').textContent = '👀 ' + Object.keys(data).length;
        });
        db.ref('sites/' + SITE + '/subscriptions/' + CURRENT_UID).once('value', function(snap) {
            var data = snap.val() || {};
            document.getElementById('subscriptionsCount').textContent = '📌 ' + Object.keys(data).length;
        });
    }

    function loadFeed() {
        var container = document.getElementById('feed');
        if (!container || !CURRENT_UID) return;
        
        container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">⏳ Загрузка постов...</div>';
        
        db.ref('sites/' + SITE + '/user_posts/' + CURRENT_UID).orderByChild('timestamp').on('value', function(snap) {
            container.innerHTML = '';
            var data = snap.val() || {};
            var keys = Object.keys(data).sort(function(a, b) {
                return (data[b].timestamp || 0) - (data[a].timestamp || 0);
            });
            
            if (!keys.length) {
                container.innerHTML = '<div style="text-align:center;padding:20px;color:#bbb;">📝 Нет постов. Напишите что-нибудь!</div>';
                return;
            }
            
            keys.forEach(function(k) {
                var post = data[k];
                post.id = k;
                var postEl = renderPost(post, 'feed');
                if (postEl) container.appendChild(postEl);
            });
        });
    }

    window.goToUserPage = function() {
        if (!USER_UID) {
            var loginModal = document.getElementById('loginModal');
            if (loginModal) loginModal.classList.add('open');
            return;
        }
        db.ref('sites/' + SITE + '/users/' + USER_UID + '/slug').once('value', function(snap) {
            var slug = snap.val();
            if (slug) {
                window.location.href = '/' + slug + '/';
            } else {
                window.location.href = '/user/' + USER_UID + '/';
            }
        });
    };

    // ===== ЗАГРУЗКА КОМПОНЕНТОВ =====
    (function() {
        const components = [
            { id: 'topbarContainer', url: '/topbar.html' },
            { id: 'settingsContainer', url: '/settings.html' },
            { id: 'sidebarContainer', url: '/sidebar.html' },
            { id: 'modalsContainer', url: '/modals.html' },
            { id: 'playerContainer', url: '/player.html' }
        ];

        let loaded = 0;
        const total = components.length;

        components.forEach(function(comp) {
            const container = document.getElementById(comp.id);
            if (!container) return;

            fetch(comp.url)
                .then(response => {
                    if (!response.ok) throw new Error('Не удалось загрузить ' + comp.url);
                    return response.text();
                })
                .then(html => {
                    container.innerHTML = html;
                    loaded++;
                    if (loaded === total) {
                        console.log('✅ Все компоненты загружены!');
                        setTimeout(function() {
                            if (typeof translatePage === 'function') translatePage();
                            if (typeof updateUI === 'function') updateUI();
                            if (typeof loadNotifications === 'function') loadNotifications();
                            if (typeof updateNotifBadge === 'function') updateNotifBadge();
                            if (typeof initAudio === 'function') initAudio();
                            loadProfile();
                        }, 500);
                    }
                })
                .catch(err => {
                    console.warn('❌ Ошибка загрузки ' + comp.url + ':', err);
                    container.innerHTML = `<div style="display:none;"></div>`;
                    loaded++;
                    if (loaded === total) {
                        console.log('✅ Все компоненты загружены (с ошибками)');
                        setTimeout(function() {
                            if (typeof translatePage === 'function') translatePage();
                            if (typeof updateUI === 'function') updateUI();
                            if (typeof loadNotifications === 'function') loadNotifications();
                            if (typeof updateNotifBadge === 'function') updateNotifBadge();
                            if (typeof initAudio === 'function') initAudio();
                            loadProfile();
                        }, 500);
                    }
                });
        });
    })();
</script>
</body>
</html>
