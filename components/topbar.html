<header class="pc-topbar" id="topbar">
    <div class="logo">
        <span class="menu-icon" onclick="toggleSidebar()">☰</span>
        <span onclick="goToFeed()">METAIMPERIYA 🏴‍☠️</span>
    </div>
    <input class="search" placeholder="Search..." id="pcSearch">
    <div class="right">
        <button onclick="openChatList()" title="Chats">💬</button>
        <button onclick="openNotifications()" title="Notifications">🔔</button>
        <div class="avatar-wrap" id="pcAvatar" onclick="goToProfile()">
            <span class="letter">?</span>
        </div>
        <span class="username" id="pcName" onclick="goToProfile()"></span>
        <button onclick="toggleSettingsMenu()" title="Menu">⋮</button>
    </div>
</header>

<!-- ===== ВЫПАДАЮЩЕЕ МЕНЮ НАСТРОЕК С ВЫБОРОМ ЯЗЫКА ===== -->
<div id="settingsDropdown" class="settings-dropdown">
    <div class="settings-item" onclick="toggleTheme()">
        <span class="icon">🌓</span> Theme
    </div>
    
    <div class="settings-item" style="flex-direction:column;align-items:stretch;padding:4px 0;">
        <div style="display:flex;align-items:center;padding:4px 12px;gap:10px;cursor:pointer;" onclick="toggleLanguageMenu()">
            <span class="icon">🌐</span> <span id="langDisplay">English</span>
            <span style="margin-left:auto;font-size:0.6rem;">▾</span>
        </div>
        <div id="languageMenu" style="display:none;padding:4px 8px;background:var(--input-bg);border-radius:8px;margin:2px 8px;">
            <div class="lang-option" data-lang="en" onclick="setLanguage('en');closeLanguageMenu();">🇬🇧 English</div>
            <div class="lang-option" data-lang="ru" onclick="setLanguage('ru');closeLanguageMenu();">🇷🇺 Русский</div>
            <div class="lang-option" data-lang="uk" onclick="setLanguage('uk');closeLanguageMenu();">🇺🇦 Українська</div>
            <div class="lang-option" data-lang="es" onclick="setLanguage('es');closeLanguageMenu();">🇪🇸 Español</div>
            <div class="lang-option" data-lang="de" onclick="setLanguage('de');closeLanguageMenu();">🇩🇪 Deutsch</div>
            <div class="lang-option" data-lang="tr" onclick="setLanguage('tr');closeLanguageMenu();">🇹🇷 Türkçe</div>
            <div class="lang-option" data-lang="hi" onclick="setLanguage('hi');closeLanguageMenu();">🇮🇳 हिन्दी</div>
            <div class="lang-option" data-lang="bn" onclick="setLanguage('bn');closeLanguageMenu();">🇧🇩 বাংলা</div>
            <div class="lang-option" data-lang="ur" onclick="setLanguage('ur');closeLanguageMenu();">🇵🇰 اردو</div>
            <div class="lang-option" data-lang="fa" onclick="setLanguage('fa');closeLanguageMenu();">🇮🇷 فارسی</div>
            <div class="lang-option" data-lang="he" onclick="setLanguage('he');closeLanguageMenu();">🇮🇱 עברית</div>
            <div class="lang-option" data-lang="ar" onclick="setLanguage('ar');closeLanguageMenu();">🇸🇦 العربية</div>
        </div>
    </div>
    
    <div class="settings-divider"></div>
    <div class="settings-item" onclick="toggleViewMode()">
        <span class="icon">📱</span> <span id="viewModeDisplay">PC</span>
    </div>
    <div class="settings-divider"></div>
    <div class="settings-item" onclick="logout()">
        <span class="icon">🚪</span> Logout
    </div>
</div>
