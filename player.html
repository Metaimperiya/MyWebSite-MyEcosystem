<!-- ===== ВЫДВИЖНОЙ ПЛЕЕР ===== -->
<div class="player-drawer" id="playerDrawer">
    <div class="player-content">
        <div class="equalizer">
            <div class="eq-bar" style="height:15px;animation-delay:0s"></div>
            <div class="eq-bar" style="height:25px;animation-delay:0.1s"></div>
            <div class="eq-bar" style="height:35px;animation-delay:0.2s"></div>
            <div class="eq-bar" style="height:45px;animation-delay:0.3s"></div>
            <div class="eq-bar" style="height:55px;animation-delay:0.4s"></div>
            <div class="eq-bar" style="height:45px;animation-delay:0.5s"></div>
            <div class="eq-bar" style="height:35px;animation-delay:0.6s"></div>
            <div class="eq-bar" style="height:25px;animation-delay:0.7s"></div>
            <div class="eq-bar" style="height:15px;animation-delay:0.8s"></div>
        </div>

        <div class="player-track-info">
            <div class="player-track-name" id="drawerTrackName">Capitulation</div>
            <div class="player-artist">METAIMPERIYA</div>
        </div>

        <div class="player-progress">
            <div class="player-progress-bar" id="drawerProgressBar">
                <div class="player-progress-fill" id="drawerProgressFill" style="width:0%"></div>
            </div>
            <div class="player-time">
                <span id="drawerCurrentTime">0:00</span>
                <span id="drawerTotalTime">0:00</span>
            </div>
        </div>

        <div class="player-controls">
            <button class="player-btn" onclick="playPrev()">⏮</button>
            <button class="player-btn play-large" id="drawerPlayBtn" onclick="togglePlay()">▶</button>
            <button class="player-btn" onclick="playNext()">⏭</button>
            <button class="player-btn" onclick="toggleDrawerPlaylist()">📋</button>
            <button class="player-btn" onclick="downloadCurrentTrack()">⬇️</button>
            <button class="player-btn" onclick="openVisualizer()">🎨</button>
        </div>

        <div class="player-playlist" id="drawerPlaylist" style="display:none;">
            <div class="playlist-item active" onclick="playTrack(0)">01 Capitulation</div>
            <div class="playlist-item" onclick="playTrack(1)">02 Clean Victory</div>
            <div class="playlist-item" onclick="playTrack(2)">03 Covenant of Change</div>
            <div class="playlist-item" onclick="playTrack(3)">04 Dreams in the Wind</div>
            <div class="playlist-item" onclick="playTrack(4)">05 Memory Like Dust</div>
            <div class="playlist-item" onclick="playTrack(5)">06 Nobody</div>
            <div class="playlist-item" onclick="playTrack(6)">07 Touch of Choice</div>
            <div class="playlist-item" onclick="playTrack(7)">08 You Are Not in the Game</div>
            <div class="playlist-item" onclick="playTrack(8)">09 You Can't See Me</div>
        </div>
    </div>
</div>
