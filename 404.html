<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAIMPERIYA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e4e6eb;
            border-top-color: #1877f2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { color: #1877f2; margin-bottom: 8px; }
        p { color: #65676b; font-size: 14px; }
    </style>
    <script>
        (function() {
            const path = window.location.pathname;
            if (path && path !== '/' && path !== '/index.html') {
                let slug = path.substring(1);
                while (slug.endsWith('/')) {
                    slug = slug.slice(0, -1);
                }
                if (slug && slug.trim() !== '') {
                    try {
                        localStorage.setItem('metaimperiya_seo_slug', slug.trim());
                    } catch(e) {}
                    window.location.href = '/';
                } else {
                    window.location.href = '/';
                }
            } else {
                window.location.href = '/';
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>🏠 METAIMPERIYA</h2>
        <p>⏳ Перенаправление...</p>
    </div>
</body>
</html>
