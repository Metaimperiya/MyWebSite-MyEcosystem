<!-- ===== МОДАЛКИ ===== -->
<div class="modal" id="loginModal">
    <div class="modal-box">
        <h3>👤 Вход</h3>
        <button class="google-btn" id="googleBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"> Войти через Google
        </button>
        <div class="divider">или</div>
        <input type="text" id="nameInput" placeholder="Введите имя...">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeLogin()">Отмена</button>
            <button class="btn-save" onclick="loginWithName()">Войти</button>
        </div>
    </div>
</div>

<div class="modal" id="editProfileModal">
    <div class="modal-box">
        <h3>✏️ Редактировать профиль</h3>
        <input type="text" id="editName" placeholder="Имя">
        <textarea id="editBio" placeholder="О себе..."></textarea>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeEditProfile()">Отмена</button>
            <button class="btn-save" onclick="saveProfile()">Сохранить</button>
        </div>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-box">
        <h3>✏️ Редактировать пост</h3>
        <input type="text" id="editMarquee" placeholder="📢 Бегущая строка">
        <textarea id="editText" placeholder="📝 Текст поста"></textarea>
        <input type="url" id="editLink" placeholder="🔗 Ссылка (iframe)">
        <div class="frame-size-toggle">
            <span class="label">📐 Размер фрейма:</span>
            <div class="btn-group">
                <button type="button" id="frameSizeSmall" class="frame-size-btn active" onclick="setFrameSize('small')">📱 Обычный</button>
                <button type="button" id="frameSizeLarge" class="frame-size-btn" onclick="setFrameSize('large')">🖥️ Широкий</button>
            </div>
        </div>
        <input type="text" id="editHashtags" placeholder="#хештеги через пробел">
        <div style="color:#888;font-size:0.6rem;margin:4px 0 2px;">🔘 Кнопки</div>
        <div id="editButtonsContainer"></div>
        <button class="btn-add" onclick="addEditBtn()">➕ Добавить кнопку</button>
        <div class="modal-actions">
            <button class="btn-save" onclick="saveEdit()">💾 Сохранить</button>
            <button class="btn-cancel" onclick="closeEdit()">✕ Отмена</button>
        </div>
        <button onclick="deleteEditPost()" style="width:100%;padding:3px;background:#ffebee;color:#c62828;border:1px solid #e74c3c;border-radius:12px;margin-top:4px;cursor:pointer;font-weight:600;font-size:0.65rem;">🗑 Удалить пост</button>
    </div>
</div>

<div class="modal" id="createRoomModal">
    <div class="modal-box">
        <h3>📝 Новая группа</h3>
        <input type="text" id="roomName" placeholder="Название...">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeCreateRoom()">Отмена</button>
            <button class="btn-save" onclick="createRoom()">Создать</button>
        </div>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-box">
        <h3>🏴‍☠️ Админ</h3>
        <input type="password" id="adminPass" placeholder="Пароль...">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeAdminModal()">Отмена</button>
            <button class="btn-save" onclick="checkAdmin()">Войти</button>
        </div>
    </div>
</div>

<div class="modal" id="notificationsModal">
    <div class="modal-box">
        <h3>🔔 Уведомления <button class="close-btn" onclick="closeNotifications()">✕</button></h3>
        <div id="notificationsList"></div>
    </div>
</div>
