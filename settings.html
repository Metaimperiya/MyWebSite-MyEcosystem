<div class="settings-dropdown" id="settingsDropdown">
    <div class="settings-item" onclick="goToProfile();closeSettingsMenu()">👤 Профиль</div>

    <div class="settings-item" onclick="goToGroups();closeSettingsMenu()">💬 Сообщества</div>
    <div class="settings-divider"></div>
